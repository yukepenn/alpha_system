schema_version: "frontier-harness-v3"
harness_version: "0.3.0-rc1"
generated_at: "2026-06-01T03:38:45+00:00"

project:
  name: "alpha_system"
  slug: "alpha_system"
  repo_type: "trading_research"
  default_branch: "main"
  primary_language: "python"
  primary_runtime: "wsl2"
  timezone: "America/New_York"
  risk_level: "high"
  trading_enabled: true
  broker_enabled: false

models:
  chatgpt_strategist:
    provider: "openai"
    model: "gpt-5.5-thinking"
    role: "strategic reasoning, campaign design, post-run review"
  codex_executor:
    provider: "openai"
    model: "gpt-5.5"
    effort: "xhigh"
    role: "primary execution and repair"
  codex_fast_subagent:
    provider: "openai"
    model: "gpt-5.4-mini"
    effort: "medium"
    role: "light subagent work"
  claude_architect:
    provider: "anthropic"
    model: "claude-opus-4-8"
    effort: "xhigh"
    role: "architecture, campaign decomposition, specs"
  claude_reviewer:
    provider: "anthropic"
    model: "claude-opus-4-8"
    effort: "xhigh"
    role: "cross-provider review, done-check"
  claude_verifier:
    provider: "anthropic"
    model: "claude-sonnet-4-6"
    effort: "high"
    role: "repo map, verifier, audit"

paths:
  campaigns: "campaigns"
  specs: "specs"
  handoffs: "handoffs"
  reviews: "reviews"
  runs: "runs"
  docs: "docs"
  decisions: "decisions"
  canaries: "evals/canaries"
  behaviors: "evals/behaviors"

commands:
  smoke: "python tools/verify.py --smoke"
  lint: "python tools/verify.py --lint"
  typecheck: "python tools/verify.py --typecheck"
  test: "python tools/verify.py --test"
  verify: "python tools/verify.py --all"
  verify_canaries: "python tools/hooks/canary_runner.py"
  audit_boundaries: "python tools/verify.py --boundaries"
  validate_artifacts: "python tools/verify.py --artifacts"

providers:
  timeout_seconds: 21600
  mock:
    enabled: false
  claude:
    cmd: "claude"
    headless_args: ["-p"]
    output_format: null
  codex:
    cmd: "codex"
    exec_args: ["exec"]
    sandbox: "workspace-write"
    # Service tier for codex API calls. "fast" is the friendly alias for the
    # OpenAI "priority" (expedited) tier: higher token cost, faster turnaround.
    # "default" is the standard (non-expedited) tier: lower token cost, the
    # Workflow 2 default to save tokens over the longer term. Accepts
    # fast/priority/flex/default/auto/scale. Env override:
    # FRONTIER_CODEX_SERVICE_TIER (set to "fast"/"priority" to expedite a run).
    # Wired into `codex exec -c service_tier=<v>`.
    service_tier: "default"
    # Local data root the sandboxed executor needs read+write access to:
    # canonical OHLCV/BBO, feature/label registries, and materialized values.
    # It lives OUTSIDE the git worktree (data is never committed), so the
    # workspace-write sandbox blocks it by default and data-dependent phases
    # (materialization, the FCFP-P13 benchmark, FUTSUB backfill) fail closed on
    # empty inputs. Resolution order: ALPHA_DATA_ROOT env var, then this value,
    # then the repo default ~/alpha_data/alpha_system. The harness force-sets
    # ALPHA_DATA_ROOT in the executor env and grants the sandbox access to it.
    # Leave unset to use the env var / default.
    data_root: null
    # Extra filesystem roots (beyond the resolved data_root, which is always
    # included) the workspace-write sandbox may read+write. Env-expanded;
    # entries whose variables do not resolve are dropped. Wired into
    # `codex exec -c sandbox_workspace_write.writable_roots=[...]`.
    sandbox_writable_roots: []

lanes:
  green:
    description: "Low-risk automatic lane."
    auto_execute: true
    auto_repair: true
    auto_review: true
    require_claude_review: false
    auto_pr: true
    auto_merge: true
    auto_merge_dry_run: false
    max_repair_attempts: 2
    max_phases: 30
    max_changed_files: 80
    merge_policy:
      allow_pass_with_warnings: true
      block_on_critical: true

  yellow:
    description: "Material engineering or research lane. Automatic with Claude review."
    auto_execute: true
    auto_repair: true
    auto_review: true
    require_claude_review: true
    auto_pr: true
    auto_merge: true
    auto_merge_dry_run: false
    max_repair_attempts: 2
    max_phases: 20
    max_changed_files: 150
    merge_policy:
      allow_pass_with_warnings: true
      block_on_critical: true
      block_on_test_tamper: true
      block_on_boundary_violation: true

  red:
    description: "External, destructive, live, production, or broker-adjacent lane. Automatic only when scoped authorization is armed."
    auto_execute: true
    auto_repair: true
    auto_review: true
    require_claude_review: true
    auto_pr: true
    auto_merge: false
    can_auto_merge_when_authorized: true
    auto_merge_dry_run: true
    allow_runtime_ops: true
    max_repair_attempts: 1
    max_phases: 10
    required_env:
      - "PROJECT_OP_AUTHORIZED"
      - "PROJECT_OP_SCOPE"
      - "PROJECT_OP_EXPIRES"
    merge_policy:
      allow_pass_with_warnings: false
      require_operation_scope_match: true

workflow1:
  enabled: true
  human_spec_gate_required: true
  human_merge_gate_required: true
  default_lane: "yellow"
  parallel_worktrees_default: 3

workflow2:
  enabled: true
  ralph_required: true
  mode: "strict_micro_loop"
  state_machine:
    - "RUN_INIT"
    - "CAMPAIGN_LOAD"
    - "PHASE_SELECT"
    - "SPEC_GENERATE"
    - "SPEC_VALIDATE"
    - "WORKTREE_CREATE"
    - "CODEX_EXECUTE"
    - "CHECKS_RUN"
    - "HANDOFF_VALIDATE"
    - "CLAUDE_REVIEW"
    - "VERDICT_PARSE"
    - "PR_CREATE"
    - "CI_WAIT"
    - "MERGE_GATE"
    - "MERGE"
    - "DONE_CHECK"
    - "NEXT_PHASE"
    - "CAMPAIGN_DONE_CHECK"
    - "RUN_SUMMARY"
  responsibilities:
    ralph:
      - "driver"
      - "state_machine"
      - "stop_and_resume"
      - "validation_orchestration"
      - "handoff_validation"
      - "review_orchestration"
      - "verdict_parse"
      - "bounded_repair_routing"
      - "pr_create"
      - "ci_wait"
      - "merge_gate"
      - "done_check"
      - "run_summary"
    codex:
      - "generated_spec_execution"
      - "scoped_repair"
      - "authorized_local_checks"
      - "commit_eligible_handoff"
    claude_opus:
      - "yellow_red_review"
      - "architecture_review"
      - "semantic_done_check"
    claude_sonnet:
      - "source_map"
      - "verifier"
      - "audit_support"
    chatgpt:
      - "strategy"
      - "campaign_framing"
      - "post_run_reasoning"
  run_artifacts:
    local_only: true
    run_dir: "runs/<run_id>"
    phase_dir: "runs/<run_id>/phases/<phase_id>"
    commit_eligible_handoff: "handoffs/<phase_id>.md"
    never_stage:
      - "runs/**"
    phase_files:
      - "spec.md"
      - "executor_prompt.md"
      - "executor_notes.md"
      - "checks.json"
      - "handoff.md"
      - "review.md"
      - "verdict.json"
      - "repair_attempts/"
  stop_file:
    path: "runs/<run_id>/STOP"
    checked_before:
      - "phase_select"
      - "provider_call"
      - "codex_execute"
      - "checks_run"
      - "claude_review"
      - "pr_create"
      - "ci_wait"
      - "merge_gate"
      - "merge"
      - "done_check"
      - "next_phase"
  fresh_context_each_iteration: true
  allow_auto_spec_generation: true
  allow_auto_execute: true
  allow_auto_repair: true
  allow_auto_review: true
  auto_pr: true
  auto_merge: true
  allow_auto_pr: true
  allow_auto_merge: true
  allow_auto_merge_dry_run: true
  max_repair_attempts_default: 2
  max_run_minutes: 14400
  max_phase_minutes: 1440
  # Forward-looking dollar ceiling. NOTE: currently INERT - the driver only trips
  # this when state.estimated_cost_usd > max_estimated_usd > 0, and real provider
  # cost is not yet populated (estimated_cost_usd stays 0.0). Until cost tracking
  # is wired, the effective AFK ceiling is max_run_minutes / max_phase_minutes plus
  # human supervision. This value arms automatically once cost tracking lands.
  max_estimated_usd: 50.0
  worktree_mode: false
  default_worktree_mode: false
  scheduler:
    # DAG wave scheduler. mode=sequential preserves the historical list-order,
    # one-phase-at-a-time loop. mode=dag_wave selects phases by dependency-ready
    # set and, when parallel_execution is armed and max_parallel_phases>1, runs a
    # conflict-free wave concurrently in isolated worktrees while MERGING SERIALLY
    # through a merge queue. Defaults keep current behaviour unless opted in.
    mode: sequential
    max_parallel_phases: 1
    merge_queue: serial
    parallel_execution: false
    # auto => coordinator_only whenever a parallel wave actually runs (phase
    # branches never race on ACTIVE_CAMPAIGN.md), else the historical phase-commit
    # ride-along. Set explicitly to phase_commit or coordinator_only to override.
    update_active_campaign: auto
  max_phases: 30
  max_micro_loops_default: 3
  semantic_done_check_required: true
  heldout_behavior_check_required: true
  run_summary_required: true
  update_project_skill_lessons: true
  stuck_detection:
    no_diff_iterations: 2
    repeated_error_iterations: 2
    no_new_passing_check_iterations: 2
    same_review_findings_iterations: 2

github:
  auto_create_pr: true
  ci_timeout_seconds: 900
  ci_poll_seconds: 15
  required_checks: ["validate"]
  require_ci: true
  require_branch_protection: true
  allow_unprotected_green_merge: false
  allow_unprotected_dry_run: true
  allow_no_check_dry_run: true
  merge_method: "squash"

git:
