name: frontier-nightly-audit

on:
  schedule:
    - cron: "17 7 * * *"
  workflow_dispatch:

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Nightly Frontier audit
        run: |
          python tools/verify.py --boundaries
          python tools/verify.py --artifacts
          python tools/hooks/canary_runner.py
          # Status doctor is informational in CI: there is no runs/ state in a
          # fresh checkout, so it cannot reconcile a live run. Keep exit-tolerant.
          python tools/frontier/status_doctor.py || true
