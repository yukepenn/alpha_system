# Synthetic L2-derived feature examples for ASV1-P26.
# Fixture-only correctness configuration; not real market data or evidence.

scope: fixture_only_design
data_version_prefix: "l2:synthetic:"
materialize_by_default: false
register_by_default: false
factor_spec_compatibility: true

features:
  - factor_id: l2_top_of_book_spread
    category: spread_from_top_of_book
    input_domain: l2
    value_schema: factor_value_schema
    formula: "ask_price_level_1 - bid_price_level_1"
    available_ts_policy: latest_used_l2_input_available_ts

  - factor_id: l2_top1_imbalance
    category: imbalance_by_level
    input_domain: l2
    value_schema: factor_value_schema
    formula: "(bid_size_level_1 - ask_size_level_1) / displayed_size_total"
    available_ts_policy: latest_used_l2_input_available_ts

  - factor_id: l2_top5_imbalance
    category: imbalance_by_level
    input_domain: l2
    value_schema: factor_value_schema
    formula: "(bid_size_top_5 - ask_size_top_5) / displayed_size_total"
    available_ts_policy: latest_used_l2_input_available_ts

  - factor_id: l2_depth_by_side
    category: depth_by_side
    input_domain: l2
    value_schema: factor_value_schema
    parameters:
      side: bid_or_ask
      depth_levels: 5

  - factor_id: l2_order_count_by_level
    category: order_count_by_level
    input_domain: l2
    value_schema: factor_value_schema
    parameters:
      side: bid_or_ask
      book_level: 1

  - factor_id: l2_microprice
    category: microprice
    input_domain: l2
    value_schema: factor_value_schema
    formula: "(ask_price * bid_size + bid_price * ask_size) / displayed_size_total"

  - factor_id: l2_quote_update_intensity
    category: quote_update_intensity
    input_domain: l2
    value_schema: factor_value_schema
    ordering: available_ts
    parameters:
      window_seconds: 1.0

  - factor_id: l2_liquidity_regime_tag
    category: liquidity_regime_tags
    input_domain: l2
    value_schema: factor_value_schema
    tags:
      - tight_deep
      - wide_or_shallow
      - incomplete

  - factor_id: l2_order_flow_imbalance_placeholder
    category: future_order_flow_placeholder
    input_domain: l2
    value_schema: factor_value_schema
    implemented_for_fixture: false
    notes: "Placeholder only; future work requires reviewed replay assumptions."
