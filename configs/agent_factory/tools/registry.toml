# Synthetic, value-free Agent Factory tool contract table.
# The importable registry in alpha_system.agent_factory.tools.registry is authoritative.

schema_version = "agent-factory-tool-registry-v1"
campaign_id = "ALPHA_AGENT_FACTORY_MVP"
phase_id = "AGENT-P05"
default_posture = "default-deny-fail-closed"
output_schema = "AgentToolResult"

[[tools]]
name = "registry.list_datasets"
group = "registry"
allowed_callers = ["data_contract_auditor"]
permission_matrix_refs = ["registry.resolve_dataset_version"]
required_inputs = ["request_id"]
forbidden_side_effects = [
  "direct_registry_write",
  "raw_provider_access",
  "external_provider_call",
  "raw_or_heavy_result_payload",
  "value_materialization_in_mvp",
  "broker_paper_live_order_scope",
]
artifact_policy = "local_only"
failure_states = ["unknown_registry_view", "registry_unavailable", "permission_denied"]
required_reviewer = "data_contract_auditor"
reviewer_independence_note = "A caller cannot issue the independent admissibility decision for its own request."
status = "mvp"

