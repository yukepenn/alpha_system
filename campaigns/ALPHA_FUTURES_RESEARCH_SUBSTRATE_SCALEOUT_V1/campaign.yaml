  - 'Serial keystone registry writes: shared SQLite/registry registration MUST be serialized (no parallel SQLite writes); compute/materialization may be batch-oriented but registration is serial.'
  - 'Use the driver to materialize the base OHLCV family over the full accepted window with a BOUNDED-REAL rollout FIRST: one recent accepted full year (e.g. 2024) x ES/NQ/RTY, validated for keystone identity / registry / resolver / coverage, THEN expand to the full accepted window. Enforce available_ts, keystone identity, Parquet values, content hash, and registry metadata.'
