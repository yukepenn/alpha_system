  - artifacts/**/raw_outputs/**
  - '**/*credential*'
  - '**/generated_local_only/**'
  local_only_by_default:
  - artifacts/**
  - runs/**
  - $ALPHA_DATA_ROOT/**
  allowed_commit:
  - campaign control files
  - docs
  - value-free substrate evidence (markdown/JSON specs, coverage matrices as summaries, reports)
  - roll-splice / maintenance-crossing guard code + tests
  - feature/label materialization configs and minimal family-code scale repairs
  - value-store / registry metadata schema additions (code, not data)
  - N_eff / walk-forward runtime wiring code + tests
  - tests
  - tiny synthetic fixtures
  - handoffs
  - reviews
  - curated summaries
  tiny_fixture_exceptions:
    allowed: true
    paths:
    - tests/fixtures/**
    - tests/unit/futures_substrate_scaleout/fixtures/**
    requirements:
    - synthetic
    - tiny
    - documented
    - not real market data
    - not alpha evidence
    - value-free or trivially-small
  research_evidence_artifacts:
    note: >-
      Substrate evidence under research/futures_substrate_scaleout_v1/** is
      commit-eligible ONLY when value-free: acceptance-lock summaries, coverage
      and quality matrices (summary statistics/metadata only), resolver-smoke
      reports, roll-guard audit summaries, N_eff/walk-forward smoke summaries,
      Core Pilot re-run reports, and downstream handoffs. Raw or per-row
      feature/label values, Parquet, SQLite registries, roll calendar data, and
      provider responses remain local-only under runs/** or $ALPHA_DATA_ROOT/**
      and are never committed.
  phase_requirements:
    explicit_artifact_policy_required: true
    explicit_staging_required: true
    artifact_audit_before_merge: true
    no_raw_data_commits: true
    no_canonical_data_commits: true
    no_feature_value_commits: true
    no_label_value_commits: true
    no_provider_response_commits: true
    no_local_db_commits: true
    no_roll_calendar_data_commits: true
    no_heavy_artifact_commits: true
