campaign_id: ALPHA_FUTURES_RESEARCH_SUBSTRATE_SCALEOUT_V1
campaign_name: 'Futures Research Substrate Scaleout V1: turn the existing full-depth Databento ES/NQ/RTY OHLCV+BBO history and existing feature/label/runtime code into a full accepted-window, BBO-aware, roll-guarded, resolver-safe research substrate; re-run the Core Pilot INCONCLUSIVE studies against real materialized inputs.'
repo_name: alpha_system
repo_path: ~/projects/alpha_system
project_profile:
  profile: trading_research
  mode: research
  layer: research_substrate_scaleout
  default_branch: main
  primary_language: python
  automation_lane: supervised
  risk_level: high
  human_review_required: true
  trading_enabled: true
  broker_enabled: false
  description: >-
    Research-only substrate engineering. This campaign accepts/locks existing
    DatasetVersions, materializes existing feature/label families over the full
    available history, adds minimal required guards (roll-splice,
    maintenance-crossing) and N_eff / walk-forward wiring, produces coverage and
    quality matrices, proves registry-resolved Parquet values are usable by the
    runtime, and re-runs the Core Pilot's INCONCLUSIVE StudySpecs against real
    materialized inputs. It is NOT new alpha ideation, NOT a platform rewrite,
    NOT FactorLibrary/AlphaBook/Strategy Reference, and NOT paper/live/broker.
    It makes no profitability or tradability claim.
workflow:
  active: workflow2
  workflow1:
    description: Human-gated phase loop for high-judgment work; available but not the default for this campaign.
  workflow2:
    description: Ralph strict autonomous campaign loop with DAG-wave scheduling and a serial merge queue. Materialization phases are serialized by a shared registry resource_class.
    state_order:
    - RUN_INIT
    - CAMPAIGN_LOAD
    - PHASE_SELECT
    - SPEC_GENERATE
    - SPEC_VALIDATE
    - WORKTREE_CREATE
    - CODEX_EXECUTE
    - CHECKS_RUN
    - HANDOFF_VALIDATE
    - CLAUDE_REVIEW
    - VERDICT_PARSE
    - PR_CREATE
    - CI_WAIT
    - MERGE_GATE
    - MERGE
    - DONE_CHECK
    - NEXT_PHASE
    - CAMPAIGN_DONE_CHECK
    - RUN_SUMMARY
workflow2:
  scheduler:
    mode: dag_wave
    parallel_execution: true
    max_parallel_phases: 3
    merge_queue: serial
    update_active_campaign: coordinator_only
  notes:
  - Build phases in DAG order in isolated worktrees; merge one PR at a time.
  - Phase branches must never write ACTIVE_CAMPAIGN.md; the coordinator owns it.
  - Materialization phases (FUTSUB-P06..P13 features, FUTSUB-P16..P20 labels)
    write the shared local SQLite registry inline via the materialize CLI, so
    they share resource_class materialization_registry and are NOT parallel_safe;
    the scheduler serializes them. This keeps the campaign DAG-aware without
    forcing unsafe parallel registry writes.
  - Any future deferred-registry-write design may re-enable parallel waves for
    path-disjoint materialization; until then materialization is serial.
  - Bootstrap / contract / integration / audit / wiring / rerun / closeout
    phases are must_run_alone.
runtime:
  python: '3.11'
  package_root: src/alpha_system
  test_root: tests
  smoke_command: python tools/verify.py --smoke
  full_command: python tools/verify.py --all
  canary_command: python tools/hooks/canary_runner.py
  research_venv: ~/.venvs/alpha_system_research
  data_root_env: ALPHA_DATA_ROOT
  consumed_primitives:
  - src/alpha_system/core/value_store.py (dual JSONL+Parquet value sink/reader; content hash; available_ts)
  - src/alpha_system/features/families (ohlcv, session, bbo, cross_market, structure) and features/engine/materialization.py
  - src/alpha_system/labels/families (fixed_horizon, cost_adjusted, path, event)
  - src/alpha_system/data/foundation/rolls.py (RollPolicy / RollCalendarRecord contracts)
  - src/alpha_system/runtime (input_resolver, tool_results, diagnostics {factor, cross_market, label, splits}, cost, reports)
  - src/alpha_system/experiments/splits.py (train_validation_split, walk_forward_splits, apply_purge_embargo)
  - src/alpha_system/governance (StudySpec re-lock and resolver-smoke; consumed via CLI, not edited)
  - src/alpha_system/cli (feature|label materialize|plan|list, registry, study)
  editable_in_campaign:
  - src/alpha_system/data/foundation/rolls.py and a roll-calendar/roll-guard helper (FUTSUB-P03)
  - src/alpha_system/features/families/** minimal scale repairs (FUTSUB-P06..P13)
  - src/alpha_system/labels/families/** minimal scale repairs + guard hooks (FUTSUB-P16..P21)
  - src/alpha_system/core/value_store.py / registry metadata schema additions if needed (FUTSUB-P04)
  - src/alpha_system/runtime/diagnostics/** for N_eff + walk-forward wiring (FUTSUB-P24..P25)
  - tools/** and configs/** materialization plans/configs as needed
models:
  build_time_roles:
    strategy_campaign_framing: ChatGPT GPT-5.5 Thinking
    specs_semantic_review_done_check: Claude Opus 4.8 xhigh
    source_map_verifier_mechanical_audit: Claude Sonnet 4.6
    execution_tests_repair_handoffs: Codex GPT-5.5 high
    orchestration_state_machine_dag_merge_queue: Ralph
  notes:
  - Build-time model roles write/review/merge the campaign.
  - No in-product autonomous agents are instantiated; this is engineering work
    driven by the strict Workflow 2 loop.
lane_policy:
  green: Low-risk automatic work (campaign control docs, indexes, value-free scaffolding).
  yellow: Material engineering/research work requiring fresh Claude Opus review.
  red: External, destructive, live, production, costly, or broker-adjacent work; requires scoped authorization.
  red_authorization_required:
  - PROJECT_OP_AUTHORIZED
  - PROJECT_OP_SCOPE
  - PROJECT_OP_EXPIRES
  red_expected_in_campaign: false
  default_lane: yellow
state_machine:
  driver: ralph
  strict: true
  stop_checks_before:
  - provider calls
  - phase selection
  - codex execution
  - validation
  - review
  - PR creation
  - CI waiting
  - merge gate
  - merge
  - done-check
  - next-phase selection
  resume: from recorded run state, never regenerating completed work
