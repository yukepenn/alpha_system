  - 'BUILD a reusable, generic multi-family scaleout materialization DRIVER (a sanctioned module + CLI subcommand). The current blocker is missing scaleout ORCHESTRATION, not missing market data: alpha feature materialize is a seed/smoke seed_pack.v1 operator and nothing iterates the family x symbol x accepted-year grid. The driver must iterate that grid and, per unit, REUSE the existing family engines (src/alpha_system/features/families/*), the sanctioned canonical/BBO loaders (data.foundation.canonical_loader), and the OFFICIAL keystone identity / registry write path (FeatureStore.register_materialized_feature, as in cli/seed_pack.run_seed_feature_pack). NEVER hand-write registry records; NEVER weaken resolver semantics; NEVER bypass DatasetVersion acceptance gates.'
