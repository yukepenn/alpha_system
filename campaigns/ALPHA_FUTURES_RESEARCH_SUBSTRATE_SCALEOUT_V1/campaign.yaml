    - frontier-plan
    - dag_scheduler
    - artifact audit
stop_conditions:
- name: STOP file active
  condition: runs/<run_id>/STOP indicates active stop
  action: stop_before_new_phase_or_merge
- name: new alpha ideation or new AlphaSpec batch introduced
  condition: a new AlphaSpec batch, broad alpha search, or new-idea ideation appears (beyond re-locking/re-running existing Core Pilot specs)
  action: block_merge_and_escalate
- name: parameter tuning beyond original bounds
  condition: a re-run tunes parameters or optimizes beyond the original bounded StudySpecs
  action: block_merge_and_rework
- name: raw provider data read by agents
  condition: campaign code reads raw Databento/IBKR files (.dbn/.zst/parquet/arrow/feather) directly instead of resolving via registry tools
  action: block_merge_and_repair
- name: external provider API call attempted
  condition: any external Databento/IBKR API call is attempted (no re-pull unless corruption is proven and authorized)
  action: stop_and_escalate
- name: materialization without DatasetVersion acceptance-lock
  condition: features/labels materialized against a DatasetVersion without a persisted acceptance/coverage verdict
  action: block_merge_and_repair
- name: registered treated as accepted
  condition: a DatasetVersion is treated as accepted/locked without a persisted coverage verdict
  action: block_merge_and_repair
- name: hand-patched lock or fuzzy resolver fallback
  condition: a lock is hand-patched, or the resolver falls back on a fuzzy feature/label name instead of failing closed
  action: block_merge_and_repair
- name: JSONL used as research-scale store
  condition: a research-scale value store uses JSONL instead of registry-resolved Parquet
  action: block_merge_and_repair
- name: value / SQLite / roll-calendar data committed
  condition: materialized feature/label values, local SQLite registries, roll calendar data, parquet/arrow/feather, or provider responses are staged or tracked
  action: block_merge_and_repair
- name: label crosses roll splice silently
  condition: a forward label books a contract-to-contract roll jump as a normal return without the roll-splice guard policy applied
  action: block_merge_and_rework
- name: label crosses maintenance break silently
  condition: a forward/extended label silently crosses the exchange daily maintenance / trade-date break
  action: block_merge_and_rework
- name: approximate roll calendar overclaimed
  condition: the analytic roll calendar is presented as provider-exact splice truth
  action: block_merge_and_rework
- name: full roll execution engine or IBKR resolver introduced
  condition: a full live roll execution engine, per-contract ESM/NQM/RTYM mapping, back-adjusted continuous construction, or IBKR contract resolver appears
  action: block_merge_and_escalate
- name: BBO proxy overclaimed as execution truth
  condition: BBO top-book is presented as passive fill, queue priority, intra-minute impact, or execution truth
  action: block_merge_and_rework
- name: cross-instrument forward-fill
  condition: cross-market features forward-fill values across instruments or break per-instrument available_ts
  action: block_merge_and_rework
- name: N_eff missing or misleading
  condition: overlapping intraday/extended labels are reported without overlap-aware N_eff, or extended horizons overstate effective sample size
  action: block_merge_and_rework
- name: walk-forward not wired or handed off
  condition: purge/embargo walk-forward is neither wired into the diagnostics path nor handed off with a minimal callable path
  action: block_merge_and_repair
- name: coverage matrices omitted
  condition: a required coverage/quality matrix is omitted
  action: block_merge_and_repair
- name: resolver smoke skipped
  condition: a feature/label/StudySpec resolver-smoke gate is skipped before downstream use
  action: block_merge_and_repair
- name: unbounded or non-restart-safe materialization
  condition: a materialization runs without budget/chunking/checkpointing or is not restart-safe
  action: block_merge_and_repair
- name: parallel registry write conflict
  condition: two materialization phases sharing resource_class materialization_registry are co-scheduled, risking concurrent SQLite registry corruption
  action: stop_phase_selection
- name: multiple-testing engine attempted prematurely
  condition: a full multiple-testing / false-discovery / DSR/PBO/PSR correction engine is implemented here instead of handed off to Validation Governance
  action: block_merge_and_escalate
- name: FactorLibrary / AlphaBook / Strategy Reference scope introduced
  condition: FactorLibrary ingestion pipeline, AlphaBook allocation, Strategy Reference validation, or a Research Runner appears
  action: block_merge_and_escalate
- name: paper/live/broker/order scope introduced
  condition: paper/live/broker/order/execution code or a capital/live decision appears
  action: stop_and_escalate
- name: L2 or ML scope introduced
  condition: L1/L2/L3 event-stream ingestion or ML/DL/RL training appears
  action: block_merge_and_escalate
- name: forbidden promotion state used
  condition: any of VALIDATED_RESEARCH/LIVE_APPROVED/PAPER_APPROVED/PRODUCTION_READY/CAPITAL_ALLOCATED/PROFITABLE/TRADABLE/STRATEGY_READY/PORTFOLIO_READY is assigned
  action: block_merge_and_escalate
- name: alpha/profitability/tradability claim detected
  condition: an unqualified alpha, tradability, profitability, production-ready, or live-ready claim appears
  action: block_merge_and_rework
- name: forbidden module edited
  condition: a phase edits execution/broker/live/signals/strategies/portfolio/management/l2/backtest/agent_factory
  action: block_merge_and_repair
- name: parallel phase lacks allowed_paths
  condition: a phase marked parallel_safe declares no allowed_paths or declares a global/coordinator path
  action: block_campaign_execution_until_fixed
- name: phase branch writes ACTIVE_CAMPAIGN.md in parallel mode
  condition: a phase branch writes ACTIVE_CAMPAIGN.md while update_active_campaign is coordinator_only
  action: block_merge_and_repair
- name: merge outside serial merge queue
  condition: a merge is attempted outside the serial merge queue (more than one PR merging at once)
  action: stop_and_escalate
- name: campaign YAML invalid
  condition: campaign.yaml fails YAML parse
  action: block_campaign_execution_until_fixed
- name: phase dependency missing
  condition: selected phase dependencies are incomplete or blocked
  action: stop_phase_selection
- name: acceptance gates missing phases
  condition: acceptance_gates do not cover every phase exactly once
  action: block_campaign_execution_until_fixed
- name: PHASE_PLAN / campaign.yaml mismatch
  condition: phase ids, names, lanes, dependencies, or DAG metadata disagree between files
  action: block_campaign_execution_until_fixed
- name: Claude review BLOCKED
  condition: review verdict is BLOCKED
  action: blocked_handoff_and_stop
- name: repair attempts exceeded
  condition: repair loop exceeds configured max attempts
  action: blocked_handoff_and_stop
- name: active repo/worktree under forbidden Windows path
  condition: active worktree under /mnt/c, /mnt/d, /mnt/e, OneDrive, Dropbox, Google Drive, or Windows-synced folder
  action: stop_run_init_or_worktree_create
