  - runs/<run_id>/phases/<phase_id>/executor_prompt.md
  - runs/<run_id>/phases/<phase_id>/executor_notes.md
  - runs/<run_id>/phases/<phase_id>/handoff.md
  - runs/<run_id>/phases/<phase_id>/review.md
  - runs/<run_id>/phases/<phase_id>/verdict.json
  - runs/<run_id>/phases/<phase_id>/checks.json
  - runs/<run_id>/phases/<phase_id>/repair_attempts/
phases:
- id: FCFP-P00
  name: Campaign Bootstrap and Active Pointer
  lane: GREEN
  dependencies: []
  spec_required: true
  executor: Codex GPT-5.5 xhigh
  reviewer: Claude Opus 4.8 xhigh
  verifier: Claude Sonnet 4.6
  purpose: Land the campaign contract bundle, the root active pointer, and the fast-path docs/evidence scaffolding so Workflow 2 can plan and schedule.
  scope:
  - Confirm the 6-file campaign bundle is present and internally consistent.
  - Create the fast-path docs index and the value-free evidence directory skeleton.
  - Update the root ACTIVE_CAMPAIGN.md pointer (coordinator-owned).
  non_goals:
  - Any engine implementation, parity test, or value/DB writes.
  checks:
  - git status --short
  - test -f ACTIVE_CAMPAIGN.md
  - test -f campaigns/FEATURE_COMPUTE_FAST_PATH_V1/GOAL.md
  - test -f campaigns/FEATURE_COMPUTE_FAST_PATH_V1/PHASE_PLAN.md
  - test -f campaigns/FEATURE_COMPUTE_FAST_PATH_V1/campaign.yaml
  - test -f campaigns/FEATURE_COMPUTE_FAST_PATH_V1/ACCEPTANCE.md
  - test -f campaigns/FEATURE_COMPUTE_FAST_PATH_V1/RISK_REGISTER.md
  - test -f campaigns/FEATURE_COMPUTE_FAST_PATH_V1/RUNBOOK.md
  - test '!' -f campaigns/FEATURE_COMPUTE_FAST_PATH_V1/ACTIVE_CAMPAIGN.md
  - grep -q "FEATURE_COMPUTE_FAST_PATH_V1" ACTIVE_CAMPAIGN.md
  - python -c "import yaml; yaml.safe_load(open('campaigns/FEATURE_COMPUTE_FAST_PATH_V1/campaign.yaml'))"
  - python tools/verify.py --smoke
  - git ls-files runs
  handoff_required: true
  review_required: false
  auto_pr: true
  auto_merge: true
  parallel_safe: false
  must_run_alone: true
  conflicts_with: []
  resource_class: []
  merge_group: bootstrap
  allowed_paths:
  - campaigns/FEATURE_COMPUTE_FAST_PATH_V1/**
  - docs/feature_compute_fast_path/README.md
  - docs/feature_compute_fast_path/OVERVIEW.md
  - research/feature_compute_fast_path_v1/README.md
  - research/feature_compute_fast_path_v1/.gitkeep
  - handoffs/FEATURE_COMPUTE_FAST_PATH_V1/FCFP-P00.md
  - reviews/FEATURE_COMPUTE_FAST_PATH_V1/FCFP-P00/**
  - ACTIVE_CAMPAIGN.md
  - README.md
  forbidden_paths: *forbidden_paths
  artifact_policy: &ap
    commit_only:
    - campaign control + overview docs
    - value-free evidence directory skeleton
    - V1 code + parity/benchmark tests + tiny synthetic fixtures
    - value-free parity/benchmark/reconciliation summaries
    - commit-eligible handoff/review
    never_commit: *never_commit
    explicit_staging_only: true
  done_criteria:
  - Bundle present and consistent; root pointer selects this campaign; no campaign-local ACTIVE_CAMPAIGN.md; YAML parses; smoke passes; runs/ untracked.
  handoff: handoffs/FEATURE_COMPUTE_FAST_PATH_V1/FCFP-P00.md
  review: green lane; review optional.
- id: FCFP-P01
  name: V1 Engine Core + Reference-Parity Harness
  lane: YELLOW
  dependencies:
  - FCFP-P00
  spec_required: true
  executor: Codex GPT-5.5 xhigh
  reviewer: Claude Opus 4.8 xhigh
  verifier: Claude Sonnet 4.6
  purpose: Build the Polars pack-materializer engine core (load symbol-year canonical once, compute a pack of features vectorized, write Parquet-first values + register via the official keystone path with serial registry writes, exact feature_version_id identity) and a synthetic-fixture, CI-runnable reference-parity harness.
  scope:
  - Add src/alpha_system/features/fast/** with a PackMaterializer abstraction- a vectorized engine that loads a symbol-year canonical frame once (Polars) and computes a family's whole governed feature pack, then registers each FeatureVersion through the OFFICIAL FeatureStore keystone path (no hand-written rows; serial registry writes; Parquet-first; JSONL audit only).
  - Feature identity (feature_version_id) MUST equal the reference engine's content-addressed identity for the same FeatureSpec; the fast engine produces values, never new identities.
  - Add a reference-parity harness (tests/unit/feature_compute_fast_path/ + fixtures): given a tiny synthetic canonical frame, compute via reference and via fast pack, compare value (exact or documented tolerance), available_ts, and gap rows; unexplained diffs fail.
  - Record producer_engine_id + value_schema_version on fast-produced registry records (engine versioning hook).
  non_goals:
  - Implementing every family (later phases); real-data backfill; CLI targeting; touching the scaleout driver.
  checks: &v1_checks
  - git status --short
  - python tools/verify.py --smoke
  - python -m pytest tests/unit/feature_compute_fast_path/ -q
  - python -m pytest tests/no_lookahead/feature_label/test_synthetic_fail_closed.py -q
  - git ls-files runs
  - git ls-files '**/*.parquet' '**/*.sqlite'
  handoff_required: true
  review_required: true
  auto_pr: true
  auto_merge: true
  parallel_safe: false
  must_run_alone: true
  conflicts_with: []
  resource_class: []
  merge_group: engine_core
  allowed_paths: &v1_paths
  - src/alpha_system/features/fast/**
  - tests/unit/feature_compute_fast_path/**
  - tests/fixtures/feature_compute_fast_path/**
  - research/feature_compute_fast_path_v1/**
  - docs/feature_compute_fast_path/**
  - handoffs/FEATURE_COMPUTE_FAST_PATH_V1/FCFP-P01.md
  - reviews/FEATURE_COMPUTE_FAST_PATH_V1/FCFP-P01/**
  forbidden_paths: *forbidden_paths
  artifact_policy: *ap
  done_criteria:
  - PackMaterializer engine core + parity harness land; feature_version_id matches reference identity; serial registry writes via official path; Parquet-first; parity harness green on synthetic fixtures; boundary fail-closed test passes; no values/SQLite committed.
  handoff: handoffs/FEATURE_COMPUTE_FAST_PATH_V1/FCFP-P01.md
  review: yellow lane; fresh Opus review required.
- id: FCFP-P02
  name: base_ohlcv Polars Pack + Parity
  lane: YELLOW
  dependencies:
  - FCFP-P01
  spec_required: true
  executor: Codex GPT-5.5 xhigh
  reviewer: Claude Opus 4.8 xhigh
  verifier: Claude Sonnet 4.6
  purpose: Productionize the proven base_ohlcv Polars pack (returns, log_returns, rolling_volatility, rolling_range, range_position, volume_zscore) inside the V1 engine, with a synthetic-fixture parity test against the reference engine.
  scope:
  - Implement the base_ohlcv pack as Polars expressions matching the reference semantics (horizon=1, window=20, ddof=0, reset_on_session=False); reuse the proof formulas in research/futures_substrate_scaleout_v1/producer_fast_path/v1_proof_base_ohlcv.py.
  - Parity test on a tiny synthetic frame: 5/6 exact, volume_zscore within a documented float tolerance, insufficient_window gap rows exact.
  non_goals:
  - Other families; session-reset; real-data writes.
  checks: *v1_checks
  handoff_required: true
  review_required: true
  auto_pr: true
  auto_merge: true
  parallel_safe: true
  must_run_alone: false
  conflicts_with: []
  resource_class: []
  merge_group: family_packs
  allowed_paths: *v1_paths
  forbidden_paths: *forbidden_paths
  artifact_policy: *ap
  done_criteria: &pack_done
  - Family pack implemented in the V1 engine as Polars expressions; synthetic-fixture parity test passes (exact where expected, documented tolerance where float differences expected, gap rows exact); feature_version_id matches reference; no values/SQLite committed.
  handoff: handoffs/FEATURE_COMPUTE_FAST_PATH_V1/FCFP-P02.md
  review: yellow lane; fresh Opus review required.
- id: FCFP-P03
  name: session / calendar / maintenance Polars Pack + Parity
  lane: YELLOW
  dependencies:
  - FCFP-P01
  spec_required: true
  executor: Codex GPT-5.5 xhigh
  reviewer: Claude Opus 4.8 xhigh
  verifier: Claude Sonnet 4.6
  purpose: Implement the session/calendar/maintenance pack in the V1 engine (RTH/ETH flags, session-minute, maintenance flags, roll-session-id) with parity, including session-segment-aware logic.
  scope:
  - Vectorize session features over the dense/sparse frame; match the reference families/session semantics including the O(n) roll-session-id behavior.
  - Synthetic-fixture parity test (values, available_ts, gap rows, quality flags).
  non_goals:
  - Other families; real-data writes.
  checks: *v1_checks
  handoff_required: true
  review_required: true
  auto_pr: true
  auto_merge: true
  parallel_safe: true
  must_run_alone: false
  conflicts_with: []
  resource_class: []
  merge_group: family_packs
  allowed_paths: *v1_paths
  forbidden_paths: *forbidden_paths
  artifact_policy: *ap
  done_criteria: *pack_done
  handoff: handoffs/FEATURE_COMPUTE_FAST_PATH_V1/FCFP-P03.md
  review: yellow lane; fresh Opus review required.
- id: FCFP-P04
  name: vwap / session-auction Polars Pack + Parity
  lane: YELLOW
  dependencies:
  - FCFP-P01
  spec_required: true
  executor: Codex GPT-5.5 xhigh
  reviewer: Claude Opus 4.8 xhigh
  verifier: Claude Sonnet 4.6
  purpose: Implement the VWAP / session-auction pack in the V1 engine (running/anchored VWAP, distance-to-VWAP, opening/overnight range) with session-reset grouping and parity.
  scope:
  - Vectorize session-anchored cumulative VWAP and ranges with session-segment grouping (group rolling/cumulative by session); match reference vwap_session_auction semantics.
