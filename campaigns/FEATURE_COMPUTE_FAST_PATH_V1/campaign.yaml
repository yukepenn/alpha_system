campaign_id: FEATURE_COMPUTE_FAST_PATH_V1
campaign_name: 'Producer Compute Fast Path V1: a single-machine, local, columnar (Polars), batch/vectorized, incremental, reference-parity-gated, registry-safe producer compute engine for feature/label materialization, so large-scale backfill stops depending on the per-row Python reference engine (which remains the correctness oracle).'
repo_name: alpha_system
repo_path: ~/projects/alpha_system
project_profile:
  profile: trading_research
  mode: research
  layer: producer_compute_fast_path
  default_branch: main
  primary_language: python
  automation_lane: supervised
  risk_level: high
  human_review_required: true
  trading_enabled: true
  broker_enabled: false
  description: >-
    Substrate/infra engineering only. This campaign builds a vectorized Polars
    producer compute path (ADR-0007) that reproduces the existing per-row Python
    reference engine's feature/label values under a reference-parity gate, ~500x
    faster, so the paused ALPHA_FUTURES_RESEARCH_SUBSTRATE_SCALEOUT_V1 full-window
    backfill can resume on V1. The reference engine is never deleted and stays the
    oracle. It is NOT Ray/GPU/cluster, NOT a feature-compiler platform, NOT alpha
    ideation, NOT FactorLibrary/AlphaBook/Strategy Reference, NOT paper/live/broker.
    It makes no profitability or tradability claim.
workflow:
  active: workflow2
  workflow1:
    description: Human-gated phase loop; available but not the default for this campaign.
  workflow2:
    description: Ralph strict autonomous campaign loop with DAG-wave scheduling and a serial merge queue. Registry-writing / benchmark / integration phases are serialized by a shared registry resource_class.
    state_order:
    - RUN_INIT
    - CAMPAIGN_LOAD
    - PHASE_SELECT
    - SPEC_GENERATE
    - SPEC_VALIDATE
    - WORKTREE_CREATE
    - CODEX_EXECUTE
    - CHECKS_RUN
    - HANDOFF_VALIDATE
    - CLAUDE_REVIEW
    - VERDICT_PARSE
    - PR_CREATE
    - CI_WAIT
    - MERGE_GATE
    - MERGE
    - DONE_CHECK
    - NEXT_PHASE
    - CAMPAIGN_DONE_CHECK
    - RUN_SUMMARY
workflow2:
  scheduler:
    mode: dag_wave
    parallel_execution: true
    max_parallel_phases: 3
    merge_queue: serial
    update_active_campaign: coordinator_only
  notes:
  - Build phases in DAG order in isolated worktrees; merge one PR at a time.
  - Phase branches must never write ACTIVE_CAMPAIGN.md; the coordinator owns it.
  - Per-family pack phases (FCFP-P02..P10) edit distinct family modules + tests and
    use synthetic fixtures, so they are parallel-safe BUILD but serial MERGE. They
    do NOT write the production registry.
  - Phases that touch the real local registry or run benchmarks against real data
    (FCFP-P13 benchmark, FCFP-P12 reconciliation, FCFP-P14 driver integration) share
    resource_class materialization_registry and are NOT parallel_safe; the scheduler
    serializes them. No parallel SQLite writes.
  - Bootstrap / engine-core / CLI / versioning / benchmark / integration / closeout
    phases are must_run_alone.
runtime:
  python: '3.11'
  package_root: src/alpha_system
  test_root: tests
  smoke_command: python tools/verify.py --smoke
  full_command: python tools/verify.py --all
  canary_command: python tools/hooks/canary_runner.py
  research_venv: ~/.venvs/alpha_system_research
  data_root_env: ALPHA_DATA_ROOT
  optional_dependency_pattern: 'require_dependency("polars") / _optional_module("pyarrow"); core dependencies stay empty.'
  consumed_primitives:
  - src/alpha_system/features/primitives/causal.py (REFERENCE oracle; never deleted)
  - src/alpha_system/features/families/** (ohlcv, session, bbo, cross_market, structure) — reference compute the V1 packs must match
  - src/alpha_system/features/engine/materialization.py (reference materialization + plan/identity)
  - src/alpha_system/labels/families/** (fixed_horizon, cost_adjusted, path, event) — reference for label packs
  - src/alpha_system/core/value_store.py (Parquet/JSONL sink+reader, content hash, available_ts)
  - src/alpha_system/features/store.py + features/registry.py (official keystone registry write/resolve path)
  - src/alpha_system/features/scaleout/driver.py (existing scaleout orchestration to integrate V1 into)
  - src/alpha_system/cli/scaleout.py (CLI surface to extend with targeting)
  editable_in_campaign:
  - src/alpha_system/features/fast/** (NEW: V1 Polars pack engine + per-family packs + parity harness)
  - src/alpha_system/labels/fast/** (NEW: V1 label pack engine)
  - src/alpha_system/features/scaleout/driver.py (FCFP-P14: route to V1 producer path)
  - src/alpha_system/cli/scaleout.py (FCFP-P11: targeting/incremental flags + dry-run estimates)
  - tools/** and configs/** as needed; tests/** parity + benchmark fixtures
models:
  build_time_roles:
    strategy_campaign_framing: ChatGPT GPT-5.5 Thinking
    specs_semantic_review_done_check: Claude Opus 4.8 xhigh
    source_map_verifier_mechanical_audit: Claude Sonnet 4.6
    execution_tests_repair_handoffs: Codex GPT-5.5 xhigh
    orchestration_state_machine_dag_merge_queue: Ralph
  notes:
  - Build-time model roles write/review/merge the campaign.
  - No in-product autonomous agents are instantiated; this is engineering work driven by the strict Workflow 2 loop.
lane_policy:
  green: Low-risk automatic work (campaign control docs, indexes, value-free scaffolding).
  yellow: Material engineering work requiring fresh Claude Opus review.
  red: External, destructive, live, production, costly, or broker-adjacent work; requires scoped authorization.
  red_authorization_required:
  - PROJECT_OP_AUTHORIZED
  - PROJECT_OP_SCOPE
  - PROJECT_OP_EXPIRES
  red_expected_in_campaign: false
  default_lane: yellow
state_machine:
  driver: ralph
  strict: true
  stop_checks_before:
  - provider calls
  - phase selection
  - codex execution
  - validation
  - review
  - PR creation
  - CI waiting
  - merge gate
  - merge
  - done-check
  - next-phase selection
  resume: from recorded run state, never regenerating completed work
artifact_policy:
  never_commit: &never_commit
  - runs/**
  - raw or canonical market data
  - provider responses (Databento DBN/Zstd, IBKR)
  - materialized feature values
  - materialized label values
  - local SQLite registries (datasets/features/labels) and journals/WAL
  - benchmark output values / heavy artifacts
  - heavy artifacts (parquet/arrow/feather)
  - research run logs and caches
  never_commit_globs: &never_commit_globs
  - data/raw/**
  - data/canonical/**
  - registry/*.sqlite
  - metadata/*.sqlite
  - '**/*.sqlite'
  - '**/*.sqlite3'
  - '**/*.db'
  - '**/*.db-journal'
  - '**/*.wal'
  - '**/*.parquet'
  - '**/*.arrow'
  - '**/*.feather'
  - '**/*.dbn'
  - '**/*.zst'
  - '**/*.pkl'
  - '**/*.npy'
  - '**/*.npz'
  - '**/*.log'
  - '**/logs/**'
  - '**/tmp/**'
  - '**/cache/**'
  - '**/.pytest_cache/**'
  - runs/**
  - artifacts/**
  - '**/*credential*'
  local_only_by_default:
  - artifacts/**
  - runs/**
  - $ALPHA_DATA_ROOT/**
  allowed_commit:
  - campaign control files
  - docs
  - V1 engine + per-family/label pack code
  - reference-parity test code + tiny synthetic fixtures
  - benchmark harness code + value-free benchmark summaries
  - targeting/incremental CLI code + tests
  - engine/value-schema versioning code + reconciliation summaries (value-free)
  - handoffs
  - reviews
  tiny_fixture_exceptions:
    allowed: true
    paths:
    - tests/fixtures/**
    - tests/unit/feature_compute_fast_path/fixtures/**
    requirements:
    - synthetic
    - tiny
    - documented
    - not real market data
    - not alpha evidence
  research_evidence_artifacts:
    note: >-
      Evidence under research/feature_compute_fast_path_v1/** is commit-eligible ONLY
      when value-free: parity reports (counts, max/median diffs, tolerances), benchmark
      summaries (elapsed, rows/sec, speedup, estimates), and reconciliation summaries.
      Per-row feature/label values, Parquet, SQLite registries, and provider responses
      remain local-only under runs/** or $ALPHA_DATA_ROOT/** and are never committed.
  phase_requirements:
    explicit_artifact_policy_required: true
    explicit_staging_required: true
    artifact_audit_before_merge: true
    no_raw_data_commits: true
    no_canonical_data_commits: true
    no_feature_value_commits: true
    no_label_value_commits: true
    no_local_db_commits: true
    no_heavy_artifact_commits: true
git_policy:
  explicit_staging_only: true
  forbidden_commands:
  - git add .
  - git add -A
  force_push_allowed: false
  commit_raw_data_allowed: false
  commit_heavy_artifacts_allowed: false
  commit_local_db_allowed: false
  commit_feature_or_label_values_allowed: false
  require_handoff_per_phase: true
  require_git_status_short: true
  require_explicit_file_list_in_handoff: true
  clean_merge_gate_required: true
  artifact_audit_before_merge: true
  branch_prefix_workflow2: auto/
  commit_message_format: '<campaign_id>/<phase_id>: <summary>'
review_policy:
  reviewer: Claude Opus 4.8 xhigh
  verifier: Claude Sonnet 4.6
  yellow_requires_fresh_review: true
  green_review_optional: true
  red_requires_scoped_authorization: true
  review_artifacts:
    commit_eligible: reviews/FEATURE_COMPUTE_FAST_PATH_V1/<phase_id>/**
    run_local: runs/<run_id>/phases/<phase_id>/review.md and verdict.json
  semantic_done_check_required: true
  allowed_verdicts:
  - PASS
  - PASS_WITH_WARNINGS
  - BLOCKED
merge_policy:
  merge_queue: serial
  auto_merge_for_green: true
  auto_merge_for_yellow_after_review: true
  auto_merge_for_red: false
  clean_merge_gate_required: true
  artifact_audit_before_merge: true
  protected_branch: main
  no_force_push: true
  one_pr_at_a_time: true
parity_policy:
  reference_engine_is_oracle: true
  reference_engine_never_deleted: true
  parity_required_before_v1_is_production_for_a_family: true
  parity_dimensions:
  - feature value (exact where expected; documented numeric tolerance where float differences expected)
  - available_ts
  - label_available_ts (labels)
  - insufficient_window / input_gap / session_reset gap rows
  - missingness / quality flags
  - roll-splice and maintenance-crossing guard behavior (labels)
  unexplained_difference_is_blocker: true
  synthetic_fixture_tests_required: true
  ci_runnable_parity_required: true
benchmark_policy:
  bounded_real_benchmark_required_before_resume: true
  report_fields_required:
  - elapsed
  - rows_per_sec
  - canonical_reads_per_symbol_year
  - output_features_or_labels_per_read
  - full_accepted_window_runtime_estimate
  - speedup_vs_reference
  benchmark_values_local_only: true
identity_and_registry_policy:
  exact_feature_version_id_semantics_required: true
  exact_label_version_id_semantics_required: true
  keystone_identity_preserved: true
  feature_version_id_excludes_request_provenance: true
  serial_registry_writes_required: true
  no_manual_sqlite_writes: true
  official_keystone_write_path_required: true
  parquet_first_required: true
  jsonl_audit_tier_only: true
engine_versioning_policy:
  producer_engine_id_recorded: true
  value_schema_version_recorded: true
  reconcile_existing_reference_outputs_required: true
  never_mix_engines_silently_in_one_value_series: true
  on_within_tolerance_difference:
  - keep existing valid reference outputs as parity reference
  - record producer_engine_id so reference-vs-V1 provenance is explicit
  on_beyond_tolerance_difference:
  - treat as a V1 bug, OR
  - version the value schema explicitly, OR
  - re-materialize via the official path
targeting_policy:
  targeting_dimensions_required:
  - family
  - feature_id / feature_group
  - label_id / label_group
  - symbols
  - years / dataset_version_ids
  dry_run_estimate_required: true
  execute_selected_units_only_required: true
  skip_completed_via_checkpoint_and_registry_truth_required: true
  adding_one_feature_must_not_recompute_all_families: true
phase_defaults:
  spec_required: true
  executor: Codex GPT-5.5 xhigh
  reviewer: Claude Opus 4.8 xhigh
  verifier: Claude Sonnet 4.6
  handoff_required: true
  checks_required: true
  review_required: true
  artifact_policy_required: true
  semantic_done_check_required: true
  explicit_staging_only: true
  auto_pr: true
  auto_merge_for_yellow_after_review: true
  repair_attempt_limit: 2
  default_parallel_safe: false
  default_must_run_alone: true
  forbidden_global_changes:
  - broker integration
  - paper trading
  - live trading
  - order routing
  - order placement
  - production execution adapter
  - real-time market data loop
  - external provider call
  - raw provider data access by agents
  - direct SQLite registry writes outside sanctioned tool/CLI APIs
  - deleting or weakening the reference compute engine
  - weakening resolver exact-id semantics
  - new alpha ideation or new AlphaSpec batch
  - new features/labels beyond existing governed families
  - parameter optimization / param search
  - Ray / GPU / distributed / cluster compute
  - feature compiler / DSL platform
  - factor library V1 ingestion pipeline
  - strategy reference validation
  - AlphaBook construction
  - ML/DL/RL training
  - edits to execution/broker/live/signals/strategies/portfolio/management/l2/backtest/agent_factory
  - raw / canonical / feature value / label value / local DB / provider response / heavy artifact commit
  - alpha/profitability/tradability/production claim
  - test weakening or gaming
  forbidden_paths: &forbidden_paths
  - src/alpha_system/execution/**
  - src/alpha_system/broker/**
  - src/alpha_system/live/**
  - src/alpha_system/signals/**
  - src/alpha_system/strategies/**
  - src/alpha_system/portfolio/**
  - src/alpha_system/management/**
  - src/alpha_system/l2/**
  - src/alpha_system/backtest/**
  - src/alpha_system/agent_factory/**
  - data/raw/**
  - data/canonical/**
  - registry/*.sqlite
  - metadata/*.sqlite
  - artifacts/**
  - '**/*.parquet'
  - '**/*.arrow'
  - '**/*.feather'
  - '**/*.dbn'
  - '**/*.zst'
  - '**/*.sqlite'
  - '**/*.db'
run_outputs:
  run_level:
  - runs/<run_id>/RUN_GOAL.md
  - runs/<run_id>/PHASE_PLAN.md
  - runs/<run_id>/prd.json
  - runs/<run_id>/progress.txt
  - runs/<run_id>/state.json
  - runs/<run_id>/events.jsonl
