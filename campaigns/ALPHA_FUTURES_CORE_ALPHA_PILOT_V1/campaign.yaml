campaign_id: ALPHA_FUTURES_CORE_ALPHA_PILOT_V1
campaign_name: 'Futures Core Alpha Pilot V1: First small-but-real, evidence-gated, cost-aware ES/NQ/RTY alpha research loop over the completed Data + Feature/Label + Runtime + Agent Factory stack'
repo_name: alpha_system
repo_path: ~/projects/alpha_system
project_profile:
  profile: trading_research
  mode: research
  layer: core_alpha_pilot
  default_branch: main
  primary_language: python
  automation_lane: supervised
  risk_level: high
  human_review_required: true
  trading_enabled: true
  broker_enabled: false
  description: >-
    Research-only, bounded futures alpha pilot. This campaign drives the existing
    Data, Feature/Label, Research Runtime, and Agent Factory primitives through
    their sanctioned APIs to test a real controlled research loop on ES/NQ/RTY.
    It produces research evidence (specs, diagnostics, ledgers, evidence drafts,
    promotion decisions) only. It is not a backtester, strategy repo, or
    broker/live/paper system, and it makes no profitability or tradability claim.
workflow:
  active: workflow2
  workflow1:
    description: Human-gated phase loop for high-judgment work; available but not the default for this campaign.
  workflow2:
    description: Ralph strict autonomous campaign loop with DAG-wave parallel build and serial merge.
    state_order:
    - RUN_INIT
    - CAMPAIGN_LOAD
    - PHASE_SELECT
    - SPEC_GENERATE
    - SPEC_VALIDATE
    - WORKTREE_CREATE
    - CODEX_EXECUTE
    - CHECKS_RUN
    - HANDOFF_VALIDATE
    - CLAUDE_REVIEW
    - VERDICT_PARSE
    - PR_CREATE
    - CI_WAIT
    - MERGE_GATE
    - MERGE
    - DONE_CHECK
    - NEXT_PHASE
    - CAMPAIGN_DONE_CHECK
    - RUN_SUMMARY
workflow2:
  scheduler:
    mode: dag_wave
    parallel_execution: true
    max_parallel_phases: 3
    merge_queue: serial
    update_active_campaign: coordinator_only
  notes:
  - Build phases in parallel waves in isolated worktrees; merge one PR at a time.
  - Phase branches must never write ACTIVE_CAMPAIGN.md; the coordinator owns it.
  - Parallel waves require disjoint allowed_paths and no shared resource_class.
  - Ledger/promotion/review/audit/closeout phases are must_run_alone.
runtime:
  python: '3.11'
  package_root: src/alpha_system
  test_root: tests
  smoke_command: python tools/verify.py --smoke
  full_command: python tools/verify.py --all
  canary_command: python tools/hooks/canary_runner.py
  research_venv: ~/.venvs/alpha_system_research
  consumed_primitives:
  - src/alpha_system/governance (AlphaSpec, StudySpec, FeatureRequest, LabelSpec, TrialLedger, RejectedIdea, EvidenceBundle, PromotionGate, claims, registry, study_input_pack)
  - src/alpha_system/runtime (input_resolver, tool_results, diagnostics, cost, grid, probe, evidence, decisions, handoff, reports, smoke, dry_run)
  - src/alpha_system/agent_factory (roles, permissions, queue, records, memory, separation, tools, dry_run, runtime_bridge, entry_contract)
  - src/alpha_system/features, src/alpha_system/labels (consumed; minimal additions only in FUTCORE-P15 via FeatureRequest/LabelSpec)
models:
  build_time_roles:
    strategy_campaign_framing: ChatGPT GPT-5.5 Thinking
    specs_semantic_review_done_check: Claude Opus 4.8 xhigh
    source_map_verifier_mechanical_audit: Claude Sonnet 4.6
    execution_tests_repair_handoffs: Codex GPT-5.5 high
    orchestration_state_machine_dag_merge_queue: Ralph
  in_product_agent_roster_contracts_only:
  - Research Director
  - Hypothesis Scout
  - AlphaSpec Critic
  - Data Contract Auditor
  - Feature Engineer
  - Label Engineer
  - No-Lookahead Auditor
  - Diagnostics Runner
  - Statistical Reviewer
  - Librarian
  notes:
  - Build-time model roles write/review/merge the campaign.
  - In-product agent roles are driven from the Agent Factory contracts; they are constrained research workers, not autonomous traders.
lane_policy:
  green: Low-risk automatic work (campaign control docs, indexes, value-free scaffolding).
  yellow: Material research/engineering work requiring fresh Claude Opus review.
  red: External, destructive, live, production, costly, or broker-adjacent work; requires scoped authorization.
  red_authorization_required:
  - PROJECT_OP_AUTHORIZED
  - PROJECT_OP_SCOPE
  - PROJECT_OP_EXPIRES
  red_expected_in_campaign: false
  default_lane: yellow
state_machine:
  driver: ralph
  strict: true
  stop_checks_before:
  - provider calls
  - phase selection
  - codex execution
  - validation
  - review
  - PR creation
  - CI waiting
  - merge gate
  - merge
  - done-check
  - next-phase selection
  resume: from recorded run state, never regenerating completed work
artifact_policy:
  never_commit: &never_commit
  - runs/**
  - raw or canonical market data
  - provider responses (Databento DBN/Zstd, IBKR)
  - materialized feature values
  - materialized label values
  - runtime or agent heavy outputs
  - heavy artifacts (parquet/arrow/feather)
  - local DB/registry files (sqlite/db/wal)
  - research run logs and caches
  never_commit_globs:
  - data/raw/**
  - data/canonical/**
  - data/factors/**
  - data/labels/**
  - data/cache/**
  - metadata/*.sqlite
  - metadata/*.sqlite3
  - metadata/*.db
  - metadata/*.db-journal
  - metadata/*.wal
  - '**/*.sqlite'
  - '**/*.sqlite3'
  - '**/*.db'
  - '**/*.db-journal'
  - '**/*.wal'
  - '**/*.parquet'
  - '**/*.arrow'
  - '**/*.feather'
  - '**/*.dbn'
  - '**/*.zst'
  - '**/*.pkl'
  - '**/*.pickle'
  - '**/*.joblib'
  - '**/*.onnx'
  - '**/*.npy'
  - '**/*.npz'
  - '**/*.log'
  - '**/logs/**'
  - '**/tmp/**'
  - '**/temp/**'
  - '**/cache/**'
  - '**/.pytest_cache/**'
  - '**/.mypy_cache/**'
  - '**/.ruff_cache/**'
  - runs/**
  - artifacts/**/raw_outputs/**
  - '**/*credential*'
  - '**/generated_local_only/**'
  local_only_by_default:
  - artifacts/**
  - runs/**
  - $ALPHA_DATA_ROOT/**
  allowed_commit:
  - campaign control files
  - docs
  - value-free research evidence artifacts (markdown/JSON specs, reports, ledgers, decisions)
  - minimal feature/label primitive code (FUTCORE-P15 only, via FeatureRequest/LabelSpec)
  - tests
  - tiny synthetic fixtures
  - templates and prompt templates
  - handoffs
  - reviews
  - curated summaries
  tiny_fixture_exceptions:
    allowed: true
    paths:
    - tests/fixtures/**
    - tests/unit/futures_core_alpha_pilot/fixtures/**
    requirements:
    - synthetic
    - tiny
    - documented
    - not real market data
    - not alpha evidence
    - value-free or trivially-small
  research_evidence_artifacts:
    note: >-
      Pilot research evidence under research/futures_core_alpha_pilot_v1/** is
      commit-eligible ONLY when value-free: AlphaSpecs, StudySpecs, critiques,
      diagnostics reports (summary statistics/metadata only), cost/session/regime
      reports, ledgers, evidence drafts, reviewer verdicts, promotion decisions,
      and downstream handoffs. Raw or per-row feature/label/diagnostics values,
      Parquet, SQLite, and provider responses remain local-only under runs/** or
      $ALPHA_DATA_ROOT/** and are never committed.
  phase_requirements:
    explicit_artifact_policy_required: true
    explicit_staging_required: true
    artifact_audit_before_merge: true
    no_raw_data_commits: true
    no_canonical_data_commits: true
    no_feature_value_commits: true
    no_label_value_commits: true
    no_provider_response_commits: true
    no_runtime_or_agent_heavy_output_commits: true
    no_account_info_commits: true
    no_heavy_artifact_commits: true
    no_local_db_commits: true
git_policy:
  explicit_staging_only: true
  forbidden_commands:
  - git add .
  - git add -A
  force_push_allowed: false
  commit_raw_data_allowed: false
  commit_heavy_artifacts_allowed: false
  commit_local_db_allowed: false
  commit_provider_responses_allowed: false
  commit_feature_or_label_values_allowed: false
  require_handoff_per_phase: true
  require_git_status_short: true
  require_explicit_file_list_in_handoff: true
  clean_merge_gate_required: true
  artifact_audit_before_merge: true
  branch_prefix_workflow2: auto/
  commit_message_format: '<campaign_id>/<phase_id>: <summary>'
review_policy:
  reviewer: Claude Opus 4.8 xhigh
  verifier: Claude Sonnet 4.6
  yellow_requires_fresh_review: true
  green_review_optional: true
  red_requires_scoped_authorization: true
  review_artifacts:
    commit_eligible: reviews/ALPHA_FUTURES_CORE_ALPHA_PILOT_V1/<phase_id>/**
    run_local: runs/<run_id>/phases/<phase_id>/review.md and verdict.json
  semantic_done_check_required: true
  allowed_verdicts:
  - PASS
  - PASS_WITH_WARNINGS
  - BLOCKED
merge_policy:
  merge_queue: serial
  auto_merge_for_green: true
  auto_merge_for_yellow_after_review: true
  auto_merge_for_red: false
  clean_merge_gate_required: true
  artifact_audit_before_merge: true
  protected_branch: main
  no_force_push: true
  one_pr_at_a_time: true
phase_defaults:
  spec_required: true
  executor: Codex GPT-5.5 high
  reviewer: Claude Opus 4.8 xhigh
  verifier: Claude Sonnet 4.6
  handoff_required: true
  checks_required: true
  review_required: true
  artifact_policy_required: true
  semantic_done_check_required: true
  explicit_staging_only: true
  auto_pr: true
  auto_merge_for_yellow_after_review: true
  repair_attempt_limit: 2
  default_parallel_safe: false
  default_must_run_alone: true
  forbidden_global_changes:
  - broker integration
  - paper trading
  - live trading
  - order routing
  - order placement
  - account trading
  - production execution adapter
  - real-time market data loop
  - external provider call
  - raw provider data access from pilot code
  - direct registry writes outside sanctioned tool APIs
  - scaled or autonomous alpha mining
  - continuous unattended research runner
  - factor library V1 promotion
  - strategy reference validation
  - AlphaBook construction
  - strategy/backtest/portfolio research as a pilot product
  - ML/DL/RL training
  - L1/L2 event-stream ingestion
  - edits to consumed runtime/governance/agent_factory/research/experiments/backtest/data/core primitives
  - raw data commit
  - canonical data commit
  - feature value commit
  - label value commit
  - runtime or agent heavy output commit
  - provider response commit
  - heavy artifact commit
  - local DB commit
  - zero-cost result used as a promotion basis
  - locked-test tuning
  - self-review or self-promotion
  - alpha/profitability/tradability/production/capital-allocation claim
  - test weakening or gaming
run_outputs:
  run_level:
  - runs/<run_id>/RUN_GOAL.md
  - runs/<run_id>/PHASE_PLAN.md
  - runs/<run_id>/prd.json
  - runs/<run_id>/progress.txt
  - runs/<run_id>/state.json
  - runs/<run_id>/events.jsonl
  - runs/<run_id>/costs.jsonl
  - runs/<run_id>/STOP
  - runs/<run_id>/RUN_SUMMARY.md
  phase_level:
  - runs/<run_id>/phases/<phase_id>/spec.md
  - runs/<run_id>/phases/<phase_id>/executor_prompt.md
  - runs/<run_id>/phases/<phase_id>/executor_notes.md
  - runs/<run_id>/phases/<phase_id>/handoff.md
  - runs/<run_id>/phases/<phase_id>/review.md
  - runs/<run_id>/phases/<phase_id>/verdict.json
  - runs/<run_id>/phases/<phase_id>/checks.json
  - runs/<run_id>/phases/<phase_id>/repair_attempts/
pilot_policy:
  alpha_search_scope: bounded_pilot
  scaled_mining_allowed: false
  production_claims_allowed: false
  paper_live_allowed: false
  strategy_reference_validation_allowed: false
  factor_library_v1_allowed: false
  alpha_book_allowed: false
  success_definition: >-
    The real research loop works end-to-end, agents stay constrained, most ideas
    are rejected for clear reasons, gates hold, diagnostics are reviewable,
    cost/session/horizon/regime diagnostics exist, TrialLedger and
    RejectedIdeaLedger are populated, and at most 0-2 ideas reach WATCH or
    CANDIDATE_RESEARCH. Zero surviving ideas is acceptable if the rejection loop
    is healthy.
data_policy:
  accepted_dataset_version_required: true
  raw_provider_access_forbidden: true
  parquet_feature_label_values_required: true
  jsonl_large_research_scans_forbidden: true
  external_provider_calls_forbidden: true
  universe_in_scope:
  - ES
  - NQ
  - RTY
  universe_deferred:
  - MES
  - MNQ
  - M2K
  - rates
  - FX
  - commodities
  - vol products
  - options
  - equities
  - L1 eventstream
  - L2/L3
  required_data:
  - OHLCV-1m
  - BBO-1m
  - Definition/Statistics/Status metadata as available
  - canonical timestamps
  - available_ts
  - exchange_trade_date
  - session_segment
  - contract/continuous provenance
  - quality/missingness flags where available
feature_label_policy:
  feature_request_required_for_new_features: true
  label_spec_required_for_new_labels: true
  available_ts_required: true
  label_available_ts_required: true
  session_context_allowed_if_point_in_time: true
  registry_resolved_parquet_packs_required: true
  primary_label_horizons:
  - 5m
  - 10m
  - 15m
  - 30m
  optional_label_horizons:
  - 60m
  - 120m
  - 240m
  - session_close
  fragile_label_horizons:
  - 1m
  - 3m
  label_kinds:
  - mid_price
  - cost_adjusted
  - MFE
  - MAE
  - target_before_stop
  - triple_barrier
  true_forward_looking_labels_blocked: true
agent_policy:
  agent_factory_required: true
  self_review_forbidden: true
  self_promotion_forbidden: true
  role_permissions_required: true
  human_capital_judgment_required: true
  agents_are_constrained_workers_not_autonomous_traders: true
  scaled_autonomous_mining_allowed: false
  continuous_research_runner_allowed: false
  required_roles:
  - role: Research Director
    may_decide: [task scope and budget within queue policy]
    may_not_decide: [approve its own scoping as evidence, promote any factor or candidate]
  - role: Hypothesis Scout
    may_decide: [draft AlphaSpec content]
    may_not_decide: [approve its own AlphaSpec, implement, run diagnostics, promote]
  - role: AlphaSpec Critic
    may_decide: [reject or request revision]
    may_not_decide: [draft the spec it reviews, implement, promote]
  - role: Data Contract Auditor
    may_decide: [inputs available or blocked]
    may_not_decide: [bypass accepted-DatasetVersion policy, raw provider access, registry writes]
  - role: Feature Engineer
    may_decide: [implement an approved FeatureRequest]
    may_not_decide: [review its own implementation, promote]
  - role: Label Engineer
    may_decide: [implement an approved LabelSpec]
    may_not_decide: [review its own implementation, promote]
  - role: No-Lookahead Auditor
    may_decide: [flag lookahead/leakage/same-bar optimism]
    may_not_decide: [promote, draft the spec it audits]
  - role: Diagnostics Runner
    may_decide: [execute a bound StudySpec via runtime tools]
    may_not_decide: [promote, approve specs]
  - role: Statistical Reviewer
    may_decide: [independent reviewer verdict]
    may_not_decide: [review its own implementation, promote to paper/live]
  - role: Librarian
    may_decide: [record ledgers/memory after a reviewer verdict]
    may_not_decide: [update durable memory or registry without a reviewer verdict]
  separation_of_duties:
  - Hypothesis Scout cannot approve.
  - Feature/Label Engineer cannot review own implementation.
  - Diagnostics Runner cannot promote.
  - Statistical Reviewer must be independent of the implementer.
  - Librarian cannot update durable memory without a reviewer verdict.
  - Human owns capital/live judgment.
runtime_policy:
  runtime_tools_required: true
  evidence_draft_required: true
  reference_handoff_not_reference_validation: true
  fast_path_not_reference_truth: true
  runtime_consumed_via_tool_contracts_not_bypassed: true
  resolve_dataset_version_only: true
  runtime_package_not_edited: true
cost_policy:
  base_stress_required: true
  stress_1_required: true
  stress_2_required: true
  double_cost_required: true
  zero_cost_not_promotion_basis: true
  thin_session_stress_required: true
  layers:
  - hard transaction cost (broker/exchange/regulatory fees, versioned/dated where supported)
  - spread crossing (BBO bid/ask/mid/spread_ticks)
  - slippage proxy (bucketed proxy + stress profiles)
  profiles:
  - zero_cost
  - base
  - stress_1
  - stress_2
  - double_cost
horizon_session_policy:
  primary_horizons: [5m, 10m, 15m, 30m]
  fragile_horizons: [1m, 3m]
  extended_intraday_horizons_allowed: true
  flat_before_maintenance_break_required: true
  session_split_required: true
  session_horizon_matrix_required: true
  sampling_only_horizon: 1m
  required_session_views:
  - full_session
  - RTH_only
  - ETH_only
  - ETH_evening
  - ETH_overnight
  - pre_RTH
  - RTH
  - post_RTH
  - RTH_with_ETH_context
  guardrails:
  - final_session_high/low/vwap cannot be used intraday before session complete
  - RTH_with_ETH_context may use completed ETH context
  - running_session_high_so_far allowed only with correct available_ts
  - no position crosses exchange daily maintenance / trade-date break
  - ETH evidence is research-in-scope but not trading-approved
research_budget_policy:
  max_alpha_spec_drafts: 40
  max_approved_alpha_specs: 10
  max_new_feature_or_label_requests: 5
  max_diagnostics_survivors: 3
  max_watch_or_candidate_research: 2
  variant_budget_required: true
  family_budget_required: true
  family_budget:
    cross_market_relative_value: 0.40
    vwap_session_auction: 0.20
    regime_momentum_reversion: 0.15
    liquidity_sweep_failed_breakout: 0.15
    bbo_tradability_confirmation: 0.10
  volume_activity_overlay:
    standalone_budget_allowed: false
    existing_primitives_only: true
anti_overfit_policy:
  trial_ledger_required: true
  rejected_ideas_visible: true
  locked_test_tuning_forbidden: true
  duplicate_exposure_check_required: true
  cost_stress_required: true
  zero_cost_promotion_basis_forbidden: true
  no_repeated_selection_on_same_oos: true
  all_failures_recorded: true
  deferred_to_validation_governance_v1:
  - full DSR/PBO/PSR
  - full purged/embargo governance
  - full locked-test contamination system
  - full ResearchGraveyard hardening
promotion_policy:
  allowed_states:
  - REJECT
  - INCONCLUSIVE
  - WATCH
  - CANDIDATE_RESEARCH
  forbidden_states:
  - VALIDATED_RESEARCH
  - LIVE_APPROVED
  - PAPER_APPROVED
  - PRODUCTION_READY
  - CAPITAL_ALLOCATED
  - PROFITABLE
  - TRADABLE
  - STRATEGY_READY
  - PORTFOLIO_READY
  definitions:
    WATCH: weak but interesting evidence; not ready for strategy/reference/live.
    CANDIDATE_RESEARCH: worthy of later FactorLibrary / Strategy Reference review; not paper/live/capital.
    REJECT: failed with a recorded reason.
    INCONCLUSIVE: insufficient or unstable evidence.
  reviewer_verdict_required_for: [WATCH, CANDIDATE_RESEARCH]
  survivor_outputs_factorlibrary_ready:
  - FactorCard draft
  - EvidenceDraft / EvidenceBundle input
  - TrialLedger refs
  - ReviewerVerdict
  - RejectedIdea refs
  - duplicate exposure group hint
phases:
- id: FUTCORE-P00
  name: Core Alpha Pilot Campaign Bootstrap
  lane: GREEN
  dependencies: []
  spec_required: true
  executor: Codex GPT-5.5 high
  reviewer: Claude Opus 4.8 xhigh
  verifier: Claude Sonnet 4.6
  purpose: Land the campaign contract bundle, the root active pointer, and the pilot artifact/doc scaffolding so Workflow 2 can plan and schedule.
  scope:
  - Confirm the 6-file campaign bundle is present and internally consistent.
  - Create the pilot docs index and the value-free research evidence directory skeleton.
  - Update the root ACTIVE_CAMPAIGN.md pointer (coordinator-owned).
  non_goals:
  - Any alpha research, AlphaSpec drafting, or diagnostics.
  - Any code under src/alpha_system primitives.
  checks:
  - git status --short
  - test -f ACTIVE_CAMPAIGN.md
  - test -f campaigns/ALPHA_FUTURES_CORE_ALPHA_PILOT_V1/GOAL.md
  - test -f campaigns/ALPHA_FUTURES_CORE_ALPHA_PILOT_V1/PHASE_PLAN.md
  - test -f campaigns/ALPHA_FUTURES_CORE_ALPHA_PILOT_V1/campaign.yaml
  - test -f campaigns/ALPHA_FUTURES_CORE_ALPHA_PILOT_V1/ACCEPTANCE.md
  - test -f campaigns/ALPHA_FUTURES_CORE_ALPHA_PILOT_V1/RISK_REGISTER.md
  - test -f campaigns/ALPHA_FUTURES_CORE_ALPHA_PILOT_V1/RUNBOOK.md
  - test '!' -f campaigns/ALPHA_FUTURES_CORE_ALPHA_PILOT_V1/ACTIVE_CAMPAIGN.md
  - test -f handoffs/ALPHA_FUTURES_CORE_ALPHA_PILOT_V1/FUTCORE-P00.md
  - grep -q "ALPHA_FUTURES_CORE_ALPHA_PILOT_V1" ACTIVE_CAMPAIGN.md
  - python tools/verify.py --smoke
  - git ls-files runs
  handoff_required: true
  review_required: false
  auto_pr: true
  auto_merge: true
  parallel_safe: false
  must_run_alone: true
  conflicts_with: []
  resource_class: []
  merge_group: bootstrap
  allowed_paths:
  - campaigns/ALPHA_FUTURES_CORE_ALPHA_PILOT_V1/**
  - docs/futures_core_alpha_pilot/README.md
  - docs/futures_core_alpha_pilot/OVERVIEW.md
  - research/futures_core_alpha_pilot_v1/README.md
  - research/futures_core_alpha_pilot_v1/.gitkeep
  - handoffs/ALPHA_FUTURES_CORE_ALPHA_PILOT_V1/FUTCORE-P00.md
  - reviews/ALPHA_FUTURES_CORE_ALPHA_PILOT_V1/FUTCORE-P00/**
  - runs/**
  - ACTIVE_CAMPAIGN.md
  forbidden_paths: &forbidden_paths
  - src/alpha_system/execution/**
  - src/alpha_system/broker/**
  - src/alpha_system/live/**
  - src/alpha_system/runtime/**
  - src/alpha_system/governance/**
  - src/alpha_system/agent_factory/**
  - src/alpha_system/experiments/**
  - src/alpha_system/backtest/**
  - src/alpha_system/research/**
  - src/alpha_system/signals/**
  - src/alpha_system/strategies/**
  - src/alpha_system/portfolio/**
  - src/alpha_system/management/**
  - src/alpha_system/l2/**
  - src/alpha_system/data/**
  - src/alpha_system/core/**
  - src/alpha_system/reports/**
  - src/alpha_system/factors/**
  - src/alpha_system/features/**
  - src/alpha_system/labels/**
  - src/alpha_system/cli/**
  - data/raw/**
  - data/canonical/**
  - data/factors/**
  - data/labels/**
  - data/cache/**
  - metadata/*.sqlite
  - metadata/*.db
  - artifacts/**
  - '**/*.parquet'
  - '**/*.arrow'
  - '**/*.feather'
  - '**/*.dbn'
  - '**/*.zst'
  - '**/*.sqlite'
  - '**/*.db'
  artifact_policy:
    commit_only:
    - campaign control + overview docs
    - value-free research evidence directory skeleton
    - commit-eligible handoff
    never_commit: *never_commit
    explicit_staging_only: true
  done_criteria:
  - Bundle present and consistent; root pointer selects this campaign; no campaign-local ACTIVE_CAMPAIGN.md; smoke passes; runs/ untracked.
  handoff: handoffs/ALPHA_FUTURES_CORE_ALPHA_PILOT_V1/FUTCORE-P00.md
  review: green lane; review optional.
- id: FUTCORE-P01
  name: 'Preflight: PRE_CORE Hardening, DatasetVersion, Parquet Packs, Runtime, Agent Factory'
  lane: YELLOW
  dependencies:
  - FUTCORE-P00
