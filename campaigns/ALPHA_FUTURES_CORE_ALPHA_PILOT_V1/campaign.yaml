    - no_lookahead_and_leakage_audit_required
    - trial_ledger_and_rejected_idea_ledger_required
    - reviewer_verdict_required_for_watch_or_candidate
    - independent_reviewer_no_self_review_no_self_promotion
    - promotion_boundary_respected_allowed_states_only
    - no_scaled_or_autonomous_mining
