    - P26 ledgers
    - Claude review
  promotion_boundary:
    required: true
    rules:
      allowed_states_only: true
      reviewer_verdict_required_for_watch_or_candidate: true
      max_two_survivors: true
      no_forbidden_state: true
      candidate_not_capital_or_live: true
    detection:
    - P25 verdicts
    - P28 promotion
    - Claude review
  agent_separation_of_duties:
    required: true
    rules:
      no_self_review: true
      no_self_promotion: true
      role_permissions_enforced: true
      human_owns_capital_live: true
    detection:
    - role/permission audit
    - Claude review
  no_strategy_paper_live_scope:
    required: true
    rules:
      no_strategy_backtest_portfolio_product: true
      no_paper_live_broker_order_code: true
      no_capital_allocation: true
    detection:
    - scope audit
    - import audit
    - Claude review
  no_claims:
    required: true
    rules:
      no_alpha_tradability_profitability_production_capital_claim: true
      research_interpretation_policy_respected: true
    detection:
    - claims scan
    - Claude review
  dag_and_artifact_discipline:
    required: true
    rules:
      parallel_phases_disjoint_allowed_paths: true
      no_global_path_in_parallel_phase: true
      serial_merge_queue: true
      phase_branches_do_not_write_active_campaign: true
      explicit_staging_only: true
    detection:
    - frontier-plan
    - dag_scheduler
    - artifact audit
stop_conditions:
- name: STOP file active
  condition: runs/<run_id>/STOP indicates active stop
  action: stop_before_new_phase_or_merge
- name: scaled or autonomous alpha mining introduced
  condition: broad alpha search, scaled mining, or a continuous autonomous research runner appears
  action: block_merge_and_escalate
- name: raw provider data read by pilot code
  condition: pilot code reads raw Databento/IBKR files (.dbn/.zst/parquet/arrow/feather) directly
  action: block_merge_and_repair
- name: accepted DatasetVersion bypassed
  condition: study inputs produced without resolving an admissible DatasetVersion via resolve_dataset_version
  action: block_merge_and_repair
- name: external Databento or IBKR API call attempted
  condition: any external provider API call is attempted in this campaign
  action: stop_and_escalate
- name: runtime bypassed
  condition: pilot code performs diagnostics directly instead of calling the runtime tool surface (RuntimeToolResult/RuntimeRunSummary / alpha runtime CLI)
  action: block_merge_and_repair
- name: consumed primitive edited
  condition: a phase edits src/alpha_system/runtime|governance|agent_factory|research|experiments|backtest|data|core instead of consuming it (features/labels only in FUTCORE-P15)
  action: block_merge_and_repair
- name: AlphaSpec or StudySpec bypassed
  condition: a diagnostics request is routed without a bound AlphaSpec and StudySpec
  action: block_merge_and_repair
- name: new feature without FeatureRequest or new label without LabelSpec
  condition: a feature/label primitive is added without a FeatureRequest/LabelSpec record
  action: block_merge_and_repair
- name: parquet values not used for research-scale scans
  condition: a research-scale scan reads JSONL or hand-read arbitrary paths instead of registry-resolved Parquet values
  action: block_merge_and_repair
- name: session_label guard regressed
  condition: session-context features are used without point-in-time SESSION_METADATA / role-aware guard
  action: block_merge_and_rework
- name: same-bar optimism or label leakage
  condition: a study uses same-bar optimism, invalid available_ts/label_available_ts, or final-session aggregates intraday
  action: block_merge_and_rework
- name: weak or missing cost stress
  condition: a survivor lacks base/stress_1/stress_2/double_cost stress or relies on a zero-cost promotion basis
  action: block_merge_and_rework
- name: fragile horizon or ETH overclaimed
  condition: a 1-3m fragile horizon or thin-session ETH result is presented as robust without stricter gates
  action: block_merge_and_rework
- name: variant budget exceeded
  condition: a study exceeds its declared VariantBudget or performs locked-test tuning or repeated OOS selection
  action: block_merge_and_repair
- name: rejected idea hidden
  condition: a failed or rejected idea is hidden instead of recorded with a RejectedIdea/RejectionReason record
  action: block_merge_and_repair
- name: self-review or self-promotion
  condition: a generator approves its own AlphaSpec, an implementer reviews its own work, a diagnostics runner promotes, or a reviewer is the implementer
  action: block_merge_and_rework
- name: librarian writes registry/memory without verdict
  condition: the Librarian updates a registry or durable memory without a reviewer verdict
  action: block_merge_and_rework
- name: forbidden promotion state used
  condition: any of VALIDATED_RESEARCH/LIVE_APPROVED/PAPER_APPROVED/PRODUCTION_READY/CAPITAL_ALLOCATED/PROFITABLE/TRADABLE/STRATEGY_READY/PORTFOLIO_READY is assigned
  action: block_merge_and_escalate
- name: too many survivors
  condition: more than two ideas reach WATCH or CANDIDATE_RESEARCH
  action: block_merge_and_rework
- name: EvidenceDraft treated as candidate or candidate treated as live/paper readiness
  condition: an EvidenceDraft is presented as a candidate, or a candidate is treated as paper/live/capital readiness
  action: block_merge_and_rework
- name: ReferenceCandidateHandoff treated as Reference validation
  condition: a ReferenceCandidateHandoff is presented as completed Reference validation
  action: block_merge_and_rework
- name: strategy/backtest/portfolio or factor-library/strategy-reference/alpha-book scope introduced
  condition: strategy optimization, backtest-as-product, portfolio allocation, FactorLibrary V1 promotion, Strategy Reference validation, or AlphaBook scope appears
  action: block_merge_and_escalate
- name: capital or live judgment automated
  condition: an agent makes a risk/capital/live decision reserved for the human, or creates paper/live/broker/order code
  action: stop_and_escalate
- name: alpha/profitability/tradability claim detected
  condition: an unqualified alpha, tradability, profitability, market-beating, production-ready, live-ready, or broker-ready claim appears
  action: block_merge_and_rework
- name: raw or heavy data artifact staged
  condition: raw/canonical/feature/label/runtime/agent values, parquet/arrow/feather, provider responses, or local DB files staged
  action: block_merge_and_repair
- name: parallel phase lacks allowed_paths
  condition: a phase marked parallel_safe declares no allowed_paths or declares a global/coordinator path
  action: block_campaign_execution_until_fixed
- name: parallel wave has path/resource conflict
  condition: two phases scheduled in the same wave have overlapping allowed_paths or a shared resource_class
  action: stop_phase_selection
- name: phase branch writes ACTIVE_CAMPAIGN.md in parallel mode
  condition: a phase branch writes ACTIVE_CAMPAIGN.md while update_active_campaign is coordinator_only
  action: block_merge_and_repair
- name: merge outside serial merge queue
  condition: a merge is attempted outside the serial merge queue (more than one PR merging at once)
  action: stop_and_escalate
- name: campaign YAML invalid
  condition: campaign.yaml fails YAML parse
  action: block_campaign_execution_until_fixed
- name: phase dependency missing
  condition: selected phase dependencies are incomplete or blocked
  action: stop_phase_selection
- name: acceptance gates missing phases
  condition: acceptance_gates do not cover every phase exactly once
  action: block_campaign_execution_until_fixed
- name: PHASE_PLAN / campaign.yaml mismatch
  condition: phase ids, names, lanes, dependencies, or DAG metadata disagree between files
  action: block_campaign_execution_until_fixed
- name: Claude review BLOCKED
  condition: review verdict is BLOCKED
  action: blocked_handoff_and_stop
- name: repair attempts exceeded
  condition: repair loop exceeds configured max attempts
  action: blocked_handoff_and_stop
- name: active repo/worktree under forbidden Windows path
  condition: active worktree under /mnt/c, OneDrive, Dropbox, Google Drive, or Windows-synced folder
  action: stop_run_init_or_worktree_create
