risk_controls:
  bounded_pilot_not_scaled_mining:
    required: true
    rules:
      finite_idea_alpha_spec_variant_survivor_budgets: true
      no_broad_alpha_discovery: true
      no_continuous_autonomous_runner: true
      no_factor_promotion_or_factor_library_v1: true
    detection:
    - scope audit
    - budget audit
    - Claude review
  runtime_consumed_not_bypassed:
    required: true
    rules:
      diagnostics_via_runtime_tool_surface: true
      resolve_dataset_version_only: true
      runtime_package_not_edited: true
    detection:
    - source path audit
    - import audit
    - Claude review
  no_raw_provider_access:
    required: true
    rules:
      raw_provider_files_not_read_by_pilot_code: true
      registry_resolved_parquet_values_only: true
      no_external_provider_calls: true
    detection:
    - source path audit
    - import audit
    - Claude review
  parquet_values_required:
