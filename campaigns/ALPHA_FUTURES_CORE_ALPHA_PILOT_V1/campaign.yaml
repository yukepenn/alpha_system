      no_final_session_aggregate_intraday: true
      cross_instrument_availability_enforced: true
      no_same_bar_optimism: true
    detection:
    - P23 audit
    - canary_runner
    - Claude review
  cost_stress_required:
    required: true
    rules:
      base_stress_1_stress_2_double_cost_required: true
      zero_cost_not_promotion_basis: true
      thin_session_stress_required: true
    detection:
    - P21 consolidation
    - Claude review
  overfit_controls:
    required: true
    rules:
      variant_budget_required: true
      no_locked_test_tuning: true
      no_repeated_oos_selection: true
