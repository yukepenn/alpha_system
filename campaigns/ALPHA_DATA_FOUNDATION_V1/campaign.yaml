campaign_id: ALPHA_DATA_FOUNDATION_V1
campaign_name: Read-Only Real-Market-Data Truth Layer for AI Alpha Research
repo_name: alpha_system
repo_path: ~/projects/alpha_system
project_profile:
  primary: trading_research
  secondary: research
  project_type: data_foundation
  profiles:
  - trading_research
  - research
  - data_foundation
  builds_on:
  - ALPHA_SYSTEM_V1
  - ASV1_RELEASE_HYGIENE
  - ALPHA_RESEARCH_GOVERNANCE_MVP
  local_first: true
  data_foundation_layer_not_alpha_search: true
  ibkr_read_only_historical_source_only: true
  future_multi_asset_ready: true
  future_l2_ready: true
  broker_live_trading_in_scope: false
  paper_trading_in_scope: false
  order_placement_in_scope: false
  account_trading_in_scope: false
  alpha_search_in_scope: false
  factor_label_research_in_scope: false
  production_trading_claims_allowed: false
  alpha_tradability_claims_allowed_without_evidence: false
workflow:
  harness: Frontier Harness Generic
  harness_version: '3.0'
  workflow_id: Workflow 2
  driver: Ralph
  executor: Codex
  reviewer: Claude
  mode: Ralph-driven strict autonomous loop
  loose_loop: false
  fresh_context_per_phase: true
  git_memory: true
  campaign_contract_based: true
  automatic_pr_merge_by_lane: true
  stop_file_supported: true
  semantic_done_check_required: true
  handoff_required_per_phase: true
  review_required_for_yellow: true
  fake_completion_forbidden: true
runtime:
  host: Windows
  primary_environment: WSL2 Ubuntu
  primary_runtime: WSL2 Ubuntu
  repo_must_live_under: ~/projects/alpha_system
  required_filesystem: WSL2 Linux filesystem
  forbidden_active_paths:
  - /mnt/c
  - /mnt/d
  - /mnt/e
  - OneDrive
  - Dropbox
  - Google Drive
  - Windows-synced folders
  - network drives
  - temporary directories
  forbidden_active_worktree_paths:
  - /mnt/c
  - /mnt/d
  - /mnt/e
  - OneDrive
  - Dropbox
  - Google Drive
  - Windows-synced folders
  - network drives
  - temporary directories
  local_first: true
  cloud_db_required: false
  paid_db_required: false
  broker_credentials_required: false
  live_market_data_required: false
  external_provider_calls_require_red_authorization: true
models:
  strategy:
    name: ChatGPT Pro GPT-5.5 Thinking
    model: ChatGPT Pro / GPT-5.5 Thinking
    responsibilities:
    - strategy
    - roadmap
    - campaign reasoning
    - post-run reasoning
  spec_review_donecheck:
    name: Claude Opus 4.8 xhigh
    model: Claude Opus
    responsibilities:
    - phase specs
    - architecture specs
    - semantic review
    - done-check
    - campaign decomposition
  verifier:
    name: Claude Sonnet 4.6
    model: Claude Sonnet
    responsibilities:
    - source maps
    - verifier support
    - audits
    - mechanical inspection
  executor:
    name: Codex GPT-5.5 high
    model: Codex GPT-5.5 high
    responsibilities:
    - implementation
    - tests
    - repair
    - handoff writing
  orchestrator:
    name: Ralph
    model: Ralph
    responsibilities:
    - Workflow 2 state machine
    - run control
    - phase transitions
    - STOP/resume
    - validation ledger
    - review routing
    - verdict parsing
    - PR/CI/merge gates
    - bounded repair enforcement
lane_policy:
  GREEN:
    description: Low-risk docs, scaffolding, and mechanical work.
    automatic_execute: true
    automatic_repair: true
    automatic_pr: true
    automatic_merge: true
    claude_review_required: false
    checks_required: true
    artifact_policy_required: true
    handoff_required: true
    merge_requires:
    - checks_pass
    - handoff_valid
    - artifact_policy_pass
    - no_forbidden_paths
    - no_stop_file
    - semantic_done_check_pass
  YELLOW:
    description: Material data-foundation engineering or research-protocol work; no external
      provider call.
    automatic_execute: true
    automatic_repair: true
    automatic_pr: true
    automatic_merge: true
    claude_review_required: true
    required_reviewer: Claude Opus 4.8 xhigh
    checks_required: true
    artifact_policy_required: true
    handoff_required: true
    most_phases: true
    merge_requires:
    - checks_pass
    - handoff_valid
    - claude_review_complete
    - verdict_PASS_or_PASS_WITH_WARNINGS
    - artifact_policy_pass
    - no_forbidden_paths
    - no_stop_file
    - semantic_done_check_pass
  RED:
    description: External, stateful, local-heavy, provider-facing operations. In this campaign
      RED means external IBKR calls and heavy local writes; RED never means trading.
    automatic_execute_when_scoped: true
    automatic_repair: false
    automatic_merge: false
    claude_review_required: true
    required_reviewer: Claude Opus 4.8 xhigh
    required_scope_env:
    - PROJECT_OP_AUTHORIZED
    - PROJECT_OP_SCOPE
    - PROJECT_OP_EXPIRES
    required_data_authorization_env:
    - ALPHA_DATA_PULL_AUTHORIZED
    - ALPHA_ALLOW_EXTERNAL_IBKR
    expected_in_this_campaign: true
    expected_red_phases:
    - DATA-P22
    - DATA-P23
    red_requires:
    - explicit_external_authorization
    - human_authorization
    - no_ci_execution
    - local_only_outputs
    - no_data_artifacts_committed
    - no_order_api_surface
    - no_stop_file
    note: RED here authorizes read-only external IBKR historical pulls and heavy local writes
      only. Order placement, account trading, paper, and live scope remain forbidden in every
      lane.
state_machine:
  strict: true
  states:
  - RUN_INIT
  - CAMPAIGN_LOAD
  - PHASE_SELECT
  - SPEC_GENERATE
  - SPEC_VALIDATE
  - WORKTREE_CREATE
  - CODEX_EXECUTE
  - CHECKS_RUN
  - HANDOFF_VALIDATE
  - CLAUDE_REVIEW
  - VERDICT_PARSE
  - PR_CREATE
  - CI_WAIT
  - MERGE_GATE
  - MERGE
  - DONE_CHECK
  - NEXT_PHASE
  - CAMPAIGN_DONE_CHECK
  - RUN_SUMMARY
  failure_routes:
    REWORK:
      route: bounded_repair_loop
      repair_attempts_tracked: true
      max_repair_attempts_default: 3
      repair_attempts_path: runs/<run_id>/phases/<phase_id>/repair_attempts/
      requires_repair_attempt_record: true
      fake_completion_forbidden: true
    BLOCKED:
      route: blocked_handoff_and_stop_or_escalation
      blocked_handoff_required: true
      dependent_phases_blocked: true
      fake_completion_allowed: false
    FAIL:
      route: checks_failure_repair_loop_or_blocked_handoff
      repair_attempts_tracked: true
      fake_completion_forbidden: true
data_lifecycle_state_machine:
  description: Lifecycle that future data-foundation objects must enforce. Listed here as the
    contract Workflow 2 phases implement; not executed by Ralph itself.
  states:
  - NOT_REQUESTED
  - REQUEST_PLANNED
  - REQUEST_AUTHORIZED
  - REQUEST_SUBMITTED
  - PARTIAL_RAW
  - RAW_COMPLETE
  - RAW_FAILED
  - PARSED
  - CANONICALIZED
  - QUALITY_CHECKED
  - VERSIONED
  - REJECTED
  - QUARANTINED
  - READY_FOR_RESEARCH
  prohibited_mvp_states:
  - READY_FOR_TRADING
  - LIVE_FEED_READY
  - BROKER_ENABLED
  - ALPHA_VALIDATED
  - PROFITABLE
  prohibited_state_note: Listed only as future non-MVP concepts. They must not be reachable by
    any transition implemented in this campaign.
  transitions:
  - from: NOT_REQUESTED
    to: REQUEST_PLANNED
    requires: HistoricalRequestSpec
  - from: REQUEST_PLANNED
    to: REQUEST_AUTHORIZED
    requires: manifest, clientId validation, local data root validation
  - from: REQUEST_AUTHORIZED
    to: REQUEST_SUBMITTED
    requires: RED-lane authorization for external IBKR calls
  - from: REQUEST_SUBMITTED
    to: PARTIAL_RAW
    requires: at least one completed chunk
  - from: PARTIAL_RAW
    to: RAW_COMPLETE
    requires: all chunks accounted for or explicit incomplete ledger
  - from: RAW_COMPLETE
    to: PARSED
    requires: parser success and raw object refs
  - from: PARSED
    to: CANONICALIZED
    requires: timestamp/session/contract normalization
  - from: CANONICALIZED
    to: QUALITY_CHECKED
    requires: quality report
  - from: QUALITY_CHECKED
    to: VERSIONED
    requires: coverage report, manifest hash, code hash, config hash
  - from: VERSIONED
    to: READY_FOR_RESEARCH
    requires: dataset version, non-blocking quality status, coverage status, artifact policy pass
  - from: any
    to: REJECTED
    requires: reason and error records
  - from: any
    to: QUARANTINED
    requires: uncertain provenance, gaps, session defects, roll issues, or timestamp defects
  blocks:
  - missing manifest blocks provider pull
  - clientId 101/102 blocks connection
  - missing pacing guard blocks pull
  - missing local data root policy blocks raw write
  - missing available_ts blocks canonicalization
  - silent gaps block versioning
  - raw data commit blocks merge
  - order API surface blocks merge
  - alpha/tradability claims block merge
