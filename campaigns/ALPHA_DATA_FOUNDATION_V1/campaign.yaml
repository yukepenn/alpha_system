risk_controls:
  no_alpha_claims:
    required: true
    blocked_claims:
    - alpha without evidence
    - tradability
    - profitability
    - market-beating
    - production-ready
    - live-ready
    - broker-ready
    - data fully pulled
    - data quality accepted unless describing future criteria
    detection:
    - prohibited claim tests
    - doc grep
    - Claude review
  no_raw_data_commits:
    required: true
    blocked_patterns:
    - data/raw/**
    - data/canonical/**
    - data/factors/**
    - data/labels/**
    - provider responses
    - account info
    - '**/*.parquet outside tests/fixtures documented tiny synthetic exceptions'
    exceptions:
    - tests/fixtures/** when tiny synthetic fixture and documented
    - '**/.gitkeep'
    - '**/README.md'
    detection:
    - git status audit
    - git ls-files audit
    - artifact policy checks
  no_heavy_artifacts:
    required: true
    detection:
    - find artifacts -type f -size +1M -print
    - artifact manifest audit
    - handoff artifact confirmation
  no_order_api_surface:
    required: true
    rules:
      data_module_cannot_place_orders: true
      order_method_kill_switch_required: true
    detection:
    - read-only boundary tests
    - source path audit
    - Claude review
  client_id_101_102_forbidden:
    required: true
    rules:
      client_id_101_fail_closed: true
      client_id_102_fail_closed: true
      default_client_id_201: true
      allowed_range_201_209: true
    detection:
    - client id guard tests
    - connection profile validation tests
    - Claude review
  ibkr_external_calls_require_red_authorization:
    required: true
    rules:
      external_provider_calls_require_red_authorization: true
      real_data_pull_forbidden_in_ci: true
    detection:
    - data access mode tests
    - RED-lane authorization checks
    - CI configuration audit
  request_manifest_required:
    required: true
    rules:
      no_provider_pull_without_manifest: true
      duplicate_request_detection_required: true
    detection:
    - manifest validation tests
    - planner tests
    - Claude review
  pacing_and_resume_required:
    required: true
    rules:
      pacing_guard_required: true
      resume_ledger_required: true
      no_silent_gaps: true
      no_raw_overwrite: true
    detection:
    - pacing policy tests
    - resume ledger tests
    - coverage audit
  provenance_required:
    required: true
    rules:
      continuous_not_dated_truth: true
      dated_truth_availability_must_be_logged: true
      adjusted_vs_unadjusted_explicit: true
    detection:
    - provenance tests
    - Claude review
  timestamp_semantics_required:
    required: true
    rules:
      canonical_available_ts_required: true
      event_ts_bar_end_ts_available_ts_not_conflated: true
    detection:
    - canonical bar tests
    - no_lookahead test suite
    - Claude review
  quality_and_coverage_required:
    required: true
    rules:
      quality_report_required: true
      coverage_report_required: true
      silent_gaps_fail_closed: true
    detection:
    - quality report tests
    - coverage report tests
    - Claude review
  dataset_version_required:
    required: true
    rules:
      dataset_version_requires_manifest_quality_and_coverage: true
      reproducible_hashes_required: true
    detection:
    - dataset version tests
    - registry audit
  locked_test_metadata_required:
    required: true
    rules:
      partition_plan_required: true
      locked_test_contamination_metadata_rules_required: true
    detection:
    - partition plan tests
    - Claude review
  batch_separation_required:
    required: true
    rules:
      mini_main_es_nq_rty: true
      micro_secondary_mes_mnq_m2k: true
      max_concurrent_roots_le_3: true
      do_not_mix_mini_and_micro_batches: true
    detection:
    - batch plan tests
    - Claude review
  acceptance_gate_coverage_required:
    required: true
    rules:
      every_phase_in_exactly_one_gate: true
      no_phase_missing_from_gates: true
    detection:
    - campaign.yaml validation script
    - PHASE_PLAN cross-check
  no_test_weakening:
    required: true
    rules:
      test_removals_require_explicit_phase_scope: true
      review_required_for_test_changes: true
      fake_completion_forbidden: true
    detection:
    - diff review
    - Claude review
    - semantic done-check
  no_broker_live_paper_scope:
    required: true
    blocked_scope:
    - broker execution
    - order placement
    - account trading
    - paper trading
    - live trading
    - real-time signal loop
    - order routing
    detection:
    - source path audit
    - dependency audit
    - Claude review
  no_alpha_or_research_scope:
    required: true
    blocked_scope:
    - alpha search
    - factor research
    - label research
    - strategy optimization
    - portfolio allocation
    - L2 replay
    - ML/DL expansion
    detection:
    - source path audit
    - dependency audit
    - Claude review
  local_wsl2_path:
    required: true
    allowed_repo_root: ~/projects/alpha_system
    forbidden_paths:
    - /mnt/c
    - OneDrive
    - Dropbox
    - Google Drive
    - Windows-synced folders
    detection:
    - RUN_INIT preflight
    - worktree path audit
stop_conditions:
- name: STOP file active
  condition: runs/<run_id>/STOP indicates active stop
  action: stop_before_new_phase_or_merge
- name: raw data staged
  condition: files under data/raw, data/canonical, data/factors, or data/labels staged outside
    allowed fixtures
  action: block_merge_and_repair
- name: provider response or account info staged
  condition: raw provider responses, IBKR logs, or account information staged
  action: block_merge_and_repair
- name: heavy artifact staged
  condition: large artifacts, parquet/feather/arrow, full generated bundles, or model binaries
    staged outside allowed synthetic fixtures
  action: block_merge_and_repair
- name: local DB staged
  condition: sqlite/db/db-journal/wal files staged
  action: block_merge_and_repair
- name: broker/live/paper/order code introduced
  condition: broker, live, paper, order-routing, or account-trading implementation appears
  action: block_merge_and_escalate
- name: order API reachable through data module
  condition: the data module can place orders or import order/account trading APIs
  action: block_merge_and_escalate
- name: clientId 101 or 102 accepted
  condition: connection profile accepts clientId 101 or 102
  action: block_merge_and_repair
- name: external IBKR pull without authorization
  condition: external IBKR provider call attempted without RED-lane and data authorization env
  action: stop_and_escalate
- name: real data pull run in CI
  condition: a real provider pull executes in CI
  action: block_merge_and_escalate
- name: alpha or research scope creep
  condition: alpha search, factor/label/strategy research, ML, or portfolio allocation code appears
  action: block_merge_and_escalate
- name: continuous futures treated as dated-contract truth
  condition: provider-continuous CONTFUT history is used as dated-contract truth
  action: block_merge_and_repair
- name: canonical bars missing available_ts
  condition: canonical bar contract omits available_ts or conflates timestamp fields
  action: block_merge_and_repair
- name: data gaps silently ignored
  condition: coverage or quality path permits silent gaps
  action: block_merge_and_repair
- name: tests weakened without explicit phase scope
  condition: tests removed, skipped, or relaxed without explicit authorization and review
  action: block_merge_and_rework
- name: Claude review BLOCKED
  condition: review verdict is BLOCKED
  action: blocked_handoff_and_stop
- name: repair attempts exceeded
  condition: repair loop exceeds configured max attempts
  action: blocked_handoff_and_stop
- name: campaign YAML invalid
  condition: campaign.yaml fails YAML parse
  action: block_campaign_execution_until_fixed
- name: phase dependency missing
  condition: selected phase dependencies are incomplete or blocked
  action: stop_phase_selection
- name: acceptance gates missing phases
  condition: acceptance_gates do not cover every phase exactly once
  action: block_campaign_execution_until_fixed
- name: PHASE_PLAN / campaign.yaml mismatch
  condition: phase ids, names, lanes, or dependencies disagree between files
  action: block_campaign_execution_until_fixed
- name: alpha/profitability/tradability claim detected
  condition: unqualified alpha, tradability, profitability, market-beating, production-ready,
    live-ready, or broker-ready claim appears
  action: block_merge_and_rework
- name: active repo/worktree under forbidden Windows path
  condition: active worktree under /mnt/c, OneDrive, Dropbox, Google Drive, or Windows-synced
    folder
  action: stop_run_init_or_worktree_create
