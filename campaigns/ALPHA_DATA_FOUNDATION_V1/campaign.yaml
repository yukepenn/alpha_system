  - manifest_id
  - pull_ledger_id
  - dataset_version_id_optional
  - operator
  - authorization_env
  - started_at
  - finished_at
  - status
  must_not_imply: committed artifacts
- name: LocalDataRootPolicy
  purpose: prevent accidental commits and unsafe data locations
  required_fields:
  - data_root
  - must_be_local
  - must_be_ignored
  - forbidden_repo_paths
  - allowed_subdirs
  - max_file_policy
  must_not_imply: cloud sync safety
- name: DataAccessMode
  purpose: mode gate for dry-run, synthetic, smoke, authorized pull
  required_fields:
  - mode
  - requires_env
  - allows_external_api
  - allows_raw_write
  - allows_canonical_write
  - ci_allowed
  must_not_imply: trading authorization
- name: ContinuousFuturesSeriesRecord
  purpose: provider-continuous (CONTFUT) series provenance
  required_fields:
  - series_id
  - root_symbol
  - provider
  - provenance_label
  - orderable
  - dated_truth
  - roll_adjustment_note
  - source_retrieved_at
  must_not_imply: dated-contract truth or tradable roll
- name: DatedFuturesSeriesRecord
  purpose: dated-contract (FUT) stitched/derived series provenance
  required_fields:
  - series_id
  - root_symbol
  - contract_universe
  - roll_policy_id
  - adjustment_method
  - availability_window
  - validation_status
  must_not_imply: full historical availability or best execution roll
- name: MicroBatchPolicy
  purpose: define the micro batch as a separate secondary path
  required_fields:
  - batch_id
  - symbols
  - start_date
  - separate_batch
  - parity_check_targets
  must_not_imply: that micros are a primary alpha source in V1
- name: SymbolBatchPlan
  purpose: declare batched roots and concurrency limits
  required_fields:
  - plan_id
  - mini_main
  - micro_secondary
  - max_concurrent_roots
  - do_not_mix_mini_and_micro_batches
  must_not_imply: pull authorization
- name: RequestPacingPolicy
  purpose: conservative, configurable pacing/throttle rules
  required_fields:
  - pacing_policy_id
  - min_seconds_between_identical_requests
  - max_requests_per_window
  - window_seconds
  - bid_ask_counts_double
  - backoff_policy
  - source
  must_not_imply: that hardcoded values are current truth without verification
- name: TimestampSemanticsPolicy
  purpose: align canonical timestamps with V1 no-lookahead semantics
  required_fields:
  - policy_id
  - event_ts_definition
  - bar_start_ts_definition
  - bar_end_ts_definition
  - available_ts_definition
  - ingested_at_definition
  - lookahead_rules
  must_not_imply: that provider timestamps are research-ready
- name: DatasetPartitionPlan
  purpose: define train/validation/locked partitions without alpha research
  required_fields:
  - plan_id
  - development_partition
  - validation_partition
  - locked_test_candidate
  - latest_shadow_candidate
  - contamination_metadata_rules
  must_not_imply: research approval or any locked-partition use without Governance metadata
