ibkr_policy:
  host_default: "127.0.0.1"
  port_default: 4002
  forbidden_client_ids:
  - 101
  - 102
  default_client_id: 201
  allowed_client_id_range: "201-209"
  data_hist_client_id_base: 201
  worker_client_ids:
    ES: 201
    NQ: 202
    RTY: 203
  client_id_collision_policy: fail_closed
  read_only_historical_only: true
  order_placement_forbidden: true
  account_trading_forbidden: true
  live_trading_forbidden: true
  paper_trading_forbidden: true
  real_time_feed_forbidden: true
  connection_doctor_required: true
  explicit_external_authorization_required_for_provider_calls: true
  env_semantics:
  - ALPHA_IBKR_HOST
  - ALPHA_IBKR_PORT
  - ALPHA_IBKR_CLIENT_ID
  - ALPHA_IBKR_READ_ONLY_MODE
  - ALPHA_DATA_ROOT
  - ALPHA_DATA_PULL_AUTHORIZED
  - ALPHA_ALLOW_EXTERNAL_IBKR
  - ALPHA_ALLOW_RAW_LOCAL_WRITE
  continuous_futures_policy:
    sec_type: CONTFUT
    historical_data_only: true
    not_for_order_placement: true
    not_for_live_market_data: true
    labels:
    - provider_continuous
    - non_orderable
    - not_dated_contract_truth
    - research_diagnostics_only
  dated_futures_policy:
    sec_type: FUT
    include_expired_supported_where_available: true
    no_full_history_promise: true
    strongest_for:
    - current contracts
    - recent expired contracts available from IBKR
    - roll validation windows
  pacing_policy:
    naive_loop_forbidden: true
    conservative_throttling_required: true
    verify_against_current_docs_or_local_smoke: true
    bid_ask_counts_heavier: true
    require_chunked_requests: true
    require_request_id_tracking: true
    require_duplicate_request_detection: true
    require_retry_with_backoff: true
    require_resume_ledger: true
    require_provider_error_ledger: true
    require_no_silent_gaps: true
    require_no_raw_overwrite: true
