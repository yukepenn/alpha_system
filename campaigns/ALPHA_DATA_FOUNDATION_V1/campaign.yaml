  - git add -A
  force_push_allowed: false
  commit_raw_data_allowed: false
  commit_heavy_artifacts_allowed: false
  commit_local_db_allowed: false
  commit_provider_responses_allowed: false
  require_handoff_per_phase: true
  require_git_status_short: true
  require_explicit_file_list_in_handoff: true
  clean_merge_gate_required: true
  artifact_audit_before_merge: true
review_policy:
  yellow_requires_fresh_claude_review: true
  green_review_optional_unless_phase_requires: true
  red_requires_scoped_authorization_and_claude_review: true
  verdict_json_required: true
  review_artifact_required_for_yellow: true
  allowed_verdicts:
  - PASS
  - PASS_WITH_WARNINGS
  - REWORK
  - BLOCKED
  allowed_verdicts_for_merge:
  - PASS
  - PASS_WITH_WARNINGS
  blocked_verdicts:
  - FAIL
  - BLOCKED
  - REWORK_REQUIRED
  reviewer_independence_required: true
  implementer_cannot_self_approve: true
  review_must_check:
  - phase scope compliance
  - data-foundation object completeness
  - fail-closed validation behavior
  - clientId 101/102 hard-block present
  - read-only boundary and order-method kill switch present
  - request manifest, pacing guard, and resume ledger present
  - no silent gaps in coverage or quality
  - continuous futures not treated as dated-contract truth
  - canonical bars carry available_ts and distinct timestamp fields
  - dataset version, quality report, and coverage report present where required
  - artifact policy compliance
  - no raw/canonical/provider/account data committed
  - no broker/live/paper/order-routing or account-trading scope
  - no alpha/profitability/tradability claims
  - no test weakening or gaming
  - handoff completeness
  - semantic done criteria
merge_policy:
  GREEN:
    auto_pr: true
    auto_merge: true
    requires:
    - checks_pass
    - handoff_valid
    - artifact_policy_pass
    - no_forbidden_paths
    - no_stop_file
    - semantic_done_check_pass
  YELLOW:
    auto_pr: true
    auto_merge: true
    requires:
    - checks_pass
    - handoff_valid
    - claude_review_complete
    - verdict_PASS_or_PASS_WITH_WARNINGS
    - artifact_policy_pass
    - no_forbidden_paths
    - no_stop_file
    - semantic_done_check_pass
    - ci_pass_if_configured
  RED:
    auto_pr_if_authorized: true
    auto_merge: false
    requires:
    - scoped_authorization_present
    - data_pull_authorization_present
    - checks_pass
    - handoff_valid
    - claude_review_complete
    - verdict_PASS_or_PASS_WITH_WARNINGS
    - artifact_policy_pass
    - no_data_artifacts_committed
    - no_forbidden_paths
    - no_stop_file
    - ci_pass_if_configured
  green_auto_pr: true
  green_auto_merge: true
  yellow_auto_pr: true
  yellow_auto_merge: true
  red_auto_pr: true
  red_auto_merge: false
  require_ci_pass: true
  require_artifact_policy_pass: true
  require_no_stop_file: true
  require_verdict_json: true
  require_no_data_artifacts_committed: true
  global_blockers:
  - STOP file present
  - forbidden path staged
  - raw data staged
  - canonical data staged
  - provider response staged
  - account information staged
  - heavy artifact staged
  - local DB staged
  - real data pull run in CI
  - broker/live/paper/order-routing scope introduced
  - order API reachable through data module
  - clientId 101 or 102 accepted
  - external IBKR pull attempted without authorization
  - unsupported alpha/tradability claim introduced
  - continuous futures treated as dated-contract truth
  - canonical bars missing available_ts
  - data gaps silently ignored
  - test weakening detected
  - semantic done-check failed
