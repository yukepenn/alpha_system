dataset_partition_plan:
  development_partition: 2018-01-01 through 2022-12-31
  validation_partition: 2023-01-01 through 2024-12-31
  locked_test_candidate: 2025-01-01 through as_of_run
  latest_shadow_candidate: optional rolling recent period
  notes:
  - Data QA may inspect coverage across all partitions.
  - Alpha research must not use locked_test_candidate without Governance metadata.
  - Any use of locked partitions must create contamination metadata later.
data_foundation_objects:
- name: DataSourceProfile
  purpose: describe a data provider and allowed usage boundary
  required_fields:
  - source_id
  - provider_name
  - provider_type
  - allowed_modes
  - forbidden_modes
  - requires_authorization
  - market_data_permissions_note
  - created_at
  must_not_imply: broker readiness, execution permission, or data completeness
- name: IBKRConnectionProfile
  purpose: connection settings and diagnostics for TWS / IB Gateway historical pulls
  required_fields:
  - host
  - port
  - client_id
  - read_only_mode
  - environment
  - connection_timeout
  - doctor_status
  - validated_at
  must_not_imply: account access, order access, or live feed readiness
- name: IBKRClientIdPolicy
  purpose: prevent collisions with paper/live clients and enforce the data-client namespace
  required_fields:
  - forbidden_client_ids
  - allowed_range
  - default_client_id
  - worker_client_ids
  - collision_policy
  must_not_imply: that multiple workers are always safe
- name: HistoricalRequestSpec
  purpose: declarative request before any IBKR historical call
  required_fields:
  - request_spec_id
  - source_id
  - symbol_root
  - contract_ref
  - sec_type
  - exchange
  - currency
  - bar_size
  - what_to_show
  - use_rth
  - duration
  - end_datetime_policy
  - start_ts
  - end_ts
  - chunk_policy
  - client_id
  must_not_imply: that data exists or that the request has been executed
- name: HistoricalRequestManifest
  purpose: full planned set of chunks and contracts for a pull
  required_fields:
  - manifest_id
  - batch_id
  - request_specs
  - chunk_count
  - expected_coverage
  - pacing_policy_id
  - data_root
  - created_by
  - created_at
  - manifest_hash
  must_not_imply: pull authorization
- name: HistoricalChunkRecord
  purpose: one chunk request lifecycle
  required_fields:
  - chunk_id
  - request_spec_id
  - symbol_root
  - contract_ref
  - start_ts
  - end_ts
  - status
  - attempt_count
  - provider_request_id
  - raw_object_ref
  - row_count
  - error_ref
