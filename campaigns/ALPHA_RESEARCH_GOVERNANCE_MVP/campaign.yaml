  - handoffs/ALPHA_RESEARCH_GOVERNANCE_MVP/**
  - reviews/ALPHA_RESEARCH_GOVERNANCE_MVP/**
  - runs/**
  forbidden_paths:
  - src/alpha_system/execution/broker/**
  - src/alpha_system/execution/live/**
