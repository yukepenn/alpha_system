  - data/canonical/**
  - data/factors/**
  - data/labels/**
  - data/cache/**
  - metadata/*.sqlite
  - metadata/*.sqlite3
  - metadata/*.db
  - metadata/*.db-journal
  - metadata/*.wal
  - '**/*.sqlite'
  - '**/*.sqlite3'
  - '**/*.db'
  - '**/*.db-journal'
  - '**/*.wal'
  - '**/*.parquet'
  - '**/*.arrow'
  - '**/*.feather'
  - '**/*.pkl'
  - '**/*.pickle'
  - '**/*.joblib'
  - '**/*.onnx'
  - '**/*.npy'
  - '**/*.npz'
  - '**/*.log'
  - '**/logs/**'
  - '**/tmp/**'
  - '**/temp/**'
  - '**/cache/**'
  - '**/.pytest_cache/**'
  - '**/.mypy_cache/**'
  - '**/.ruff_cache/**'
  - runs/**
  - artifacts/**/raw_outputs/**
  - artifacts/**/full_trade_logs/**
  - '**/generated_local_only/**'
  local_only_by_default:
  - artifacts/**
  - runs/**
  allowed_commit:
  - source code
  - configs
  - schemas
  - docs
  - tests
  - tiny synthetic fixtures
  - templates
  - handoffs
  - reviews
  - curated summaries
  tiny_fixture_exceptions:
    allowed: true
    paths:
    - tests/fixtures/**
    requirements:
    - synthetic
    - tiny
    - documented
    - not real market data
    - not alpha evidence
  phase_requirements:
    explicit_artifact_policy_required: true
    explicit_staging_required: true
    artifact_audit_before_merge: true
    no_raw_data_commits: true
    no_heavy_artifact_commits: true
    no_local_db_commits: true
    no_hidden_failed_runs: true
git_policy:
  explicit_staging_only: true
  forbidden_commands:
  - git add .
  - git add -A
  force_push_allowed: false
  commit_raw_data_allowed: false
  commit_heavy_artifacts_allowed: false
  commit_local_db_allowed: false
  require_handoff_per_phase: true
  require_git_status_short: true
  require_explicit_file_list_in_handoff: true
  clean_merge_gate_required: true
  artifact_audit_before_merge: true
review_policy:
  yellow_requires_fresh_claude_review: true
  green_review_optional_unless_phase_requires: true
  red_requires_scoped_authorization_and_claude_review: true
  verdict_json_required: true
  review_artifact_required_for_yellow: true
  allowed_verdicts:
  - PASS
  - PASS_WITH_WARNINGS
  - REWORK
  - BLOCKED
  allowed_verdicts_for_merge:
  - PASS
  - PASS_WITH_WARNINGS
  blocked_verdicts:
  - FAIL
  - BLOCKED
  - REWORK_REQUIRED
  reviewer_independence_required: true
  implementer_cannot_self_approve: true
  review_must_check:
  - phase scope compliance
  - governance object completeness
  - fail-closed validation behavior
  - reviewer independence enforcement
  - no candidate without EvidenceBundle
  - no promotion without TrialLedger
  - failed-run and rejected-idea visibility
  - locked-test contamination tracking
  - negative-control fail-closed behavior
  - no-lookahead and leakage guard coverage
  - artifact policy compliance
  - no raw data or heavy artifacts committed
  - no broker/live/paper/order-routing scope
  - no alpha/profitability/tradability claims
  - no test weakening or gaming
  - handoff completeness
  - semantic done criteria
merge_policy:
  GREEN:
    auto_pr: true
    auto_merge: true
    requires:
    - checks_pass
    - handoff_valid
    - artifact_policy_pass
    - no_forbidden_paths
    - no_stop_file
    - semantic_done_check_pass
  YELLOW:
    auto_pr: true
    auto_merge: true
    requires:
    - checks_pass
    - handoff_valid
    - claude_review_complete
    - verdict_PASS_or_PASS_WITH_WARNINGS
    - artifact_policy_pass
    - no_forbidden_paths
    - no_stop_file
    - semantic_done_check_pass
    - ci_pass_if_configured
  RED:
    auto_pr_if_authorized: true
    auto_merge: false
    requires:
    - scoped_authorization_present
    - checks_pass
    - handoff_valid
    - claude_review_complete
    - artifact_policy_pass
    - no_stop_file
    - ci_pass_if_configured
  require_ci_pass: true
  require_artifact_policy_pass: true
  require_no_stop_file: true
  require_verdict_json: true
  global_blockers:
  - STOP file present
  - forbidden path staged
  - raw data staged
  - heavy artifact staged
  - local DB staged
  - hidden failed run detected
  - test weakening detected
  - broker/live/paper/order-routing scope introduced
  - unsupported alpha/tradability claim introduced
  - candidate promotion without EvidenceBundle
  - promotion without TrialLedger
  - reviewer self-approval
  - semantic done-check failed
