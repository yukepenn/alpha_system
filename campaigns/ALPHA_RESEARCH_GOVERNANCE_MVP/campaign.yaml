campaign_id: ALPHA_RESEARCH_GOVERNANCE_MVP
campaign_name: Alpha Research Admissibility and Evidence-Governance Protocol
repo_name: alpha_system
repo_path: ~/projects/alpha_system
project_profile:
  primary: trading_research
  secondary: research
  project_type: research_admissibility_and_evidence_governance_layer
  builds_on:
  - ALPHA_SYSTEM_V1
  - ASV1_RELEASE_HYGIENE
  local_first: true
  governance_layer_not_alpha_search: true
  future_multi_asset_ready: true
  future_l2_ready: true
  broker_live_trading_in_scope: false
  paper_trading_in_scope: false
  real_data_ingestion_in_scope: false
  alpha_search_in_scope: false
  production_trading_claims_allowed: false
  alpha_tradability_claims_allowed_without_evidence: false
workflow:
  harness: Frontier Harness Generic
  harness_version: '3.0'
  workflow_id: Workflow 2
  driver: Ralph
  executor: Codex
  reviewer: Claude
  mode: Ralph-driven strict autonomous loop
  loose_loop: false
  fresh_context_per_phase: true
  git_memory: true
  campaign_contract_based: true
  automatic_pr_merge_by_lane: true
  stop_file_supported: true
  semantic_done_check_required: true
  handoff_required_per_phase: true
  review_required_for_yellow: true
  fake_completion_forbidden: true
runtime:
  host: Windows
  primary_runtime: WSL2 Ubuntu
  required_repo_path: ~/projects/alpha_system
  required_filesystem: WSL2 Linux filesystem
  forbidden_active_worktree_paths:
  - /mnt/c
  - /mnt/d
  - /mnt/e
  - OneDrive
  - Dropbox
  - Google Drive
  - Windows-synced folders
  - network drives
  - temporary directories
  local_first: true
  cloud_db_required: false
  paid_db_required: false
  broker_credentials_required: false
  live_market_data_required: false
models:
  strategy:
    name: ChatGPT Pro GPT-5.5 Thinking
    roles:
    - strategy
    - roadmap
    - campaign reasoning
    - post-run reasoning
  spec_review_donecheck:
    name: Claude Opus 4.8 xhigh
    roles:
    - phase specs
    - architecture specs
    - semantic review
    - done-check
    - campaign decomposition
  verifier:
    name: Claude Sonnet 4.6
    roles:
    - source maps
    - verifier support
    - audits
    - mechanical inspection
  executor:
    name: Codex GPT-5.5 high
    roles:
    - implementation
    - tests
    - repair
    - handoff writing
  orchestrator:
    name: Ralph
    roles:
    - Workflow 2 state machine
    - run control
    - phase transitions
    - STOP/resume
    - validation ledger
    - review routing
    - verdict parsing
    - PR/CI/merge gates
    - bounded repair enforcement
  subagent:
    name: Codex GPT-5.4-mini medium
    roles:
    - lightweight subagents
    - mechanical exploration
    - local source mapping
lane_policy:
  GREEN:
    description: Low-risk docs, scaffolding, and mechanical work.
    automatic_execute: true
    automatic_repair: true
    automatic_pr: true
    automatic_merge: true
    claude_review_required: false
    checks_required: true
    artifact_policy_required: true
    handoff_required: true
    merge_requires:
    - checks_pass
    - handoff_valid
    - artifact_policy_pass
    - no_forbidden_paths
    - no_stop_file
    - semantic_done_check_pass
  YELLOW:
    description: Material governance infrastructure or research-protocol work.
    automatic_execute: true
    automatic_repair: true
    automatic_pr: true
    automatic_merge: true
    claude_review_required: true
    required_reviewer: Claude Opus 4.8 xhigh
    checks_required: true
    artifact_policy_required: true
    handoff_required: true
    most_phases: true
    merge_requires:
    - checks_pass
    - handoff_valid
    - artifact_policy_pass
    - no_forbidden_paths
    - no_stop_file
    - claude_review_complete
    - verdict_PASS_or_PASS_WITH_WARNINGS
    - semantic_done_check_pass
  RED:
    description: Production, destructive, live, external, or costly operations.
    automatic_execute_when_scoped: true
    automatic_repair: false
    automatic_merge: false
    required_scope_env:
    - PROJECT_OP_AUTHORIZED
    - PROJECT_OP_SCOPE
    - PROJECT_OP_EXPIRES
    expected_in_this_campaign: false
    note: This campaign excludes live, broker, destructive, external, and costly
      scope, so no RED phase is expected. Unexpected RED scope must stop or block.
state_machine:
  strict: true
  states:
  - RUN_INIT
  - CAMPAIGN_LOAD
  - PHASE_SELECT
  - SPEC_GENERATE
  - SPEC_VALIDATE
  - WORKTREE_CREATE
  - CODEX_EXECUTE
  - CHECKS_RUN
  - HANDOFF_VALIDATE
  - CLAUDE_REVIEW
  - VERDICT_PARSE
  - PR_CREATE
  - CI_WAIT
  - MERGE_GATE
  - MERGE
  - DONE_CHECK
  - NEXT_PHASE
  - CAMPAIGN_DONE_CHECK
  - RUN_SUMMARY
  failure_routes:
    REWORK:
      route: bounded_repair_loop
      repair_attempts_tracked: true
      max_repair_attempts_default: 3
      repair_attempts_path: runs/<run_id>/phases/<phase_id>/repair_attempts/
      requires_repair_attempt_record: true
      fake_completion_forbidden: true
    BLOCKED:
      route: blocked_handoff_and_stop_or_escalation
      blocked_handoff_required: true
      dependent_phases_blocked: true
      fake_completion_allowed: false
    FAIL:
      route: checks_failure_repair_loop_or_blocked_handoff
      repair_attempts_tracked: true
      fake_completion_forbidden: true
governance_state_machine:
  description: Lifecycle that future governance objects must enforce. Listed here as
    the contract Workflow 2 phases implement; not executed by Ralph itself.
  states:
  - DRAFT
  - REGISTERED
  - IMPLEMENTATION_ALLOWED
  - IMPLEMENTED
  - DIAGNOSTICS_ALLOWED
  - DIAGNOSTICS_RUN
  - EVIDENCE_READY
  - REVIEWED
  - REJECTED
  - WATCH
  - CANDIDATE
  - VALIDATED
  prohibited_mvp_states:
  - LIVE_APPROVED
  - CAPITAL_ALLOCATED
  - PRODUCTION_READY
  prohibited_state_note: Listed only as future non-MVP concepts. They must not be
    reachable by any transition implemented in this campaign.
  transitions:
  - from: DRAFT
    to: REGISTERED
    requires: valid HypothesisCard and AlphaSpec
  - from: REGISTERED
    to: IMPLEMENTATION_ALLOWED
    requires: AlphaSpec validation and no blocking duplicate or leakage issue
  - from: IMPLEMENTATION_ALLOWED
    to: IMPLEMENTED
    requires: scoped implementation handoff
  - from: IMPLEMENTED
    to: DIAGNOSTICS_ALLOWED
    requires: valid StudySpec
  - from: DIAGNOSTICS_ALLOWED
    to: DIAGNOSTICS_RUN
    requires: diagnostics run recorded in TrialLedger
  - from: DIAGNOSTICS_RUN
    to: EVIDENCE_READY
    requires: EvidenceBundle with manifest and trial refs
  - from: EVIDENCE_READY
    to: REVIEWED
    requires: independent ReviewerVerdict
  - from: REVIEWED
    to: REJECTED/WATCH/CANDIDATE/VALIDATED
    requires: PromotionDecision and gate checks
  - from: any
    to: REJECTED
    requires: RejectedIdeaRecord and reason
  blocks:
  - missing AlphaSpec blocks code
  - missing StudySpec blocks diagnostics
  - missing TrialLedger blocks promotion
  - missing EvidenceBundle blocks candidate
  - missing ReviewerVerdict blocks factor library entry
  - self-review blocks promotion
  - locked-test contamination without metadata blocks promotion
  - failed-run omission blocks promotion
  - unsupported claims block merge
path_policy:
  exceptions_apply_before_forbidden_globs: true
  placeholder_exceptions:
