risk_controls:
  no_alpha_claims:
    required: true
    blocked_claims:
    - alpha without evidence
    - tradability
    - profitability
    - market-beating
    - production-ready
    - live-ready
    - robust without evidence
    detection:
    - unsupported_claim_guard
    - prohibited claim tests
    - doc grep
    - Claude review
  no_raw_data:
    required: true
    blocked_patterns:
    - data/raw/**
    - data/canonical/**
    - data/factors/**
    - data/labels/**
    - '**/*.parquet outside tests/fixtures documented tiny synthetic exceptions'
    exceptions:
    - tests/fixtures/** when tiny synthetic fixture and documented
    - '**/.gitkeep'
    - '**/README.md'
    detection:
    - git status audit
    - git ls-files audit
    - artifact policy checks
  no_heavy_artifacts:
    required: true
    detection:
    - find artifacts -type f -size +1M -print
    - artifact manifest audit
    - handoff artifact confirmation
  no_candidate_without_evidence:
    required: true
    rules:
      candidate_state_requires_evidence_bundle: true
      evidence_bundle_requires_manifest_and_trial_refs: true
    detection:
    - promotion gate tests
    - evidence bundle tests
    - Claude review
  no_promotion_without_trial_ledger:
    required: true
    rules:
      promotion_requires_trial_ledger_refs: true
      failed_runs_must_be_recorded: true
    detection:
    - promotion gate tests
    - trial ledger tests
    - registry audit
  no_reviewer_self_approval:
    required: true
    rules:
      reviewer_role_must_differ_from_implementer: true
      independence_statement_required: true
    detection:
    - reviewer independence tests
    - promotion gate tests
    - Claude review
  no_locked_test_reuse_without_contamination:
    required: true
    rules:
      oos_reuse_must_be_flagged: true
      locked_test_contamination_must_be_recorded: true
    detection:
    - trial ledger contamination tests
    - promotion gate tests
  no_lookahead_guard_required:
    required: true
    test_roots:
    - tests/no_lookahead
    - evals/canaries
    detection:
    - no_lookahead test suite
    - canary harness
    - Claude review
  negative_controls_required:
    required: true
    rules:
      random_permuted_future_shift_optimistic_fill_canaries_required: true
      canaries_must_fail_closed: true
    detection:
    - negative control catalog tests
    - canary runner
  acceptance_gate_coverage_required:
    required: true
    rules:
      every_phase_in_exactly_one_gate: true
      no_phase_missing_from_gates: true
    detection:
    - campaign.yaml validation script
    - PHASE_PLAN cross-check
  no_test_weakening:
    required: true
    rules:
      test_removals_require_explicit_phase_scope: true
      review_required_for_test_changes: true
      fake_completion_forbidden: true
    detection:
    - diff review
    - Claude review
    - semantic done-check
  no_real_data_or_alpha_search:
    required: true
    blocked_scope:
    - real data ingestion
    - IBKR integration
    - real alpha search
    - strategy optimization
    - portfolio allocation
    - L2 replay
    - ML/DL expansion
    detection:
    - source path audit
    - dependency audit
    - Claude review
  local_wsl2_path:
    required: true
    allowed_repo_root: ~/projects/alpha_system
    forbidden_paths:
    - /mnt/c
    - OneDrive
    - Dropbox
    - Google Drive
    - Windows-synced folders
    detection:
    - RUN_INIT preflight
    - worktree path audit
stop_conditions:
- name: STOP file active
  condition: runs/<run_id>/STOP indicates active stop
  action: stop_before_new_phase_or_merge
- name: raw data staged
  condition: files under data/raw, data/canonical, data/factors, or data/labels staged
    outside allowed fixtures
  action: block_merge_and_repair
- name: heavy artifact staged
  condition: large artifacts, full generated bundles, or model binaries staged
  action: block_merge_and_repair
- name: broker/live code introduced
  condition: broker, live, paper, or order-routing implementation appears
  action: block_merge_and_escalate
- name: real data or alpha search scope creep
  condition: real data ingestion, IBKR, or alpha search code appears
  action: block_merge_and_escalate
- name: tests weakened without explicit phase scope
  condition: tests removed, skipped, or relaxed without explicit authorization and
    review
  action: block_merge_and_rework
- name: Claude review BLOCKED
  condition: review verdict is BLOCKED
  action: blocked_handoff_and_stop
- name: repair attempts exceeded
  condition: repair loop exceeds configured max attempts
  action: blocked_handoff_and_stop
- name: campaign YAML invalid
  condition: campaign.yaml fails YAML parse
  action: block_campaign_execution_until_fixed
- name: phase dependency missing
  condition: selected phase dependencies are incomplete or blocked
  action: stop_phase_selection
- name: acceptance gates missing phases
  condition: acceptance_gates do not cover every phase exactly once
  action: block_campaign_execution_until_fixed
- name: PHASE_PLAN / campaign.yaml mismatch
  condition: phase ids, names, lanes, or dependencies disagree between files
  action: block_campaign_execution_until_fixed
- name: alpha/profitability/tradability claim detected
  condition: unqualified alpha, tradability, profitability, market-beating, production-ready,
    or live-ready claim appears
  action: block_merge_and_rework
- name: failed runs can be hidden
  condition: TrialLedger or promotion path permits omitting failed runs
  action: block_merge_and_rework
- name: unreviewed promotion possible
  condition: promotion gate permits candidate/validated state without ReviewerVerdict,
    EvidenceBundle, or TrialLedger
  action: block_merge_and_rework
- name: active repo/worktree under forbidden Windows path
  condition: active worktree under /mnt/c, OneDrive, Dropbox, Google Drive, or Windows-synced
    folder
  action: stop_run_init_or_worktree_create
