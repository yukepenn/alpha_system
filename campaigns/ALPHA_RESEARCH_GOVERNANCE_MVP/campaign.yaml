governance_objects:
- name: HypothesisCard
  purpose: human/AI-readable hypothesis rationale and falsification anchor
  required_fields:
  - hypothesis_id
  - title
  - family
  - rationale
  - expected_mechanism
  - falsification_criteria
  - risks
  - author
  - created_at
  must_not_imply: implementation approval or alpha validity
- name: AlphaSpec
  purpose: pre-registered alpha research specification
  required_fields:
  - alpha_spec_id
  - hypothesis_id
  - target_instruments
  - data_assumptions
  - factor_inputs
  - label_references
  - exclusion_rules
  - timestamp_assumptions
  - cost_assumptions
  - expected_failure_modes
  - promotion_criteria
  - created_by
  - created_at
  must_not_imply: candidate status or factor library entry
- name: FeatureRequest
  purpose: request for new feature/factor inputs with duplicate exposure checks
  required_fields:
  - feature_request_id
  - alpha_spec_id
  - requested_inputs
  - formula_sketch
  - availability_assumptions
  - duplicate_or_equivalent_exposure_notes
  - data_requirements
  - approval_status
  must_not_imply: implementation permission without validation
- name: LabelSpec
  purpose: explicit label definition and leakage guard
  required_fields:
  - label_spec_id
  - horizon
  - path_rules
  - cost_model
  - target_stop_rules
  - availability_time
  - forbidden_feature_overlap
  - leakage_checks
  must_not_imply: label quality or predictive value
- name: StudySpec
  purpose: diagnostics plan and research budget before running studies
  required_fields:
  - study_spec_id
  - alpha_spec_id
  - label_spec_id
  - dataset_scope
  - split_protocol
  - metrics
  - cost_assumptions
  - variant_budget
  - locked_test_policy
  - negative_controls
  - stopping_rules
  must_not_imply: diagnostics passed
- name: TrialLedgerRecord
  purpose: immutable-ish record of every attempt, including failures
  required_fields:
  - trial_id
  - alpha_spec_id
  - study_spec_id
  - run_id
  - variant_id
  - status
  - parameters
  - metrics_summary
  - failure_reason
  - oos_touched_flag
  - locked_test_contamination_flag
  - code_hash
  - config_hash
  must_not_imply: success
- name: EvidenceBundle
  purpose: candidate evidence package
  required_fields:
  - evidence_bundle_id
  - alpha_spec_id
  - study_spec_id
  - trial_ids
  - data_version
  - factor_version
  - label_version
  - code_hash
  - config_hash
  - diagnostics_summary
  - negative_control_results
  - limitations
  - artifact_manifest
  - reviewer_verdict_reference
  must_not_imply: promotion unless gate accepts it
- name: RejectedIdeaRecord
  purpose: research graveyard record
  required_fields:
  - rejected_id
  - alpha_spec_id_or_hypothesis_id
  - reason_category
  - evidence_references
  - duplicate_links
  - leakage_cost_weakness_notes
  - reviewer
  - created_at
  must_not_imply: permanent ban; future reconsideration must be explicit and linked
- name: PromotionDecision
  purpose: controlled state transition decision
  required_fields:
  - promotion_id
  - alpha_spec_id
  - evidence_bundle_id
  - trial_ledger_refs
  - previous_state
  - next_state
  - decision
  - rationale
  - reviewer_verdict_id
  - warnings
  - timestamp
  must_not_imply: live approval, capital allocation, or production readiness
- name: ReviewerVerdict
  purpose: independent semantic review record
  required_fields:
  - reviewer_id
  - role
  - independence_statement
  - verdict
  - blocking_issues
  - warnings
  - checked_artifacts
  - checked_commands
  - timestamp
  must_not_imply: market truth or profitability
- name: NegativeControlResult
  purpose: record that known-bad controls fail closed
  required_fields:
  - canary_id
  - canary_type
  - expected_failure
  - observed_result
  - pass_fail
  - related_study_or_evidence
  - notes
  must_not_imply: alpha validity; only validates guard behavior
- name: AlphaBookRecord
  purpose: lightweight future-compatibility pointer stub only
  required_fields:
  - alpha_id
  - state
  - family
  - evidence_bundle_id
  - promotion_decision_id
  - correlation_placeholders
  - lifecycle_placeholders
  must_not_imply: capital allocation, live status, or production approval
  note: This is NOT the future Portfolio AlphaBook. Stub only.
phases:
