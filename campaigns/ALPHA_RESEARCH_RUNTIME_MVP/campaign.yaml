campaign_id: ALPHA_RESEARCH_RUNTIME_MVP
campaign_name: 'Research Runtime MVP: Executable Research Loop Layer over the Feature/Label Substrate'
repo_name: alpha_system
repo_path: ~/projects/alpha_system
project_profile:
  primary: trading_research
  secondary: research
  project_type: research_runtime
  profiles:
  - trading_research
  - research
  - research_runtime
  builds_on:
  - ALPHA_SYSTEM_V1
  - ASV1_RELEASE_HYGIENE
  - ALPHA_RESEARCH_GOVERNANCE_MVP
  - ALPHA_DATA_FOUNDATION_V1
  - PRE_FEATURE_REPO_CONSOLIDATION_V1
  - WF2_PARALLEL_DAG_SCHEDULER_MVP
  - ALPHA_FEATURE_LABEL_FOUNDATION_V1
  local_first: true
  executable_research_loop_layer_not_alpha_search: true
  orchestrates_existing_primitives_not_duplicates: true
  databento_primary_deep_history_source: true
  ibkr_broker_source_recent_validation_only: true
  consumes_accepted_dataset_versions_only: true
  broker_live_trading_in_scope: false
  paper_trading_in_scope: false
  order_placement_in_scope: false
  account_trading_in_scope: false
  alpha_search_in_scope: false
  factor_promotion_in_scope: false
  strategy_backtest_portfolio_in_scope: false
  production_trading_claims_allowed: false
  alpha_tradability_claims_allowed_without_evidence: false
workflow:
  harness: Frontier Harness Generic
  harness_version: '3.0'
  workflow_id: Workflow 2
  driver: Ralph
  executor: Codex
  reviewer: Claude
  mode: ralph_driven_strict_autonomous_loop
  loose_loop: false
  loose_loop_allowed: false
  fresh_context_per_phase: true
  git_memory: true
  campaign_contract_based: true
  automatic_pr_merge_by_lane: true
  stop_file_supported: true
  semantic_done_check_required: true
  handoff_required_per_phase: true
  review_required_for_yellow: true
  fake_completion_forbidden: true
workflow2:
  scheduler:
    mode: dag_wave
    parallel_execution: true
    max_parallel_phases: 3
    merge_queue: serial
    update_active_campaign: coordinator_only
  requirements:
  - run_frontier_plan_before_execution
  - run_parallel_mock_before_first_live_parallel_run
  - serial_merge_queue_required
  - phase_branches_do_not_write_active_campaign
  - red_phases_not_parallel_by_default
  - parallel_safe_phases_require_disjoint_allowed_paths
  - omitting_parallel_safe_or_allowed_paths_means_run_alone
runtime:
  host: Windows
  primary_environment: WSL2 Ubuntu
  primary_runtime: WSL2 Ubuntu
  repo_must_live_under: ~/projects/alpha_system
  required_filesystem: WSL2 Linux filesystem
  forbidden_active_paths:
  - /mnt/c
  - /mnt/d
  - /mnt/e
  - OneDrive
  - Dropbox
  - Google Drive
  - Windows-synced folders
  - network drives
  - temporary directories
  forbidden_active_worktree_paths:
  - /mnt/c
  - /mnt/d
  - /mnt/e
  - OneDrive
  - Dropbox
  - Google Drive
  - Windows-synced folders
  - network drives
  - temporary directories
  local_first: true
  cloud_db_required: false
  paid_db_required: false
  broker_credentials_required: false
  live_market_data_required: false
  external_provider_calls_require_red_authorization: true
models:
  strategy:
    name: ChatGPT Pro GPT-5.5 Thinking
    model: ChatGPT Pro / GPT-5.5 Thinking
    responsibilities:
    - strategy
    - roadmap
    - campaign reasoning
    - post-run reasoning
  spec_review_donecheck:
    name: Claude Opus 4.8 xhigh
    model: Claude Opus
    responsibilities:
    - phase specs
    - architecture specs
    - semantic review
    - done-check
    - campaign decomposition
  verifier:
    name: Claude Sonnet 4.6
    model: Claude Sonnet
    responsibilities:
    - source maps
    - verifier support
    - audits
    - mechanical inspection
  executor:
    name: Codex GPT-5.5 high
    model: Codex GPT-5.5 high
    responsibilities:
    - implementation
    - tests
    - repair
    - handoff writing
  orchestrator:
    name: Ralph
    model: Ralph
    responsibilities:
    - Workflow 2 state machine
    - DAG wave scheduler
    - serial merge queue
    - run control
    - phase transitions
    - STOP/resume
    - validation ledger
    - review routing
    - verdict parsing
    - PR/CI/merge gates
    - bounded repair enforcement
lane_policy:
  GREEN:
    description: Low-risk docs, campaign-contract, and mechanical work for the Research Runtime layer.
    automatic_execute: true
    automatic_repair: true
    automatic_pr: true
    automatic_merge: true
    claude_review_required: false
    checks_required: true
    artifact_policy_required: true
    handoff_required: true
    merge_requires:
    - checks_pass
    - handoff_valid
    - artifact_policy_pass
    - no_forbidden_paths
    - no_stop_file
    - semantic_done_check_pass
  YELLOW:
    description: Material Research Runtime engineering. Every YELLOW phase is local-only, consumes ACCEPTED DatasetVersions plus governance specs, and orchestrates existing diagnostics/grid/cost/evidence primitives; no phase calls an external provider API, runs broad alpha search, promotes a factor, or introduces order/account/paper/live scope.
    automatic_execute: true
    automatic_repair: true
    automatic_pr: true
    automatic_merge: true
    claude_review_required: true
    required_reviewer: Claude Opus 4.8 xhigh
    checks_required: true
    artifact_policy_required: true
    handoff_required: true
    most_phases: true
    merge_requires:
    - checks_pass
    - handoff_valid
    - claude_review_complete
    - verdict_PASS_or_PASS_WITH_WARNINGS
    - artifact_policy_pass
    - no_forbidden_paths
    - no_stop_file
    - semantic_done_check_pass
  RED:
    description: 'External, destructive, live, production, or broker-adjacent operations. This campaign has NO RED-lane phases: the runtime consumes local accepted DatasetVersions only and makes no external provider calls. The RED lane definition is retained for harness completeness only.'
    automatic_execute_when_scoped: true
    automatic_repair: false
    automatic_merge: false
    claude_review_required: true
    required_reviewer: Claude Opus 4.8 xhigh
    required_scope_env:
    - PROJECT_OP_AUTHORIZED
    - PROJECT_OP_SCOPE
    - PROJECT_OP_EXPIRES
    expected_in_this_campaign: false
    expected_red_phases: []
    note_no_red_phases: This campaign has no RED-lane phases and makes no external provider calls. All consumption is local-only against accepted DatasetVersions.
    red_requires:
    - explicit_external_authorization
    - human_authorization
    - no_ci_execution
    - local_only_outputs
    - no_data_artifacts_committed
    - no_order_api_surface
    - no_stop_file
state_machine:
  strict: true
  states:
  - RUN_INIT
  - CAMPAIGN_LOAD
  - PHASE_SELECT
  - SPEC_GENERATE
  - SPEC_VALIDATE
  - WORKTREE_CREATE
  - CODEX_EXECUTE
  - CHECKS_RUN
  - HANDOFF_VALIDATE
  - CLAUDE_REVIEW
  - VERDICT_PARSE
  - PR_CREATE
  - CI_WAIT
  - MERGE_GATE
  - MERGE
  - DONE_CHECK
  - NEXT_PHASE
  - CAMPAIGN_DONE_CHECK
  - RUN_SUMMARY
  scheduler_mode: dag_wave
  parallel_execution: true
  merge_queue: serial
  failure_routes:
    REWORK:
      route: bounded_repair_loop
      repair_attempts_tracked: true
      max_repair_attempts_default: 2
      repair_attempts_path: runs/<run_id>/phases/<phase_id>/repair_attempts/
      requires_repair_attempt_record: true
      fake_completion_forbidden: true
    BLOCKED:
      route: blocked_handoff_and_stop_or_escalation
      blocked_handoff_required: true
      dependent_phases_blocked: true
      fake_completion_allowed: false
    FAIL:
      route: checks_failure_repair_loop_or_blocked_handoff
      repair_attempts_tracked: true
      fake_completion_forbidden: true
runtime_state_model:
  description: Research-run lifecycle the runtime objects must enforce. Listed here as the contract Workflow 2 phases implement; not executed by Ralph itself.
  states:
  - RUNTIME_REQUESTED
  - INPUTS_RESOLVED
  - PLAN_VALIDATED
  - DIAGNOSTICS_READY
  - DIAGNOSTICS_RUNNING
  - DIAGNOSTICS_COMPLETE
  - DIAGNOSTICS_FAILED
  - SIGNAL_PROBE_READY
  - SIGNAL_PROBE_COMPLETE
  - COST_STRESS_COMPLETE
  - EVIDENCE_DRAFT_READY
  - REFERENCE_HANDOFF_READY
  - REJECTED
  - INCONCLUSIVE
  - BLOCKED
  prohibited_mvp_states:
  - ALPHA_VALIDATED
  - FACTOR_PROMOTED
  - STRATEGY_READY
  - PORTFOLIO_READY
  - LIVE_READY
  - PAPER_READY
  - PROFITABLE
  - TRADABLE
  - PRODUCTION_READY
  prohibited_state_note: Listed only as future, non-MVP concepts. They must not be reachable by any transition implemented in this campaign. REFERENCE_HANDOFF_READY is the most advanced state any survivor may reach.
artifact_policy:
  never_commit:
  - data/raw/**
  - data/canonical/**
  - data/factors/**
  - data/labels/**
  - data/cache/**
  - metadata/*.sqlite
  - metadata/*.sqlite3
  - metadata/*.db
  - metadata/*.db-journal
  - metadata/*.wal
  - '**/*.sqlite'
  - '**/*.sqlite3'
  - '**/*.db'
  - '**/*.db-journal'
  - '**/*.wal'
  - '**/*.parquet'
  - '**/*.arrow'
  - '**/*.feather'
  - '**/*.dbn'
  - '**/*.zst'
  - '**/*.pkl'
  - '**/*.pickle'
  - '**/*.joblib'
  - '**/*.onnx'
  - '**/*.npy'
  - '**/*.npz'
  - '**/*.log'
  - '**/logs/**'
  - '**/tmp/**'
  - '**/temp/**'
  - '**/cache/**'
  - '**/.pytest_cache/**'
  - '**/.mypy_cache/**'
  - '**/.ruff_cache/**'
  - runs/**
  - artifacts/**/raw_outputs/**
  - artifacts/**/full_trade_logs/**
  - '**/*credential*'
  - '**/generated_local_only/**'
  local_only_by_default:
  - artifacts/**
  - runs/**
  - $ALPHA_DATA_ROOT/**
  allowed_commit:
  - source code
  - configs
  - schemas
  - docs
  - tests
  - tiny synthetic fixtures
  - templates
  - handoffs
  - reviews
  - curated summaries
  - sample configs with synthetic data only
  tiny_fixture_exceptions:
    allowed: true
    paths:
    - tests/fixtures/**
    requirements:
    - synthetic
    - tiny
    - documented
    - not real market data
    - not alpha evidence
  phase_requirements:
    explicit_artifact_policy_required: true
    explicit_staging_required: true
    artifact_audit_before_merge: true
    no_raw_data_commits: true
    no_canonical_data_commits: true
    no_feature_value_commits: true
    no_label_value_commits: true
    no_provider_response_commits: true
    no_runtime_heavy_output_commits: true
    no_account_info_commits: true
    no_heavy_artifact_commits: true
    no_local_db_commits: true
git_policy:
  explicit_staging_only: true
  forbidden_commands:
  - git add .
  - git add -A
  force_push_allowed: false
  commit_raw_data_allowed: false
  commit_heavy_artifacts_allowed: false
  commit_local_db_allowed: false
  commit_provider_responses_allowed: false
  commit_feature_or_label_values_allowed: false
  require_handoff_per_phase: true
  require_git_status_short: true
  require_explicit_file_list_in_handoff: true
  clean_merge_gate_required: true
  artifact_audit_before_merge: true
  branch_prefix_workflow2: auto/
  commit_message_format: '<campaign_id>/<phase_id>: <summary>'
review_policy:
  yellow_requires_fresh_claude_review: true
  green_review_optional_unless_phase_requires: true
  red_requires_scoped_authorization_and_claude_review: true
  verdict_json_required: true
  review_artifact_required_for_yellow: true
  allowed_verdicts:
  - PASS
  - PASS_WITH_WARNINGS
  - REWORK
  - BLOCKED
  allowed_verdicts_for_merge:
  - PASS
  - PASS_WITH_WARNINGS
  blocked_verdicts:
  - FAIL
  - BLOCKED
  - REWORK_REQUIRED
  reviewer_independence_required: true
  implementer_cannot_self_approve: true
  review_must_check:
  - phase scope compliance
  - runtime objects orchestrate existing primitives and do not duplicate research/experiments/governance/backtest code
  - AlphaSpec and StudySpec required before any runtime study runs
  - only accepted DatasetVersions consumed via resolve_dataset_version; no raw provider access
  - feature inputs carry available_ts; label inputs carry label_available_ts; no label-as-feature
  - no-lookahead runtime audit covers available_ts, label_available_ts, same-bar fills, locked-test metadata
  - cost stress present for any signal probe or handoff; slippage labeled proxy; double-cost present
  - variant budget enforced; no unbounded grid; locked-test selection forbidden
  - EvidenceDraft is not a candidate; ReferenceCandidateHandoff is not Reference validation; fast path is not Reference truth
  - failed and inconclusive runs remain visible with RejectionReasonRecord
  - agent-facing tool results carry no raw or heavy data
  - 'DAG metadata correctness: parallel_safe phases have disjoint allowed_paths and no global files'
  - serial merge queue respected; phase branch does not write ACTIVE_CAMPAIGN.md in parallel mode
  - artifact policy compliance; no raw/canonical/feature/label/runtime values or DB committed
  - no broker/live/paper/order-routing or account-trading scope
  - no alpha/profitability/tradability claims; no strategy/backtest/portfolio/alpha-search scope
  - no test weakening or gaming
  - handoff completeness and semantic done criteria
merge_policy:
  GREEN:
    auto_pr: true
    auto_merge: true
    requires:
    - checks_pass
    - handoff_valid
    - artifact_policy_pass
    - no_forbidden_paths
    - no_stop_file
    - semantic_done_check_pass
  YELLOW:
    auto_pr: true
    auto_merge: true
    requires:
    - checks_pass
    - handoff_valid
    - claude_review_complete
    - verdict_PASS_or_PASS_WITH_WARNINGS
    - artifact_policy_pass
    - no_forbidden_paths
    - no_stop_file
    - semantic_done_check_pass
    - ci_pass_if_configured
  RED:
    auto_pr_if_authorized: true
    auto_merge: false
    requires:
    - scoped_authorization_present
    - checks_pass
    - handoff_valid
    - claude_review_complete
    - verdict_PASS_or_PASS_WITH_WARNINGS
    - artifact_policy_pass
    - no_data_artifacts_committed
    - no_forbidden_paths
    - no_stop_file
    - ci_pass_if_configured
  green_auto_pr: true
  green_auto_merge: true
  yellow_auto_pr: true
  yellow_auto_merge: true
  red_auto_pr: true
  red_auto_merge: false
  require_ci_pass: true
  require_artifact_policy_pass: true
  require_no_stop_file: true
  require_verdict_json: true
  require_no_data_artifacts_committed: true
  merge_queue: serial
  parallel_build_serial_merge: true
  global_blockers:
  - STOP file present
  - forbidden path staged
  - raw or canonical data staged
  - feature or label values staged
  - runtime heavy output staged
  - provider response staged
  - heavy artifact staged
  - local DB staged
  - external provider call attempted
  - raw provider data read by runtime code
  - accepted DatasetVersion bypassed
  - runtime study run without AlphaSpec or StudySpec
  - feature input without available_ts
  - label input without label_available_ts
  - label values exposed as live features
  - signal probe called strategy validation
  - bounded grid unbounded or variant budget exceeded
  - locked-test partition used without contamination metadata
  - cost stress omitted for probe or handoff
  - zero-cost result used as promotion basis
  - fast path treated as Reference truth
  - EvidenceDraft treated as candidate
  - ReferenceCandidateHandoff treated as Reference validation
  - failed or inconclusive run hidden
  - factor promotion or alpha search scope introduced
  - strategy/backtest/portfolio scope introduced
  - unsupported alpha/tradability claim introduced
  - parallel phase lacks disjoint allowed_paths
  - parallel wave has path/resource conflict
  - phase branch writes ACTIVE_CAMPAIGN.md in parallel mode
  - merge occurs outside serial merge queue
  - test weakening detected
  - semantic done-check failed
phase_defaults:
  spec_required: true
  executor: Codex GPT-5.5 high
  reviewer: Claude Opus 4.8 xhigh
  verifier: Claude Sonnet 4.6
  handoff_required: true
  checks_required: true
  review_required: true
  artifact_policy_required: true
  semantic_done_check_required: true
  explicit_staging_only: true
  auto_pr: true
  auto_merge_for_yellow_after_review: true
  repair_attempt_limit: 2
  default_parallel_safe: false
  default_must_run_alone: true
  forbidden_global_changes:
