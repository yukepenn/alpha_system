risk_controls:
  runtime_not_alpha_search:
    required: true
    rules:
      no_broad_alpha_discovery: true
      no_factor_promotion: true
    detection:
    - scope audit
    - import audit
    - Claude review
  alpha_spec_and_study_spec_required:
    required: true
    rules:
      no_runtime_run_without_alpha_spec_and_study_spec: true
    detection:
    - runtime request contract tests
    - Claude review
  no_raw_provider_access:
    required: true
    rules:
      raw_provider_files_not_read_by_runtime_code: true
      canonical_records_only: true
    detection:
    - source path audit
    - import audit
    - Claude review
  accepted_dataset_version_required:
    required: true
    rules:
      resolve_dataset_version_only: true
      admissible_states_versioned_or_ready_for_research: true
    detection:
    - input resolver tests
    - Claude review
  no_external_provider_calls:
    required: true
    rules:
      no_databento_or_ibkr_api_calls_in_this_campaign: true
    detection:
    - data access mode audit
    - import audit
    - CI configuration audit
  available_ts_required:
    required: true
    rules:
      feature_inputs_carry_available_ts: true
      label_inputs_carry_label_available_ts: true
    detection:
    - input resolver tests
    - no_lookahead runtime audit
    - Claude review
  no_label_as_feature:
    required: true
    rules:
      label_values_never_exposed_as_runtime_features: true
    detection:
    - no_lookahead runtime audit
    - Claude review
  cost_stress_required:
    required: true
    rules:
      cost_model_version_required: true
      double_cost_required: true
      slippage_labeled_proxy: true
      zero_cost_not_promotion_basis: true
    detection:
    - cost stress tests
    - Claude review
  variant_budget_required:
    required: true
    rules:
      bounded_grid_required: true
      no_unbounded_grid: true
      no_selection_on_locked_test: true
    detection:
    - bounded grid tests
    - experiments.limits enforcement
    - Claude review
  no_lookahead_runtime_audit:
    required: true
    rules:
      available_ts_label_available_ts_same_bar_fill_locked_test_metadata_checked: true
    detection:
    - no_lookahead runtime audit
    - no_lookahead test suite
    - Claude review
  failed_runs_visible:
    required: true
    rules:
      rejection_reason_record_required_for_fail_or_inconclusive: true
    detection:
    - decision state tests
    - Claude review
  fast_path_not_reference_truth:
    required: true
    rules:
      evidence_draft_not_candidate: true
      reference_handoff_not_reference_validation: true
      fast_path_not_reference_truth: true
    detection:
    - evidence/handoff tests
    - doc grep
    - Claude review
  consume_not_duplicate:
    required: true
    rules:
      runtime_orchestrates_research_experiments_governance_backtest_not_duplicates: true
    detection:
    - source path audit
    - import audit
    - Claude review
  no_alpha_claims:
    required: true
    blocked_claims:
    - alpha without evidence
    - tradability
    - profitability
    - market-beating
    - production-ready
    - live-ready
    - broker-ready
    - strategy-ready
    detection:
    - prohibited claim tests
    - doc grep
    - Claude review
  no_strategy_scope:
    required: true
    blocked_scope:
    - alpha search
    - strategy optimization
    - backtest as a runtime product
    - portfolio allocation
    - promotion of a candidate
    - L2 replay
    - ML training beyond authorized scope
    detection:
    - source path audit
    - dependency audit
    - Claude review
  no_raw_heavy_artifacts:
    required: true
    rules:
      no_raw_canonical_feature_label_runtime_values_or_db_committed: true
    detection:
    - git status audit
    - git ls-files audit
    - artifact policy checks
    - find artifacts -type f -size +1M -print
  tool_output_no_raw_data:
    required: true
    rules:
      agent_facing_tool_result_carries_no_raw_or_heavy_data: true
    detection:
    - tool result tests
    - Claude review
  dag_parallel_requires_allowed_paths:
    required: true
    rules:
      parallel_safe_phase_requires_disjoint_allowed_paths: true
      no_global_coordinator_file_in_parallel_phase_allowed_paths: true
    detection:
    - plan-dag preview
    - dag_scheduler validation
    - campaign.yaml validation script
  serial_merge_queue_required:
    required: true
    rules:
      merge_one_pr_at_a_time: true
      phase_branches_do_not_write_active_campaign_in_parallel_mode: true
    detection:
    - merge_queue validation
    - Ralph driver
    - Claude review
  acceptance_gate_coverage_required:
    required: true
    rules:
      every_phase_in_exactly_one_gate: true
      no_phase_missing_from_gates: true
    detection:
    - campaign.yaml validation script
    - PHASE_PLAN cross-check
  no_test_weakening:
    required: true
    rules:
      test_removals_require_explicit_phase_scope: true
      review_required_for_test_changes: true
      fake_completion_forbidden: true
    detection:
    - diff review
    - Claude review
    - semantic done-check
  local_wsl2_path:
    required: true
    allowed_repo_root: ~/projects/alpha_system
    forbidden_paths:
    - /mnt/c
    - OneDrive
    - Dropbox
    - Google Drive
    - Windows-synced folders
    detection:
    - RUN_INIT preflight
    - worktree path audit
stop_conditions:
- name: STOP file active
  condition: runs/<run_id>/STOP indicates active stop
  action: stop_before_new_phase_or_merge
- name: raw provider data read by runtime code
  condition: runtime code reads raw Databento/IBKR files (.dbn/.zst/parquet/arrow/feather) directly
  action: block_merge_and_repair
- name: accepted DatasetVersion bypassed
  condition: runtime inputs produced without resolving an admissible DatasetVersion
  action: block_merge_and_repair
- name: external Databento or IBKR API call attempted
  condition: any external provider API call is attempted in this campaign
  action: stop_and_escalate
- name: runtime study run without AlphaSpec or StudySpec
  condition: a diagnostics or probe run is executed without an AlphaSpec and StudySpec reference
  action: block_merge_and_repair
- name: feature input without available_ts
  condition: a runtime feature input omits available_ts
  action: block_merge_and_repair
- name: label input without label_available_ts
  condition: a runtime label input omits label_available_ts
  action: block_merge_and_repair
- name: label values exposed as live features
  condition: label values are reachable as runtime features or signal inputs
  action: block_merge_and_escalate
- name: signal probe called strategy validation
  condition: a simple signal probe is presented as strategy validation or a candidate
  action: block_merge_and_rework
- name: bounded grid unbounded or variant budget exceeded
  condition: a grid runs without a variant budget or exceeds the configured budget
  action: block_merge_and_repair
- name: locked test partition used without contamination metadata
  condition: locked_test_candidate or latest_shadow_candidate is consumed without governance contamination metadata
  action: block_merge_and_repair
- name: cost stress omitted
  condition: a signal probe or reference handoff is produced without cost stress
  action: block_merge_and_repair
- name: zero-cost result used as promotion basis
  condition: a zero-cost diagnostic is used as a promotion basis
  action: block_merge_and_rework
- name: fast path treated as Reference truth
  condition: a fast-path runtime result is presented as Reference truth
  action: block_merge_and_rework
- name: EvidenceDraft treated as candidate
  condition: an EvidenceDraft is presented as a promoted candidate
  action: block_merge_and_rework
- name: ReferenceCandidateHandoff treated as Reference validation
  condition: a ReferenceCandidateHandoff is presented as completed Reference validation
  action: block_merge_and_rework
- name: failed or inconclusive run hidden
  condition: a failed or inconclusive run is hidden instead of recorded with a RejectionReasonRecord
  action: block_merge_and_repair
- name: factor promotion or alpha search scope introduced
  condition: broad alpha search, factor promotion, or candidate promotion scope appears
  action: block_merge_and_escalate
- name: strategy/backtest/portfolio scope introduced
  condition: strategy optimization, backtest-as-product, or portfolio allocation scope appears
  action: block_merge_and_escalate
- name: duplicate of existing primitive introduced
  condition: runtime code duplicates research/experiments/governance/backtest primitives instead of orchestrating them
  action: block_merge_and_rework
- name: alpha/profitability/tradability claim detected
  condition: unqualified alpha, tradability, profitability, market-beating, production-ready, live-ready, or broker-ready claim appears
  action: block_merge_and_rework
- name: raw or heavy data artifact staged
  condition: raw/canonical/feature/label/runtime values, parquet/arrow/feather, provider responses, or local DB files staged
  action: block_merge_and_repair
- name: tool result exposes raw or heavy data
  condition: an agent-facing tool result embeds raw or heavy data
  action: block_merge_and_repair
- name: parallel phase lacks allowed_paths
  condition: a phase marked parallel_safe declares no allowed_paths or declares a global/coordinator path
  action: block_campaign_execution_until_fixed
- name: parallel wave has path/resource conflict
  condition: two phases scheduled in the same wave have overlapping allowed_paths or a shared resource_class
  action: stop_phase_selection
- name: phase branch writes ACTIVE_CAMPAIGN.md in parallel mode
  condition: a phase branch writes ACTIVE_CAMPAIGN.md while update_active_campaign is coordinator_only
  action: block_merge_and_repair
- name: merge outside serial merge queue
  condition: a merge is attempted outside the serial merge queue (more than one PR merging at once)
  action: stop_and_escalate
- name: campaign YAML invalid
  condition: campaign.yaml fails YAML parse
  action: block_campaign_execution_until_fixed
- name: phase dependency missing
  condition: selected phase dependencies are incomplete or blocked
  action: stop_phase_selection
- name: acceptance gates missing phases
  condition: acceptance_gates do not cover every phase exactly once
  action: block_campaign_execution_until_fixed
- name: PHASE_PLAN / campaign.yaml mismatch
  condition: phase ids, names, lanes, dependencies, or DAG metadata disagree between files
  action: block_campaign_execution_until_fixed
- name: Claude review BLOCKED
  condition: review verdict is BLOCKED
  action: blocked_handoff_and_stop
- name: repair attempts exceeded
  condition: repair loop exceeds configured max attempts
  action: blocked_handoff_and_stop
- name: active repo/worktree under forbidden Windows path
  condition: active worktree under /mnt/c, OneDrive, Dropbox, Google Drive, or Windows-synced folder
  action: stop_run_init_or_worktree_create
