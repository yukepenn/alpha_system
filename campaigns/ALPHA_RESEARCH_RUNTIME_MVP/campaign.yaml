runtime_policy:
  alpha_spec_required: true
  study_spec_required: true
  orchestrates_existing_primitives_not_duplicates: true
  no_alpha_search: true
  no_factor_promotion: true
  no_strategy_wrappers_as_research_products: true
  diagnostic_pass_not_alpha_validation: true
  signal_probe_not_strategy_validation: true
  bounded_grid_not_promotion: true
  evidence_draft_not_candidate: true
  fast_path_not_reference_truth: true
  reference_handoff_not_reference_validation: true
  failed_and_inconclusive_runs_visible: true
  consumes_study_input_pack: true
  feeds_governance_evidence_bundle: true
dataset_consumption_policy:
  accepted_dataset_versions_required: true
  raw_provider_access_forbidden: true
  no_external_provider_calls: true
  databento_primary_source: true
  ibkr_validation_source_only: true
  sanctioned_consumption_api: alpha_system.data.foundation.version_registry.resolve_dataset_version
  canonical_records_only:
  - CanonicalBarRecord
  - CanonicalBBORecord
  - DenseGridBarRecord
  admissible_dataset_version_states:
  - VERSIONED
  - READY_FOR_RESEARCH
  consumes_feature_store_and_label_store: true
  no_merge_of_databento_and_ibkr_versions: true
  locked_partition_use_requires_governance_metadata: true
diagnostics_policy:
  factor_diagnostics_required: true
  label_diagnostics_required: true
  session_split_required: true
  rth_eth_split_required: true
  regime_split_required: true
  cross_market_diagnostics_required_for_multi_instrument: true
  cost_aware_diagnostics_required: true
  descriptive_non_promotional_only: true
  rejection_reason_required_for_fail: true
  orchestrates_research_diagnostics_primitives: true
cost_policy:
  cost_model_version_required: true
  base_stress_required: true
  double_cost_required: true
  bbo_spread_crossing_required_if_available: true
  slippage_proxy_must_be_labeled_proxy: true
  session_specific_cost_required: true
  zero_cost_not_promotion_basis: true
  consumes_backtest_cost_and_slippage_models: true
anti_overfit_policy:
  variant_budget_required: true
  locked_test_contamination_metadata_required: true
  no_unbounded_grid: true
  no_selection_on_locked_test: true
  failed_runs_visible: true
  repeated_run_records_required: true
  consumes_experiments_limits_and_overfit_controls: true
tool_policy:
  structured_outputs_required: true
  agent_facing_contracts_required: true
  raw_data_in_tool_response_forbidden: true
  heavy_artifact_commit_forbidden: true
  prepares_agent_factory_tool_contracts_without_creating_agents: true
compute_policy:
