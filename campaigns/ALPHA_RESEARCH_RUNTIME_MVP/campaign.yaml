  - broad alpha search
  - factor promotion
  - strategy/backtest/portfolio research as a runtime product
  - ML/DL training beyond authorized scope
  - L2/event-stream ingestion
  - raw data commit
  - canonical data commit
  - feature value commit
  - label value commit
  - runtime heavy output commit
  - provider response commit
  - heavy artifact commit
  - local DB commit
  - label-as-feature
  - future/centered live-window feature input
