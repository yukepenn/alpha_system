acceptance:
  campaign_done_when:
  - All eight phases merged with required reviews and green checks.
  - Every new gate is fail-closed AND has a bypass canary that fails when the gate is neutered.
  - 4/4 negative controls executable; planted-fake-alpha end-to-end canary rejects contamination.
  - Surrogate-FDR calibration machinery landed with a committed value-free calibration report and declared zero-pass threshold.
  - reason_code taxonomy live and enforced for INCONCLUSIVE; the 6 Core Pilot verdicts carry additive annotations; originals byte-identical.
  - VariantLedger platform-cumulative with family budgets enforced at entry and promotion.
  - Sealed holdout declared/logged/gated.
  - Kill-shot readiness checklist + Track-B template + executable FUTSUB resume handoff exist.
  - No runs/, value, or DB artifact committed anywhere in the campaign.
stop_conditions:
- Contradictory scope, repeated execution failures, missing authorization, or impossible validation - stop and mark BLOCKED rather than weakening a gate.
- Any mutation of historical Core Pilot evidence - BLOCKED immediately.
- Any gate landed open-by-default - BLOCKED, never a follow-up TODO.
