campaign_id: DIFFERENTIATED_KILLSHOT_V1
campaign_name: >-
  Differentiated-substrate kill-shot V1: a conclusive, evidence-gated verdict on whether a set
  of DIFFERENTIATED, zero-feed, exchange-calendar-deterministic mechanisms (day-of-week, OPEX /
  quad-witch pinning, month-end / quarter-end flow, roll-week flow, open/close auction proximity)
  carry intraday edge that the crowded single-factor price-action substrate did not — run as
  pooled (ES/NQ/RTY) conditional studies on the EXISTING rigor path (Track A), plus at least one
  context!=trigger SetupSpec EXPLORATORY conditional probe over materialized path labels using the
  just-completed strategy-shaped lane (Track B). The whole surface is pre-registered under an FDR
  active-subset restatement BEFORE any metric; every readout is surrogate-FDR zero-pass gated,
  variant-ledgered, and N_eff/power-qualified. Success is CONCLUSIVE, not positive: 0 clean
  survivors with no remaining substrate excuse is a successful kill-shot. No alpha/tradability
  claim, no promotion, no second PnL truth, no new paid data.
repo_name: alpha_system
repo_path: ~/projects/alpha_system
project_profile:
  profile: trading_research
  mode: research
  layer: differentiated_substrate_kill_shot
  default_branch: main
  primary_language: python
  automation_lane: supervised
  risk_level: high
  human_review_required: true
  trading_enabled: true
  broker_enabled: false
  description: >-
    Research-only kill-shot on differentiated zero-feed mechanisms. Track A reuses the existing
    single-factor / conditional study path (StudySpec -> surrogate-FDR zero-pass calibration ->
    factor diagnostics -> verdict_refresh) with the calendar-derived flag as the declared
    conditioning factor-under-test, pooled across ES/NQ/RTY. Track B reuses the SSRL
    SetupSpec/MechanismCard + conditional_probe engine to run one context!=trigger EXPLORATORY probe
    over MATERIALIZED path labels. It is NOT a strategy backtester, NOT FactorLibrary/AlphaBook, NOT
    paper/live/broker, NOT new paid data, and adds NO new runtime dependency. HARD INVARIANTS:
    (a) the FDR active-subset restatement + surrogate-FDR zero-pass gate precede ANY real-data
    metric; (b) EXPLORATORY output can NEVER be promotion evidence and the trusted resolver MUST NOT
    consume it; (c) NO research->reference-sim bridge (research/ imports zero
    backtest/management/fast_path/value_store; outcomes come only from materialized path labels and
    values are loaded by tools/runtime and INJECTED into the pure research probe); (d) the existing
    single-factor study path + all truth-chain invariants (canary, surrogate-FDR zero-pass,
    no-lookahead/available_ts, roll/maintenance fail-closed, fast-vs-reference parity) are UNCHANGED
    -- new calendar flags and the declared-conditioning-factor admission are strictly ADDITIVE.
    DEFERRED (needs_paid_data, OUT this round): fomc_drift, cpi_surprise_reversion. DEFERRED (no
    cards this round): the governed-overnight family. Allowed outputs: REJECT / INCONCLUSIVE+code /
    WATCH / CANDIDATE_RESEARCH only.

workflow:
  active: workflow2
  workflow1:
    description: Human-gated phase loop; available, not the default for this campaign.
  workflow2:
    description: >-
      Ralph strict autonomous loop, dag_wave + serial merge. Phases are sequential (linear deps +
      overlapping src/ footprints in features/governance/research/tools), so the DAG linearizes to
      DK-P00 -> DK-P01 -> DK-P02 -> DK-P03 -> DK-P04 -> DK-P05. Track A (P01-P03) and Track B (P04)
      are LOGICALLY independent and could be parallelized in a future run; this first run keeps them
      sequential for merge-safety, matching the proven SSRL pattern.
    state_order:
    - RUN_INIT
    - CAMPAIGN_LOAD
    - PHASE_SELECT
    - SPEC_GENERATE
    - SPEC_VALIDATE
    - WORKTREE_CREATE
    - CODEX_EXECUTE
    - CHECKS_RUN
    - HANDOFF_VALIDATE
    - CLAUDE_REVIEW
    - VERDICT_PARSE
    - PR_CREATE
    - CI_WAIT
    - MERGE_GATE
    - MERGE
    - DONE_CHECK
    - NEXT_PHASE
    - CAMPAIGN_DONE_CHECK
    - RUN_SUMMARY

workflow2:
  scheduler:
    mode: dag_wave
    parallel_execution: true
    max_parallel_phases: 1
    merge_queue: serial

runtime:
  python: '3.12'
  smoke_command: python tools/verify.py --smoke
  all_command: python tools/verify.py --all
  canary_command: python tools/hooks/canary_runner.py

lanes:
  green:
    description: Low-risk automatic work (none in this campaign; all phases are material).
    merge_policy:
      review_required: false
  yellow:
    description: Material engineering/research; fresh Claude Opus review required before merge.
    merge_policy:
      review_required: true
  red:
    description: External/destructive/live/broker. NOT used by this campaign.
    merge_policy:
      review_required: true

