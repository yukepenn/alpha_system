  artifact_policy:
    commit_only: [campaign control + FDR restatement + REUSE-MAP/scope docs, commit-eligible handoff]
    never_commit: *never_commit
    explicit_staging_only: true
  done_criteria:
  - Bundle consistent; pointer set; YAML parses; FDR_ACTIVE_SUBSET_RESTATEMENT.md committed (value-free, predates any variant, fomc/cpi deferred, arithmetic = active surface 6); REUSE_MAP + SCOPE committed; smoke + canaries pass; runs/ untracked.
  handoff: handoffs/DIFFERENTIATED_KILLSHOT_V1/DK-P00.md
