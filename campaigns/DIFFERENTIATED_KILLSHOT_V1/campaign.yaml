  dependencies: [DK-P00]
  spec_required: true
  executor: Codex GPT-5.5 high
  reviewer: Claude Opus 4.8 xhigh
  verifier: Claude Sonnet 4.6
  purpose: Build the new zero-feed, known-ahead calendar flags three Track A mechanisms need, as ADDITIVE members of the existing SESSION_CALENDAR_ROLL family (not a new family), double-implemented under the fast-vs-reference parity gate, admitted via an APPROVED FeatureRequest.
  scope:
  - Add SessionFeatureName members is_opex_day_flag, is_quad_witch_day_flag, is_month_end_session_flag, is_quarter_end_session_flag, in_roll_window_flag in features/families/session/family.py (enum + _transform_id + _INPUT_FIELDS_BY_FEATURE + wrap + _feature_point compute branch), and MIRROR each value-identically in features/fast/session_calendar_roll.py (_feature_expression polars branch) so the auto-derived parity test passes. live=True / CAUSAL / POINT_IN_TIME (NOT offline_only).
