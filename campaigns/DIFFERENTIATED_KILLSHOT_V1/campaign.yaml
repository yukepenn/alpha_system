    never_commit: *never_commit
    explicit_staging_only: true
  done_criteria:
  - Five new flags exist in BOTH the reference family and the polars fast path, value-identical under the parity gate; APPROVED FeatureRequest(s) present; no-lookahead/available_ts audits pass; live=True/CAUSAL; flags materialized on ES/NQ/RTY locally (uncommitted); canaries PASS; single-factor path + value engine untouched; numpy/pandas/polars absent; runs/ untracked.
  handoff: handoffs/DIFFERENTIATED_KILLSHOT_V1/DK-P01.md
  review: yellow lane; fresh Claude Opus review required (parity + no-lookahead + zero-feed provenance).

- id: DK-P02
  name: Track A StudySpecs + Declared-Conditioning-Factor Admission + Surrogate-FDR Zero-Pass
  lane: YELLOW
  dependencies: [DK-P01]
  spec_required: true
  executor: Codex GPT-5.5 high
  reviewer: Claude Opus 4.8 xhigh
  verifier: Claude Sonnet 4.6
