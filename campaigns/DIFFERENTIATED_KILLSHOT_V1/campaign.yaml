- id: DK-P04
  name: Track B Context!=Trigger SetupSpec EXPLORATORY Conditional Probe (Real Slice)
  lane: YELLOW
  dependencies: [DK-P03]
  spec_required: true
  executor: Codex GPT-5.5 high
  reviewer: Claude Opus 4.8 xhigh
  verifier: Claude Sonnet 4.6
  purpose: Exercise the just-completed SSRL capability on a DIFFERENTIATED idea -- one context!=trigger SetupSpec with GENUINELY distinct context vs trigger signals (C1) -- as an EXPLORATORY, variant-ledgered, surrogate-FDR + power-qualified conditional probe over MATERIALIZED path labels, producing real evidence (or an honest DATA_GAP), never promotion.
  scope:
