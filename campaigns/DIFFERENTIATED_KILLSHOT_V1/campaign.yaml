acceptance_invariants:
- NO real-data metric is inspected before (a) the FDR active-subset RESTATEMENT note is committed (DK-P00, predating the earliest variant attempt) AND (b) the surrogate-FDR zero-pass calibration for that study yields ZERO_PASS_MET (DK-P02). The restatement is a value-free pre-registration note (NOT a BudgetAmendmentRecord -- that object is strictly-increasing and cannot encode a downward re-scope); fomc/cpi stay DEFERRED (needs_paid_data).
- EXPLORATORY SetupSpec/probe output (Track B) can NEVER be promotion evidence; the trusted resolver/promotion path MUST refuse to consume EXPLORATORY-stamped artifacts (forbidden_exploratory_promotion canary stays green).
- NO research -> reference-sim bridge -- research/ imports zero backtest/management/fast_path/value_store (forbidden_second_pnl_truth canary + the AST import guard stay green). Outcomes come ONLY from materialized path labels / forward-return labels; values are loaded by tools/ or runtime/ and INJECTED into the pure research probe. No second PnL truth.
- The existing single-factor study path (SINGLE_FACTOR_THRESHOLD_TEMPLATE, StudyConfig.factor_id) is byte-UNCHANGED; the new calendar flags and the declared-conditioning-factor admission in the surrogate path are strictly ADDITIVE and preserve every gate.
- All truth-chain invariants hold each phase -- planted_fake_alpha + true-alpha pair + forbidden_second_pnl_truth + forbidden_exploratory_promotion + governance_random_target + forbidden_scope_drift canaries PASS; surrogate-FDR zero-pass intact; no-lookahead/available_ts intact; roll/maintenance fail-closed intact; new SESSION_CALENDAR_ROLL flags pass the fast-vs-reference parity gate.
- New calendar flags are zero-feed and known-ahead (live=True / CAUSAL / available_ts <= row.available_ts); opex/quad-witch = analytic third-Friday, month/quarter-end = last trading session within the committed calendar's covered window (fail-absent outside coverage, non-exchange-official non-claim), in_roll_window via roll_guard.classify_roll_window over the analytic CME quarterly roll (approximate-roll non-claim). NO external feed; NO use of the offline-only live=False bars_to_roll/minutes_to_roll countdown features.
- Bounded surface -- pre-registered VariantLedger/family_budget (event-calendar family_budget 6; flow-seasonality family_budget 4); variant_budget = per-mechanism horizon count; instrument-pooled (ES/NQ/RTY) as ONE test per mechanism; NO grid, NO horizon sweep, NO per-instrument split without a (strictly-increasing) BudgetAmendmentRecord.
- C1 -- Track B context and trigger must be GENUINELY DISTINCT signals (different factor_id AND different underlying signal); the probe only checks declared distinctness, not numeric identity. C2 -- SSRL first-light is an honest DATA_GAP, NOT real ES_2024 evidence; it may not be cited as a result. C3 -- the de-stack ic=0.068/n=6862 is a carried SHIP_REFIT restatement, NOT fresh corroboration.
- No new runtime dependency (numpy/pandas/polars stay unimportable). No new paid data. FUTSUB / core-pilot research artifacts are NOT modified. git ls-files runs == empty; explicit staging only; no edits under forbidden_paths.
- Allowed outputs only -- REJECT / INCONCLUSIVE+reason_code / WATCH / CANDIDATE_RESEARCH. No profitability/tradability/alpha claim, no FactorLibrary promotion, no AlphaBook/Strategy-Reference, no paper/live -- unless the survivor gate independently earns the next layer (a WATCH/CANDIDATE survivor requires a reviewer_verdict artifact + reason_code and is surfaced to the user, never auto-promoted).

phases:
- id: DK-P00
  name: Bootstrap, FDR Active-Subset Restatement, and REUSE-MAP/Scope Lock
  lane: YELLOW
  dependencies: []
  spec_required: true
  executor: Codex GPT-5.5 high
  reviewer: Claude Opus 4.8 xhigh
  verifier: Claude Sonnet 4.6
  purpose: Land the bundle + a value-free FDR ACTIVE-SUBSET RESTATEMENT (the FDR-before-metric gate) + a REUSE-MAP/scope lock, so no later phase rebuilds machinery, scope-creeps, or inspects a metric before the surface is pre-registered.
  scope:
  - Confirm the 6-file bundle is present + consistent; confirm the coordinator-set ACTIVE_CAMPAIGN pointer.
  - Write research/differentiated_substrate_v1/FDR_ACTIVE_SUBSET_RESTATEMENT.md -- value-free, no metric. It RESTATES (NOT via a BudgetAmendmentRecord, which is strictly-increasing and cannot re-scope down) the active surface for THIS run -- active mechanisms = day_of_week_effect, opex_pinning, month_end_flow (month_end_rebalance_flow folded), roll_week_flow, open_close_auction_flow; DEFERRED = fomc_drift, cpi_surprise_reversion (needs_paid_data); overnight family not exercised (no cards). Per-mechanism variant_budget = horizon count (day_of_week 1, opex 1, month_end 1, roll_week 1, open_close 2). Per-family budgets carried unchanged from FDR_BUDGET.md / FDR_BUDGET_PRIORITY_2_3.md (event-calendar 6, flow-seasonality 4). Active effective pooled surface = event-calendar{opex 1 + month_end 1}=2 + flow-seasonality{day_of_week 1 + roll_week 1 + open_close 2}=4 = 6. Provenance + a created_at that predates any variant attempt.
  - Write docs/differentiated_killshot_v1/REUSE_MAP.md + SCOPE.md pinning the REUSED machinery (governance/{study_spec,variant_ledger,surrogate_run,setup_spec,mechanism_card,trial_ledger,pooled_hypothesis,feature_request}.py; research/conditional_probe.py; features/families/session/**; labels/roll_guard.py; tools/discovery_rigor_floor/run_real_surrogate_calibration.py; runtime factor diagnostics; core/value_store.load_parquet_values as a tools/runtime-only loader) and the explicit OUT-of-scope list (fomc/cpi until a feed is onboarded; overnight family; per-instrument splits; geometry/horizon sweeps; any single-factor-template edit; any FUTSUB-artifact edit).
  non_goals:
  - Any code; any engine change; ANY real-data metric, IC, return, or diagnostic value.
  checks:
  - test -f campaigns/DIFFERENTIATED_KILLSHOT_V1/GOAL.md
  - test -f campaigns/DIFFERENTIATED_KILLSHOT_V1/campaign.yaml
  - python -c "import yaml; yaml.safe_load(open('campaigns/DIFFERENTIATED_KILLSHOT_V1/campaign.yaml'))"
  - test -f research/differentiated_substrate_v1/FDR_ACTIVE_SUBSET_RESTATEMENT.md
  - grep -q "DIFFERENTIATED_KILLSHOT_V1" ACTIVE_CAMPAIGN.md
  - python tools/verify.py --smoke
  - python tools/hooks/canary_runner.py
  - git ls-files runs
  handoff_required: true
  review_required: true
  auto_pr: true
  auto_merge: true
  parallel_safe: false
  must_run_alone: true
  conflicts_with: []
  resource_class: []
  merge_group: bootstrap
  allowed_paths:
  - campaigns/DIFFERENTIATED_KILLSHOT_V1/**
  - research/differentiated_substrate_v1/**
  - docs/differentiated_killshot_v1/**
  - handoffs/DIFFERENTIATED_KILLSHOT_V1/DK-P00.md
  - reviews/DIFFERENTIATED_KILLSHOT_V1/DK-P00/**
  - runs/**
  - ACTIVE_CAMPAIGN.md
