agent_policy:
  autonomous_alpha_search_allowed: false
  self_review_forbidden: true
  self_promotion_forbidden: true
  role_permissions_required: true
  human_capital_judgment_required: true
  contracts_only_no_agent_instantiation: true
  continuous_research_runner_allowed: false
  agents_are_constrained_workers_not_autonomous_traders: true
  roster:
  - role: Research Director
    purpose: Scope a single bounded research task from a queued ResearchTask; assign roles; set budgets.
    may_decide:
    - task scope and budget within queue policy
    may_not_decide:
    - approve its own scoping as evidence
    - promote any factor or candidate
    forbidden:
    - alpha search
    - implementation
    - review verdicts
  - role: Hypothesis Scout
    purpose: Draft 3-5 AlphaSpec drafts for a scoped task, consulting rejected-idea and library summaries.
    may_decide:
    - draft AlphaSpec content
    may_not_decide:
    - approve its own AlphaSpec
    - implement code
    - run diagnostics
    forbidden:
    - self-approval
    - promotion
  - role: AlphaSpec Critic
    purpose: Critique/reject/request-revision on AlphaSpec drafts; independence from the drafter.
    may_decide:
    - reject or request revision
    may_not_decide:
    - implement
    - promote
    forbidden:
    - drafting the spec it reviews
  - role: Data Contract Auditor
    purpose: Verify seed DatasetVersion/FeaturePack/LabelPack availability and admissibility via registry tools.
    may_decide:
    - inputs available or blocked
    may_not_decide:
    - bypass accepted-DatasetVersion policy
    forbidden:
    - raw provider access
    - registry writes
  - role: Feature Engineer
    purpose: Reference approved seed features or draft a bounded FeatureRequest contract; never materialize broadly.
    may_decide:
    - bounded feature reference or request draft
    may_not_decide:
    - review its own work
    - run promotion
    - large-scale materialization
    forbidden:
    - self-review
    - value commits
  - role: Label Engineer
    purpose: Reference approved seed labels or draft a bounded LabelSpec contract; never materialize broadly.
    may_decide:
    - bounded label reference or spec draft
    may_not_decide:
    - review its own work
    - run promotion
    - large-scale materialization
    forbidden:
    - self-review
    - label-as-feature
  - role: No-Lookahead Auditor
    purpose: Audit runtime outputs for available_ts/label_available_ts/same-bar-fill/locked-test discipline via runtime audit + governance leakage guard.
    may_decide:
    - lookahead PASS/BLOCKED
    may_not_decide:
    - promote
    forbidden:
    - weakening the guard
  - role: Diagnostics Runner
    purpose: Invoke the Research Runtime (RuntimeToolResult/RuntimeRunSummary) for a bound StudySpec; never alter specs or promote.
    may_decide:
    - request runtime diagnostics within budget
    may_not_decide:
    - promote
    - alter feature/label/alpha/study specs
    forbidden:
    - runtime bypass
    - strategy validation framing
  - role: Statistical Reviewer
    purpose: Issue an independent PASS/REJECT/WATCH/INCONCLUSIVE review on runtime evidence; never the implementer.
    may_decide:
    - PASS/REJECT/WATCH/INCONCLUSIVE
    may_not_decide:
    - implement
    - self-assign as implementer
    forbidden:
    - reviewing its own implementation
  - role: Librarian
    purpose: Record agent decisions, rejected ideas, and proposed memory updates AFTER a reviewer verdict; never promote.
    may_decide:
    - propose memory records
    may_not_decide:
    - promote without PromotionGate
    - write a registry without a reviewer verdict
    forbidden:
    - registry writes outside sanctioned tool APIs
  optional_later_roles_not_mvp:
  - Strategy Wrapper Agent
  - Portfolio Agent
  - ML Meta-Label Agent
  - Execution Cost Reviewer
  - Live/Paper Operator
  - Red-Team Reviewer
  hard_rules:
  - no AlphaSpec -> no implementation
  - no FeatureRequest -> no feature
  - no LabelSpec -> no label
  - no StudySpec -> no diagnostics
  - no EvidenceBundle -> no candidate
  - no TrialLedger -> no promotion
  - no reviewer verdict -> no factor library entry
  - idea generator cannot approve itself
  - implementation agent cannot review itself
  - diagnostics runner cannot promote
  - reviewer cannot be implementer
  - human owns risk/capital/live judgment
  agents_may_never:
  - read raw Databento / IBKR provider files
  - call external providers
  - write raw/canonical/feature/label values into repo
  - modify FeatureStore / LabelStore / DatasetVersion registries directly
  - bypass the Runtime input resolver or tool surface
  - bypass StudySpec
  - self-review
  - self-promote
  - claim alpha/profitability/tradability
  - create paper/live/broker/order code
  - touch capital allocation
tool_policy:
  structured_outputs_required: true
  raw_tool_output_forbidden: true
  allowed_tool_registry_required: true
  direct_registry_writes_forbidden: true
  agent_facing_contracts_required: true
  raw_data_in_tool_response_forbidden: true
  heavy_artifact_commit_forbidden: true
  drives_existing_runtime_and_governance_tools_not_duplicates: true
  candidate_tools:
  - group: registry
    tools: [registry.list_datasets, registry.resolve_dataset_version, registry.list_feature_packs, registry.list_label_packs]
    mvp: contract_only
    backs_onto: alpha_system.data.foundation.version_registry / features.registry / labels.registry
  - group: feature_label
    tools: [feature.request, feature.validate_spec, feature.materialize, label.validate_spec, label.materialize]
    mvp: contract_only_seed_or_synthetic
    backs_onto: alpha_system.cli.seed_pack / governance.feature_request / governance.label_spec
  - group: runtime
    tools: [runtime.plan, runtime.validate_inputs, runtime.run_diagnostics, runtime.run_label_diagnostics, runtime.run_signal_probe, runtime.run_cost_stress, runtime.build_evidence_draft, runtime.build_reference_handoff]
    mvp: contract_only_via_runtime_tool_results
    backs_onto: alpha_system.runtime.tool_results / alpha_system.cli.runtime
  - group: review
    tools: [review.no_lookahead_audit, review.statistical_audit]
    mvp: contract_only
    backs_onto: alpha_system.runtime.audit.no_lookahead / governance.label_leakage_guard / governance.reviewer_verdict
  - group: ledger_memory_promotion
    tools: [ledger.record_trial, evidence.build_bundle, memory.record_rejection, memory.record_watch, promotion.review]
    mvp: contract_only
    backs_onto: alpha_system.governance.trial_ledger / evidence_bundle / rejected_idea / promotion_gate
  structured_tool_result_fields:
  - status
  - role
  - request_id
  - alpha_spec_id
  - study_spec_id
  - dataset_version_id
  - feature_pack_refs
  - label_pack_refs
  - runtime_run_id
  - diagnostics_summary
  - cost_summary
  - rejection_reasons
  - blocking_findings
  - next_required_gate
  - artifacts
  - limitations
data_access_policy:
  raw_provider_access_forbidden: true
  accepted_dataset_version_required: true
  feature_label_pack_required_for_runtime: true
  external_provider_calls_forbidden: true
  large_scale_value_consuming_studies_blocked_until_parquet_sink: true
  sanctioned_consumption_api: alpha_system.data.foundation.version_registry.resolve_dataset_version
  admissible_dataset_version_states:
  - VERSIONED
  - READY_FOR_RESEARCH
  canonical_records_only:
  - CanonicalBarRecord
  - CanonicalBBORecord
  - DenseGridBarRecord
  databento_primary_source: true
  ibkr_validation_source_only: true
  no_merge_of_databento_and_ibkr_versions: true
  locked_partition_use_requires_governance_metadata: true
  dataset_registry_report_rehydration_gap_respected: true
runtime_integration_policy:
  runtime_tool_use_required: true
  runtime_real_smoke_required_for_dry_run: true
  seed_pack_dry_run_not_alpha_evidence: true
  evidence_draft_not_candidate: true
  reference_handoff_not_reference_validation: true
  runtime_tool_result_contracts:
  - alpha_system.runtime.tool_results.RuntimeToolResult
  - alpha_system.runtime.tool_results.RuntimeRunSummary
  runtime_cli_surface: alpha_system.cli.runtime
  runtime_consumed_not_edited: true
review_independence_policy:
  implementer_cannot_review: true
  generator_cannot_approve: true
  diagnostics_runner_cannot_promote: true
  reviewer_verdict_required_for_any_watch_or_candidate: true
  statistical_reviewer_independent_of_implementer: true
  librarian_cannot_update_registry_without_verdict: true
memory_policy:
  rejected_ideas_visible: true
  failed_runs_visible: true
  agent_decisions_logged: true
  prompt_versions_logged: true
  role_versions_logged: true
  permission_versions_logged: true
  duplicate_idea_avoidance_required: true
  prior_rejection_reasons_surfaced: true
  consumes_governance_rejected_idea_and_graveyard: true
  record_types:
  - AgentRunRecord
  - AgentDecisionRecord
  - AgentHandoff
  - RejectedIdeaMemoryRecord
  - ResearchMemoryRecord
  - ToolInvocationRecord
  - AgentAuditLog
  - AgentPromptVersion
  - AgentRoleVersion
  - AgentPermissionVersion
  no_full_factor_library_or_alphabook_yet: true
dry_run_policy:
  synthetic_or_seed_pack_only: true
  no_alpha_claims: true
  no_factor_promotion: true
  no_strategy_generation: true
  no_external_provider_calls: true
  no_raw_data_read: true
  proves_role_routing_tools_permissions_handoffs_rejection_memory: true
  does_not_prove_alpha: true
  seed_pack_reference:
    dataset_version_id: dsv_databento_ohlcv_05404069799decb0
    description: Databento canonical TRADES ES/NQ/RTY 1-min 2024 seed window (local-only)
    seed_features: [returns, log_returns, rolling_volatility, rolling_range, volume_zscore, range_position]
    seed_labels: [fwd_ret_5m, fwd_ret_10m, fwd_ret_30m]
    real_dataset_version_smoke_ran: true
    note: Seed packs and registries are local-only under ALPHA_DATA_ROOT; absent in clean checkout/CI, so the dry-run degrades to a truthful PASS_WITH_WARNINGS using synthetic fixtures.
future_blockers:
- name: FEATURE_LABEL_PARQUET_SINK_V1
  condition: required before any large-scale, value-consuming Agent Factory study
  status: named follow-up, not yet a campaign/spec directory (see decisions/0006-feature-label-value-storage.md and docs/STRUCTURAL_BACKLOG.md)
  enforced_as: preflight gate + hard scope blocker in this campaign
- name: SESSION_LABEL_GUARD_FIX_V1
  condition: required before session-context agent research (rth_flag/eth_flag/session_minute) because runtime/input_resolver.py guard false-positives on the canonical session_label field
  status: named follow-up, not yet a campaign/spec directory
  enforced_as: preflight gate + hard scope blocker for session-context features in this campaign
- name: ALPHA_FUTURES_CORE_ALPHA_PILOT_V1
  condition: Core Alpha Pilot (real studies, candidate selection) must be a separate, separately-authorized campaign
  status: future roadmap campaign
  enforced_as: explicit non-goal; Agent Factory only prepares readiness
- name: DATASET_REGISTRY_REPORT_REHYDRATION
  condition: datasets.sqlite persists report hashes not full report objects; agents must use registry/runtime tools and respect this gap, not bypass accepted-DatasetVersion policy
  status: known coupling gap (docs/STRUCTURAL_BACKLOG.md)
  enforced_as: data_access_policy.dataset_registry_report_rehydration_gap_respected
