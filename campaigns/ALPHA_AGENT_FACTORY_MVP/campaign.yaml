acceptance_gates:
  bootstrap_and_entry:
    phases:
    - AGENT-P00
    - AGENT-P01
    - AGENT-P02
    exit_requirement: Campaign control files present; no campaign-local ACTIVE_CAMPAIGN.md; agent_factory package imports; entry contract encodes preflight gates (seed pack exists, runtime real smoke PASS, FEATURE_LABEL_PARQUET_SINK_V1 status, SESSION_LABEL_GUARD_FIX_V1 status); package/docs/template skeleton + naming present; handoffs/reviews present; artifact audit clean; no forbidden scope or claims.
    requires: &gate_requires
    - campaign_control_files_present
    - no_campaign_local_active_campaign_file
    - agent_factory_package_imports
    - preflight_gates_present
    - contracts_only_no_autonomous_agent_instantiated
    - every_role_has_permission_matrix_entry
    - separation_of_duties_enforced
    - structured_tool_outputs_no_raw_or_heavy_data
    - runtime_consumed_via_tool_contracts_not_bypassed
    - accepted_dataset_version_required
    - no_raw_provider_access
    - no_external_provider_calls
    - large_scale_value_consuming_studies_blocked_until_parquet_sink
    - session_context_features_blocked_until_session_guard_fix
    - seed_or_synthetic_dry_run_not_alpha_evidence
    - evidence_draft_not_candidate
    - reference_handoff_not_reference_validation
    - failed_and_rejected_ideas_visible
    - generator_cannot_approve_implementer_cannot_review_runner_cannot_promote
    - librarian_cannot_write_registry_without_verdict
    - no_alpha_tradability_profitability_claims
    - no_strategy_backtest_portfolio_or_alpha_search_scope
    - no_continuous_autonomous_research_runner
    - no_paper_live_broker_scope
    - no_raw_canonical_heavy_or_db_artifacts_committed
    - no_test_weakening_or_gaming
    - dag_parallel_phases_have_disjoint_allowed_paths
    - serial_merge_queue_respected
    - phase_handoffs_present
    - yellow_phase_reviews_present_for_yellow_phases
    - review_verdicts_PASS_or_PASS_WITH_WARNINGS_for_merged_phases
    - artifact_audit_pass
  core_contracts:
    phases:
    - AGENT-P03
    - AGENT-P04
    - AGENT-P05
    - AGENT-P06
    exit_requirement: AgentRole contract model + registry, permission matrix (ToolPermission/DataPermission/WritePermission/ReviewPermission/PromotionPermission/HumanApprovalRequired/RedLaneRequired), tool contract registry with structured value-free outputs, and research queue/work-item contracts present; fail-closed; no agent instantiated.
    requires: *gate_requires
  agent_roles:
    phases:
    - AGENT-P07
    - AGENT-P08
    - AGENT-P09
    - AGENT-P10
    - AGENT-P11
    - AGENT-P12
    - AGENT-P13
    - AGENT-P14
    - AGENT-P15
    exit_requirement: All ten MVP role contracts (Research Director, Hypothesis Scout, AlphaSpec Critic, Data Contract Auditor, Feature Engineer, Label Engineer, No-Lookahead Auditor, Diagnostics Runner, Statistical Reviewer, Librarian) implemented additively in disjoint files, each with purpose/inputs/tools/outputs/decisions/forbidden-actions/handoff-format/reviewer-independence; each registers via the role registry without editing shared files; no role can self-review or self-promote.
    requires: *gate_requires
  enforcement_and_records:
    phases:
    - AGENT-P16
    - AGENT-P17
    - AGENT-P18
    exit_requirement: Separation-of-duties enforcement + role/permission wiring assembled fail-closed; agent run/decision/handoff/tool-invocation/audit/version records present; rejected-idea and research memory present (consuming governance graveyard); duplicate-idea avoidance and prior-rejection surfacing implemented.
    requires: *gate_requires
  assets_and_bridge:
    phases:
    - AGENT-P19
    - AGENT-P20
    - AGENT-P21
    exit_requirement: Durable indexed agent prompt/skill templates, operator guide + next-Core-Alpha-Pilot readiness doc, and the runtime tool integration bridge present; bridge adapts RuntimeToolResult/RuntimeRunSummary without editing runtime and without embedding raw/heavy data.
    requires: *gate_requires
  dry_run_and_closeout:
    phases:
    - AGENT-P22
    - AGENT-P23
    - AGENT-P24
    - AGENT-P25
    exit_requirement: Bounded non-alpha dry-run harness + seed-pack/synthetic integration dry run pass or record a truthful PASS_WITH_WARNINGS proving role routing/tool contracts/permissions/handoffs/rejection memory (not alpha); Workflow 2 DAG integration documented; acceptance audit + semantic done-check pass with a recorded final verdict and ALPHA_FUTURES_CORE_ALPHA_PILOT_V1 readiness.
    requires: *gate_requires
    allowed_final_verdicts:
    - COMPLETE
    - COMPLETE_WITH_WARNINGS
    - BLOCKED
risk_controls:
  agent_factory_not_alpha_search:
    required: true
    rules:
      no_broad_alpha_discovery: true
      no_continuous_autonomous_runner: true
      no_factor_promotion: true
    detection:
    - scope audit
    - import audit
    - Claude review
  contracts_only_no_agent_instantiation:
    required: true
    rules:
      no_autonomous_agent_loop_created: true
      role_permission_tool_queue_memory_dry_run_contracts_only: true
    detection:
    - scope audit
    - import audit
    - Claude review
  runtime_consumed_not_bypassed:
    required: true
    rules:
      tools_call_runtime_tool_results_and_resolve_dataset_version: true
      runtime_package_not_edited: true
      no_runtime_input_resolver_bypass: true
    detection:
    - source path audit
    - import audit
    - Claude review
  no_raw_provider_access:
    required: true
    rules:
      raw_provider_files_not_read_by_agent_factory_code: true
      canonical_records_only: true
    detection:
    - source path audit
    - import audit
    - Claude review
  accepted_dataset_version_required:
    required: true
    rules:
      resolve_dataset_version_only: true
      admissible_states_versioned_or_ready_for_research: true
    detection:
    - data contract auditor tests
    - Claude review
  no_external_provider_calls:
    required: true
    rules:
      no_databento_or_ibkr_api_calls_in_this_campaign: true
    detection:
    - data access mode audit
    - import audit
    - CI configuration audit
  permission_matrix_required:
    required: true
    rules:
      every_role_has_tool_data_write_review_promotion_permissions: true
      fail_closed_default_deny: true
    detection:
    - permission matrix tests
    - Claude review
  separation_of_duties_required:
    required: true
    rules:
      generator_cannot_approve: true
      implementer_cannot_review: true
      diagnostics_runner_cannot_promote: true
      reviewer_is_not_implementer: true
      librarian_cannot_write_registry_without_verdict: true
    detection:
    - separation enforcement tests
    - Claude review
  structured_tool_outputs_required:
    required: true
    rules:
      all_tool_results_structured: true
      no_raw_or_heavy_data_in_tool_results: true
      allowed_tool_registry_required: true
      direct_registry_writes_forbidden: true
    detection:
    - tool result tests
    - artifact policy checks
    - Claude review
  parquet_sink_blocker:
    required: true
    rules:
      large_scale_value_consuming_studies_blocked_until_FEATURE_LABEL_PARQUET_SINK_V1: true
    detection:
    - preflight gate tests
    - scope audit
    - Claude review
  session_label_guard_blocker:
    required: true
    rules:
      session_context_features_blocked_until_SESSION_LABEL_GUARD_FIX_V1: true
    detection:
    - preflight gate tests
    - scope audit
    - Claude review
  dry_run_not_evidence:
    required: true
    rules:
      seed_or_synthetic_dry_run_not_alpha_evidence: true
      evidence_draft_not_candidate: true
      reference_handoff_not_reference_validation: true
    detection:
    - dry-run tests
    - doc grep
    - Claude review
  failed_and_rejected_ideas_visible:
    required: true
    rules:
      rejected_idea_memory_record_required: true
      failed_runs_visible: true
    detection:
    - memory tests
    - Claude review
  consume_not_duplicate:
    required: true
    rules:
      agent_factory_orchestrates_governance_runtime_registry_not_duplicates: true
    detection:
    - source path audit
    - import audit
    - Claude review
  no_alpha_claims:
    required: true
    blocked_claims:
    - alpha without evidence
    - tradability
    - profitability
    - market-beating
    - production-ready
    - live-ready
    - broker-ready
    - strategy-ready
    detection:
    - prohibited claim tests
    - doc grep
    - Claude review
  no_strategy_scope:
    required: true
    blocked_scope:
    - autonomous alpha search
    - continuous research runner
    - strategy optimization
    - backtest as a product
    - portfolio allocation
    - promotion of a candidate
    - L2 replay
    - ML training beyond authorized scope
    detection:
    - source path audit
    - dependency audit
    - Claude review
  human_capital_judgment_required:
    required: true
    rules:
      human_owns_risk_capital_live_judgment: true
      human_approval_required_flag_respected: true
    detection:
    - permission matrix audit
    - Claude review
  no_raw_heavy_artifacts:
    required: true
    rules:
      no_raw_canonical_feature_label_runtime_agent_values_or_db_committed: true
    detection:
    - git status audit
    - git ls-files audit
    - artifact policy checks
    - find artifacts -type f -size +1M -print
  agent_docs_indexed:
    required: true
    rules:
      no_scattered_unindexed_agent_prompts: true
      source_of_truth_index_present: true
    detection:
    - docs index check
    - Claude review
  dag_parallel_requires_allowed_paths:
    required: true
    rules:
      parallel_safe_phase_requires_disjoint_allowed_paths: true
      no_global_coordinator_file_in_parallel_phase_allowed_paths: true
    detection:
    - plan-dag preview
    - dag_scheduler validation
    - campaign.yaml validation script
  serial_merge_queue_required:
    required: true
    rules:
      merge_one_pr_at_a_time: true
      phase_branches_do_not_write_active_campaign_in_parallel_mode: true
    detection:
    - merge_queue validation
    - Ralph driver
    - Claude review
  acceptance_gate_coverage_required:
    required: true
    rules:
      every_phase_in_exactly_one_gate: true
      no_phase_missing_from_gates: true
    detection:
    - campaign.yaml validation script
    - PHASE_PLAN cross-check
  no_test_weakening:
    required: true
    rules:
      test_removals_require_explicit_phase_scope: true
      review_required_for_test_changes: true
      fake_completion_forbidden: true
    detection:
    - diff review
    - Claude review
    - semantic done-check
  local_wsl2_path:
    required: true
    allowed_repo_root: ~/projects/alpha_system
    forbidden_paths:
    - /mnt/c
    - OneDrive
    - Dropbox
    - Google Drive
    - Windows-synced folders
    detection:
    - RUN_INIT preflight
    - worktree path audit
stop_conditions:
- name: STOP file active
  condition: runs/<run_id>/STOP indicates active stop
  action: stop_before_new_phase_or_merge
- name: autonomous agent instantiated
  condition: an autonomous agent loop or continuous research runner is created instead of contracts only
  action: block_merge_and_escalate
- name: raw provider data read by agent_factory code
  condition: agent_factory code reads raw Databento/IBKR files (.dbn/.zst/parquet/arrow/feather) directly
  action: block_merge_and_repair
- name: accepted DatasetVersion bypassed
  condition: agent inputs produced without resolving an admissible DatasetVersion via resolve_dataset_version
  action: block_merge_and_repair
- name: external Databento or IBKR API call attempted
  condition: any external provider API call is attempted in this campaign
  action: stop_and_escalate
- name: runtime bypassed
  condition: agent_factory code performs diagnostics directly instead of calling the runtime tool surface (RuntimeToolResult/RuntimeRunSummary / alpha runtime CLI)
  action: block_merge_and_repair
- name: runtime or consumed primitive edited
  condition: a phase edits src/alpha_system/runtime|governance|research|experiments|backtest|features|labels|data instead of consuming it
  action: block_merge_and_repair
- name: AlphaSpec or StudySpec bypassed
  condition: a diagnostics request is routed without a bound AlphaSpec and StudySpec
  action: block_merge_and_repair
- name: role without permission matrix entry
  condition: an agent role exists without ToolPermission/DataPermission/WritePermission/ReviewPermission/PromotionPermission in the matrix
  action: block_merge_and_repair
- name: self-review or self-promotion
  condition: a generator approves its own AlphaSpec, an implementer reviews its own work, a diagnostics runner promotes, or a reviewer is the implementer
  action: block_merge_and_rework
- name: librarian writes registry without verdict
  condition: the Librarian role updates a registry or promotes without a reviewer verdict + PromotionGate
  action: block_merge_and_rework
- name: tool result exposes raw or heavy data
  condition: an agent-facing tool result is unstructured or embeds raw or heavy data
  action: block_merge_and_repair
- name: large-scale value-consuming study before parquet sink
  condition: a broad/multi-year value-consuming study is attempted before FEATURE_LABEL_PARQUET_SINK_V1 is complete or explicitly human-approved
  action: block_merge_and_escalate
- name: session-context feature used before guard fix
  condition: rth_flag/eth_flag/session_minute (session_label-derived) features are used before SESSION_LABEL_GUARD_FIX_V1
  action: block_merge_and_rework
- name: dry-run treated as alpha evidence
  condition: a seed-pack or synthetic dry-run is presented as alpha evidence, a candidate, or tradability
  action: block_merge_and_rework
- name: EvidenceDraft treated as candidate
  condition: an EvidenceDraft is presented as a promoted candidate
  action: block_merge_and_rework
- name: ReferenceCandidateHandoff treated as Reference validation
  condition: a ReferenceCandidateHandoff is presented as completed Reference validation
  action: block_merge_and_rework
- name: failed or rejected idea hidden
  condition: a failed or rejected idea is hidden instead of recorded with a RejectedIdeaMemoryRecord/RejectionReasonRecord
  action: block_merge_and_repair
- name: factor promotion or alpha search scope introduced
  condition: broad alpha search, factor promotion, candidate promotion, or a continuous research runner scope appears
  action: block_merge_and_escalate
- name: strategy/backtest/portfolio scope introduced
  condition: strategy optimization, backtest-as-product, or portfolio allocation scope appears
  action: block_merge_and_escalate
- name: duplicate of existing primitive introduced
  condition: agent_factory code duplicates governance/runtime/research/experiments/backtest primitives instead of orchestrating them
  action: block_merge_and_rework
- name: alpha/profitability/tradability claim detected
  condition: unqualified alpha, tradability, profitability, market-beating, production-ready, live-ready, or broker-ready claim appears
  action: block_merge_and_rework
- name: capital or live judgment automated
  condition: an agent makes a risk/capital/live decision reserved for the human, or creates paper/live/broker/order code
  action: stop_and_escalate
- name: raw or heavy data artifact staged
  condition: raw/canonical/feature/label/runtime/agent values, parquet/arrow/feather, provider responses, or local DB files staged
  action: block_merge_and_repair
- name: agent prompts scattered
  condition: agent prompt assets are scattered across the repo without a source-of-truth index
  action: block_merge_and_rework
- name: parallel phase lacks allowed_paths
  condition: a phase marked parallel_safe declares no allowed_paths or declares a global/coordinator path
  action: block_campaign_execution_until_fixed
- name: parallel wave has path/resource conflict
  condition: two phases scheduled in the same wave have overlapping allowed_paths or a shared resource_class
  action: stop_phase_selection
- name: phase branch writes ACTIVE_CAMPAIGN.md in parallel mode
  condition: a phase branch writes ACTIVE_CAMPAIGN.md while update_active_campaign is coordinator_only
  action: block_merge_and_repair
- name: merge outside serial merge queue
  condition: a merge is attempted outside the serial merge queue (more than one PR merging at once)
  action: stop_and_escalate
- name: campaign YAML invalid
  condition: campaign.yaml fails YAML parse
  action: block_campaign_execution_until_fixed
- name: phase dependency missing
  condition: selected phase dependencies are incomplete or blocked
  action: stop_phase_selection
- name: acceptance gates missing phases
  condition: acceptance_gates do not cover every phase exactly once
  action: block_campaign_execution_until_fixed
- name: PHASE_PLAN / campaign.yaml mismatch
  condition: phase ids, names, lanes, dependencies, or DAG metadata disagree between files
  action: block_campaign_execution_until_fixed
- name: Claude review BLOCKED
  condition: review verdict is BLOCKED
  action: blocked_handoff_and_stop
- name: repair attempts exceeded
  condition: repair loop exceeds configured max attempts
  action: blocked_handoff_and_stop
- name: active repo/worktree under forbidden Windows path
  condition: active worktree under /mnt/c, OneDrive, Dropbox, Google Drive, or Windows-synced folder
  action: stop_run_init_or_worktree_create
