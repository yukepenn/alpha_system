  - paper trading
  - live trading
  - order routing
  - order placement
  - production execution adapter
  - real-time market data loop
  - external provider call
  - raw provider data access by agents
  - direct SQLite registry writes outside sanctioned tool/CLI APIs
  - parallel SQLite/registry writes
  - deleting or weakening the reference label engine
  - weakening or bypassing roll_guard / maintenance-crossing guard semantics
  - silently crossing rolls or ignoring the maintenance break
  - weakening resolver exact-id semantics
  - future-observed label contract changes
  - consuming labels as features
  - editing cost/value/accounting math (backtest/costs.py is read-only; no second PnL truth)
  - full-history JSONL value payloads (Parquet-first; JSONL sample/manifest/audit only)
  - new alpha ideation or new AlphaSpec batch
  - new label families beyond existing governed families
  - parameter optimization / param search
  - Ray / GPU / distributed / cluster compute
  - label compiler / DSL platform
