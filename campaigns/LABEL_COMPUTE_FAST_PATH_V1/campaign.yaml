campaign_id: LABEL_COMPUTE_FAST_PATH_V1
campaign_name: 'Label Compute Fast Path V1: a single-machine, local, columnar (Polars/NumPy/Numba where correct), batch/vectorized, incremental, reference-parity-gated, registry-safe fast producer path for label materialization — the label analogue of FEATURE_COMPUTE_FAST_PATH_V1 — so the paused ALPHA_FUTURES_RESEARCH_SUBSTRATE_SCALEOUT_V1 full-window label backfill stops depending on the per-row Python reference label engine (which remains the correctness oracle forever).'
repo_name: alpha_system
repo_path: ~/projects/alpha_system
project_profile:
  profile: trading_research
  mode: research
  layer: label_compute_fast_path
  default_branch: main
  primary_language: python
  automation_lane: supervised
  risk_level: high
  human_review_required: true
  trading_enabled: true
  broker_enabled: false
  description: >-
    Substrate/infra engineering only. This campaign extends the existing partial
    fast label path (src/alpha_system/labels/fast/**, built by FCFP-P10) to the
    full governed label surface (fixed + extended horizons, session-close /
    maintenance-flat, cost-adjusted, path labels) under a reference-parity /
    no-lookahead / guard gate, plus targeted incremental worker-parallel
    execution and a benchmark readiness gate, so FUTSUB P16-P20 can rerun on the
    fast path. POLICY SUPERSESSION: FUTSUB-P18/P19 specs listed "a V1 fast label
    path" as a non-goal; this campaign deliberately supersedes that policy —
    after LCFP acceptance the fast path is the sanctioned production label
    materialization path and FUTSUB P16-P20 are amended to use it (LCFP-P09
    handoff). The per-row reference label engine is never deleted and stays the
    oracle. It is NOT Ray/GPU/cluster, NOT a label-compiler platform, NOT alpha
    ideation, NOT FactorLibrary/AlphaBook/Strategy Reference, NOT
    paper/live/broker. It makes no alpha, profitability, or tradability claim.
workflow:
  active: workflow2
  workflow1:
    description: Human-gated phase loop; available but not the default for this campaign.
  workflow2:
    description: Ralph strict autonomous campaign loop with DAG-wave scheduling and a serial merge queue. Registry-writing / benchmark phases are serialized by a shared registry resource_class.
    state_order:
    - RUN_INIT
    - CAMPAIGN_LOAD
    - PHASE_SELECT
    - SPEC_GENERATE
    - SPEC_VALIDATE
    - WORKTREE_CREATE
    - CODEX_EXECUTE
    - CHECKS_RUN
    - HANDOFF_VALIDATE
    - CLAUDE_REVIEW
    - VERDICT_PARSE
    - PR_CREATE
    - CI_WAIT
    - MERGE_GATE
    - MERGE
    - DONE_CHECK
    - NEXT_PHASE
    - CAMPAIGN_DONE_CHECK
    - RUN_SUMMARY
workflow2:
  scheduler:
    mode: dag_wave
    parallel_execution: true
    max_parallel_phases: 3
    merge_queue: serial
    update_active_campaign: coordinator_only
  notes:
  - Build phases in DAG order in isolated worktrees; merge one PR at a time.
  - Phase branches must never write ACTIVE_CAMPAIGN.md; the coordinator owns it.
  - Label-pack phases (LCFP-P03/P04/P05) edit distinct modules + tests and use
    synthetic fixtures, so they are parallel-safe BUILD but serial MERGE. They
    do NOT write the production registry.
  - Phases that touch the real local label registry or run benchmarks against
    real data (LCFP-P06 integration, LCFP-P08 benchmark/readiness) share
    resource_class materialization_registry and are NOT parallel_safe; the
    scheduler serializes them. No parallel SQLite writes.
  - Bootstrap / inventory / shared-contract / integration / parity / benchmark /
    closeout phases are must_run_alone.
  - POLICY SUPERSESSION is campaign-level and explicit (see GOAL.md). Old
    FUTSUB-P18/P19 spec text saying "labels stay reference-engine-only" is
    historical data, not instruction; per the headless trust boundary, agents
    follow this contract, AGENTS.md, and frontier.yaml only.
runtime:
  python: '3.12'
  package_root: src/alpha_system
  test_root: tests
  smoke_command: python tools/verify.py --smoke
  full_command: python tools/verify.py --all
  canary_command: python tools/hooks/canary_runner.py
  research_venv: ~/.venvs/alpha_system_research
  data_root_env: ALPHA_DATA_ROOT
  optional_dependency_pattern: 'require_dependency("polars") / require_dependency("numba"); core dependencies stay empty; the reference engine remains the dependency-free fallback.'
  consumed_primitives:
  - src/alpha_system/labels/engine.py + labels/families/** (fixed_horizon incl. session_close/maintenance_flat, cost_adjusted, path, event) — the per-row REFERENCE oracle; never deleted or weakened
  - src/alpha_system/labels/roll_guard.py (RollCrossPolicy, DROP default, ex-ante roll calendar; R-036/R-037) — guard semantics the fast path must reproduce EXACTLY
  - src/alpha_system/labels/version.py (LabelAvailabilityPolicy — per-family label_available_ts derivation; parity must be exact-match)
  - src/alpha_system/labels/families/fixed_horizon/family.py (HorizonOverlapMetadata / OVERLAP_METADATA_VERSION — N_eff overlap metadata)
  - src/alpha_system/labels/store.py + labels/registry.py (official keystone label registry write/resolve path; SQLite; serial writes)
  - src/alpha_system/backtest/costs.py (existing cost profiles; consumed READ-ONLY — no second cost/PnL truth; path stays forbidden to edit)
  - src/alpha_system/core/value_store.py (Parquet-first value sink/reader, content hash, available_ts)
  - src/alpha_system/cli/label.py (alpha label plan|materialize --execute|list|report|leakage-audit|input-pack)
  - src/alpha_system/cli/scaleout.py + features/scaleout/driver.py (scaleout driver + --workers/ALPHA_CPU_WORKERS convention from FCFP-P15)
  - tests/unit/feature_compute_fast_path/parity_harness.py (LabelParityTolerance, assert_label_records_match — existing label parity harness to extend)
  editable_in_campaign:
  - src/alpha_system/labels/fast/** (EXTEND the existing FCFP-P10 module — do not greenfield)
  - src/alpha_system/cli/label.py + src/alpha_system/cli/scaleout.py + src/alpha_system/features/scaleout/driver.py (LCFP-P06 targeting/workers integration)
  - src/alpha_system/labels/store.py / labels/registry.py / core/value_store.py (LCFP-P06 minimal metadata extensions only)
  - tools/label_compute_fast_path/** (baseline + benchmark harness scripts)
  - tests/unit/label_compute_fast_path/** + tests/fixtures/label_compute_fast_path/** + tests/unit/feature_compute_fast_path/** (parity suite; NOTE the existing fast-label test tests/unit/feature_compute_fast_path/test_fixed_horizon_label_pack.py is currently RED when polars is installed — the FCFP-P10 pack/fixture are stale vs the extended governed FixedHorizonLabelName enum (60m/120m/240m/session_close/maintenance_flat); CI is green only because polars is absent there. LCFP-P03 repairs it; it must be green from LCFP-P03 onward.)
models:
  build_time_roles:
    strategy_campaign_framing: ChatGPT GPT-5.5 Thinking
    specs_semantic_review_done_check: Claude Opus 4.8 xhigh
    source_map_verifier_mechanical_audit: Claude Sonnet 4.6
    execution_tests_repair_handoffs: Codex GPT-5.5 xhigh
    orchestration_state_machine_dag_merge_queue: Ralph
  notes:
  - Build-time model roles write/review/merge the campaign.
  - No in-product autonomous agents are instantiated; this is engineering work driven by the strict Workflow 2 loop.
lane_policy:
  green: Low-risk automatic work (campaign control docs, indexes, value-free scaffolding).
  yellow: Material engineering work requiring fresh Claude Opus review.
  red: External, destructive, live, production, costly, or broker-adjacent work; requires scoped authorization.
  red_authorization_required:
  - PROJECT_OP_AUTHORIZED
  - PROJECT_OP_SCOPE
  - PROJECT_OP_EXPIRES
  red_expected_in_campaign: false
  default_lane: yellow
state_machine:
  driver: ralph
  strict: true
  stop_checks_before:
  - provider calls
  - phase selection
  - codex execution
  - validation
  - review
  - PR creation
  - CI waiting
  - merge gate
  - merge
  - done-check
  - next-phase selection
  resume: from recorded run state, never regenerating completed work
artifact_policy:
  never_commit: &never_commit
  - runs/**
  - raw or canonical market data
  - provider responses (Databento DBN/Zstd, IBKR)
  - materialized feature values
  - materialized label values
  - local SQLite registries (datasets/features/labels) and journals/WAL
  - benchmark output values / heavy artifacts
  - heavy artifacts (parquet/arrow/feather)
  - research run logs and caches
  never_commit_globs: &never_commit_globs
  - data/raw/**
  - data/canonical/**
  - registry/*.sqlite
  - metadata/*.sqlite
  - '**/*.sqlite'
  - '**/*.sqlite3'
  - '**/*.db'
  - '**/*.db-journal'
  - '**/*.wal'
  - '**/*.parquet'
  - '**/*.arrow'
  - '**/*.feather'
  - '**/*.dbn'
  - '**/*.zst'
  - '**/*.pkl'
  - '**/*.npy'
  - '**/*.npz'
  - '**/*.log'
  - '**/logs/**'
  - '**/tmp/**'
  - '**/cache/**'
  - '**/.pytest_cache/**'
  - runs/**
  - artifacts/**
  - '**/*credential*'
  local_only_by_default:
  - artifacts/**
  - runs/**
  - $ALPHA_DATA_ROOT/**
  allowed_commit:
  - campaign control files
  - docs
  - fast label pack code (labels/fast/** extensions)
  - reference-parity / no-lookahead / guard test code + tiny synthetic fixtures
  - benchmark harness code + value-free benchmark summaries
  - targeting/incremental/worker CLI code + tests
  - value-free inventory / baseline / parity / readiness summaries
  - handoffs
  - reviews
  tiny_fixture_exceptions:
    allowed: true
    paths:
    - tests/fixtures/**
    - tests/unit/label_compute_fast_path/fixtures/**
    requirements:
    - synthetic
    - tiny
    - documented
    - not real market data
    - not alpha evidence
  research_evidence_artifacts:
    note: >-
      Evidence under research/label_compute_fast_path_v1/** is commit-eligible
      ONLY when value-free: inventory/baseline summaries (counts, elapsed,
      rows/sec), parity reports (counts, max/median diffs, tolerances),
      benchmark/readiness summaries (elapsed, rows/sec, speedup, worker policy,
      file counts, registry deltas). Per-row label values, Parquet, SQLite
      registries, and provider responses remain local-only under runs/** or
      $ALPHA_DATA_ROOT/** and are never committed. Full-history JSONL payloads
      are forbidden everywhere — Parquet-first; JSONL is sample/manifest/audit
      tier only.
  phase_requirements:
    explicit_artifact_policy_required: true
    explicit_staging_required: true
    artifact_audit_before_merge: true
    no_raw_data_commits: true
    no_canonical_data_commits: true
    no_feature_value_commits: true
    no_label_value_commits: true
    no_local_db_commits: true
    no_heavy_artifact_commits: true
git_policy:
  explicit_staging_only: true
  forbidden_commands:
  - git add .
  - git add -A
  force_push_allowed: false
  commit_raw_data_allowed: false
  commit_heavy_artifacts_allowed: false
  commit_local_db_allowed: false
  commit_feature_or_label_values_allowed: false
  require_handoff_per_phase: true
  require_git_status_short: true
  require_explicit_file_list_in_handoff: true
  clean_merge_gate_required: true
  artifact_audit_before_merge: true
  branch_prefix_workflow2: auto/
  commit_message_format: '<campaign_id>/<phase_id>: <summary>'
review_policy:
  reviewer: Claude Opus 4.8 xhigh
  verifier: Claude Sonnet 4.6
  yellow_requires_fresh_review: true
  green_review_optional: true
  red_requires_scoped_authorization: true
  review_artifacts:
    commit_eligible: reviews/LABEL_COMPUTE_FAST_PATH_V1/<phase_id>/**
    run_local: runs/<run_id>/phases/<phase_id>/review.md and verdict.json
  semantic_done_check_required: true
  allowed_verdicts:
  - PASS
  - PASS_WITH_WARNINGS
  - BLOCKED
merge_policy:
  merge_queue: serial
  auto_merge_for_green: true
  auto_merge_for_yellow_after_review: true
  auto_merge_for_red: false
  clean_merge_gate_required: true
  artifact_audit_before_merge: true
  protected_branch: main
  no_force_push: true
  one_pr_at_a_time: true
parity_policy:
  reference_engine_is_oracle: true
  reference_engine_never_deleted: true
  parity_required_before_fast_path_is_production_for_labels: true
  parity_dimensions:
  - label value (exact where expected; documented numeric tolerance where float differences expected)
  - label_available_ts (EXACT match; per-family LabelAvailabilityPolicy derivation)
  - roll-crossing guard behavior (drop/truncate/flag/invalid) — EXACT
  - maintenance-crossing guard behavior — EXACT
  - same-bar barrier ambiguity policy (path labels; SameBarBarrierPolicy) — EXACT
  - insufficient_window / input_gap / session_reset gap rows
  - missingness / quality flags
  - horizon-overlap / N_eff metadata (HorizonOverlapMetadata)
  - label_version_id identity (content-addressed from LabelContractSpec; fast path emits values only, never new identities)
  unexplained_difference_is_blocker: true
  synthetic_fixture_tests_required: true
  ci_runnable_parity_required: true
  roll_and_maintenance_crossing_cases_required: true
benchmark_policy:
  bounded_real_benchmark_required_before_resume: true
  baseline_reference_benchmark_bounded_slice_only: true
  reference_never_timed_on_full_window: true
  bounded_slice_self_validating: at least one contract-roll event and at least one session/maintenance gap, or widen/fail with a clear message
  real_wiring_required: benchmark entrypoints must invoke the real reference and fast runners; stubbed timing callbacks or blocked-only summaries are failures unless the data root is genuinely absent
  worker_sweep: [1, 2, 4, 8]
  report_fields_required:
  - elapsed
  - rows_per_sec
  - canonical_reads_per_symbol_year
  - labels_per_read
  - file_counts
  - registry_deltas
  - full_accepted_window_runtime_estimate
  - speedup_vs_reference
  - selected_production_worker_policy
  benchmark_values_local_only: true
identity_and_registry_policy:
  exact_label_version_id_semantics_required: true
  keystone_identity_preserved: true
  label_version_id_content_addressed_from_label_contract_spec: true
  fast_path_emits_values_only_never_new_identities: true
  serial_registry_writes_required: true
  no_parallel_sqlite_writes: true
  no_manual_sqlite_writes: true
  official_keystone_write_path_required: true
  parquet_first_required: true
  jsonl_audit_tier_only: true
  no_full_history_jsonl_payloads: true
engine_versioning_policy:
  producer_engine_id_recorded: true
  value_schema_version_recorded: true
  never_mix_engines_silently_in_one_value_series: true
  stale_reference_outputs_preserve_dont_delete: true
  on_within_tolerance_difference:
  - keep existing valid reference outputs as parity reference
  - record producer_engine_id so reference-vs-fast provenance is explicit
  on_beyond_tolerance_difference:
  - treat as a fast-path bug, OR
  - version the value schema explicitly, OR
  - re-materialize via the official path
targeting_policy:
  targeting_dimensions_required:
  - label_group
  - horizon_group
  - symbols
  - years / dataset_version_ids
  dry_run_estimate_required: true
  execute_selected_units_only_required: true
  checkpoint_restart_required: true
  force_recompute_supported: true
  skip_completed_via_checkpoint_and_registry_truth_required: true
  workers_over_independent_units_only: label_group x symbol x dataset_version/year; registry writes strictly serial
  worker_flag_convention: '--workers CLI flag takes precedence over ALPHA_LABEL_CPU_WORKERS, then ALPHA_CPU_WORKERS; default 1 = serial.'
