phases:
- id: LCFP-P00
  name: Campaign Bootstrap + FUTSUB Pause Handoff
  lane: GREEN
  dependencies: []
  spec_required: true
  executor: Codex GPT-5.5 xhigh
  reviewer: Claude Opus 4.8 xhigh
  verifier: Claude Sonnet 4.6
  purpose: Land the campaign contract bundle and docs/evidence scaffolding, verify + record the FUTSUB stop state (P19 ~60% cost-adjusted labels, checkpointed; worktrees preserved), and preserve all valid values/registries — NO deletion.
  scope:
  - Confirm the 6-file campaign bundle is present and internally consistent; confirm the root ACTIVE_CAMPAIGN.md pointer selects this campaign (coordinator-owned).
  - Create the fast-label docs index and the value-free evidence directory skeleton.
  - Verify and record the FUTSUB pause state in handoffs/LABEL_COMPUTE_FAST_PATH_V1/FUTSUB_PAUSE_STATE.md - run 2026-06-07T235209Z stopped at FUTSUB-P19 (19/34, STOP present, state.json stale-RUNNING), P19 cost-adjusted labels ~60% materialized (checkpointed/durable), two leftover worktrees preserved; all existing label values and registry rows preserved as-is.
  - NO deletion, NO registry mutation, NO value writes anywhere in this phase.
  non_goals:
  - Any fast-path implementation, parity test, benchmark, or value/DB writes; resuming or modifying the FUTSUB run itself.
  checks:
  - git status --short
  - test -f ACTIVE_CAMPAIGN.md
  - test -f campaigns/LABEL_COMPUTE_FAST_PATH_V1/GOAL.md
  - test -f campaigns/LABEL_COMPUTE_FAST_PATH_V1/PHASE_PLAN.md
  - test -f campaigns/LABEL_COMPUTE_FAST_PATH_V1/campaign.yaml
  - test -f campaigns/LABEL_COMPUTE_FAST_PATH_V1/ACCEPTANCE.md
  - test -f campaigns/LABEL_COMPUTE_FAST_PATH_V1/RISK_REGISTER.md
  - test -f campaigns/LABEL_COMPUTE_FAST_PATH_V1/RUNBOOK.md
  - test '!' -f campaigns/LABEL_COMPUTE_FAST_PATH_V1/ACTIVE_CAMPAIGN.md
  - grep -q "LABEL_COMPUTE_FAST_PATH_V1" ACTIVE_CAMPAIGN.md
  - test -f handoffs/LABEL_COMPUTE_FAST_PATH_V1/FUTSUB_PAUSE_STATE.md
  - python -c "import yaml; yaml.safe_load(open('campaigns/LABEL_COMPUTE_FAST_PATH_V1/campaign.yaml'))"
  - python tools/verify.py --smoke
  - git ls-files runs
  handoff_required: true
  review_required: false
  auto_pr: true
  auto_merge: true
  parallel_safe: false
  must_run_alone: true
  conflicts_with: []
  resource_class: []
  merge_group: bootstrap
  allowed_paths:
  - campaigns/LABEL_COMPUTE_FAST_PATH_V1/**
  - docs/label_compute_fast_path/README.md
  - docs/label_compute_fast_path/OVERVIEW.md
  - research/label_compute_fast_path_v1/README.md
  - research/label_compute_fast_path_v1/.gitkeep
  - handoffs/LABEL_COMPUTE_FAST_PATH_V1/LCFP-P00.md
  - handoffs/LABEL_COMPUTE_FAST_PATH_V1/FUTSUB_PAUSE_STATE.md
  - reviews/LABEL_COMPUTE_FAST_PATH_V1/LCFP-P00/**
  - ACTIVE_CAMPAIGN.md
  - README.md
  forbidden_paths: *forbidden_paths
  artifact_policy: &ap
    commit_only:
    - campaign control + overview docs
    - value-free evidence directory skeleton
    - fast label path code + parity/benchmark tests + tiny synthetic fixtures
    - value-free inventory/baseline/parity/benchmark/readiness summaries
    - commit-eligible handoff/review
    never_commit: *never_commit
    explicit_staging_only: true
  done_criteria:
  - Bundle present and consistent; root pointer selects this campaign; no campaign-local ACTIVE_CAMPAIGN.md; FUTSUB pause state recorded with zero deletion/mutation; YAML parses; smoke passes; runs/ untracked.
  handoff: handoffs/LABEL_COMPUTE_FAST_PATH_V1/LCFP-P00.md
  review: green lane; review optional.
- id: LCFP-P01
  name: Label Engine Inventory + Baseline Benchmark
  lane: YELLOW
  dependencies:
  - LCFP-P00
  spec_required: true
  executor: Codex GPT-5.5 xhigh
  reviewer: Claude Opus 4.8 xhigh
  verifier: Claude Sonnet 4.6
  purpose: Inventory the reference label path, the existing labels/fast coverage, the FUTSUB P16-P20 label configs, roll_guard, and the label registry; benchmark the reference path on a bounded slice so the fast path has a measured baseline.
  scope:
  - Write a value-free inventory of the reference label engine (labels/engine.py + families fixed_horizon incl. extended horizons + session_close/maintenance_flat, cost_adjusted, path, event), the existing labels/fast surface (FastLabelMaterializer / FastLabelPack / build_fixed_horizon_label_pack / LabelPanelFrameRequest — fixed-horizon coverage only), the FUTSUB P16-P20 label configs/specs, roll_guard semantics (RollCrossPolicy DROP default, ex-ante calendar), LabelAvailabilityPolicy derivation rules, HorizonOverlapMetadata, and the label registry schema (producer_engine_id, value_schema_version, parquet_path, content hashes).
  - Benchmark the REFERENCE label path on a bounded representative slice only (compute-only timing or a scratch-rooted run; NO production registry writes; the reference is never timed on a full window). Record elapsed, rows/sec, and the extrapolated full-window estimate per label family in a value-free baseline summary.
  non_goals:
  - Any fast-path implementation; production registry writes; full-window runs; alpha work.
  checks:
  - git status --short
  - python tools/verify.py --smoke
  - test -f research/label_compute_fast_path_v1/inventory/inventory.md
  - test -f research/label_compute_fast_path_v1/baseline/baseline_benchmark_summary.md
  - git ls-files runs
  - git ls-files '**/*.parquet' '**/*.sqlite'
  handoff_required: true
  review_required: true
  auto_pr: true
  auto_merge: true
  parallel_safe: false
  must_run_alone: true
  conflicts_with: []
  resource_class: []
  merge_group: inventory
  allowed_paths:
