  handoff: handoffs/ALPHA_IDEA_TO_VERDICT_LOOP_V0/IVL-P02.md
  review: yellow lane; fresh Claude Opus review required (pre-test DATA_GAP semantics + class-guard correctness + boundary placement).

- id: IVL-P03
  name: Fast Exploratory Lane Bridge -- Generic `fast_probe(card, setup, slice_spec)`
  lane: YELLOW
  dependencies: [IVL-P02]
  spec_required: true
  executor: Codex GPT-5.5 high
  reviewer: Claude Opus 4.8 xhigh
  verifier: Claude Sonnet 4.6
