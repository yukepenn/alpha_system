  - python tools/hooks/canary_runner.py
  - python -c "import importlib,sys; [sys.exit('numpy/pandas must NOT import') for m in ('numpy','pandas') if importlib.util.find_spec(m)]"
  - git ls-files runs
  handoff_required: true
  review_required: true
  auto_pr: true
  auto_merge: true
  parallel_safe: false
  must_run_alone: false
  conflicts_with: []
  resource_class: []
  merge_group: gate
  allowed_paths:
  - src/alpha_system/cli/idea.py
  - src/alpha_system/research_lane/testability_gate.py
  - src/alpha_system/research/conditional_probe.py
  - tests/unit/research_lane/test_testability_gate.py
  - tests/unit/research/test_conditional_probe_class_guard.py
  - tests/unit/cli/test_idea_cli.py
