  - Add the >=2-distinct-class precondition to src/alpha_system/research/conditional_probe.py empty-set guards (currently only empty-set guards exist), reusing the label-runtime class-balance summary logic (_distribution_summary / _class_balance_summary emit class_count / majority_class_count / minority_class_count) so a degenerate single-class slice is caught as DATA_GAP rather than producing a metric.
