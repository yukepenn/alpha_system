acceptance_invariants:
- The optional study_kind discriminator (main_effect | context_not_equal_trigger) lives ONLY on the new IdeaDraft intake wrapper; the frozen closed-schema dataclasses MechanismCard / SetupSpec / AlphaSpec are byte-UNCHANGED (adding a field re-hashes their deterministic content-hash id and breaks every locked id). study_kind is greenfield-additive (confirmed absent in governance/).
- The front door ALWAYS mints an AlphaSpec as the trunk (even for shape-bearing ideas); MechanismCard (+ optional SetupSpec) ride as lineage sidecars emitted at the orchestration layer (cli/idea.py + the IdeaDraft wrapper), never by mutating a governance schema. REJECT -> graveyard therefore writes via alpha_spec_id (RejectedIdea accepts only AlphaSpec / HypothesisCard ids), and IVL-P05 asserts an AlphaSpec id exists before any graveyard write (fail closed otherwise).
- The fast exploratory lane bridge lives in a NEW package OUTSIDE src/alpha_system/research/ (e.g. src/alpha_system/research_lane/). research/ imports zero value engine -- the boundary test tests/unit/research/test_research_no_value_engine.py (rglob over research/ forbids core.value_store imports and the load_parquet_values token) stays green. The bridge imports load_parquet_values, maps to governance rows, and INJECTS in-memory rows into the unchanged loader-free probe engines.
- Exploratory readouts are NEVER auto-promoted -- promotion_eligible stays False on every fast readout, evaluate_setup_conditional_probe keeps its hardcoded promotion_eligible=False, and reject_exploratory_promotion_artifact fails closed on any EXPLORATORY-stamped artifact reaching a trusted promotion input (forbidden_exploratory_promotion canary stays green). WATCH / CANDIDATE require a reviewer_verdict_id-gated create_promotion_decision and are surfaced, never auto-promoted; FactorLibrary stays survivor-only (count 0 today).
- The testability gate returns PASS / FAIL / DATA_GAP BEFORE any real metric; DATA_GAP is a PRE-TEST verdict and the shot is NOT spent. A >=2-distinct-class precondition is added to conditional_probe.py empty-set guards (reusing the label-runtime class-balance summary class_count / majority / minority logic); a degenerate single-class slice fails the gate as DATA_GAP rather than producing a metric.
- The surrogate ZERO_PASS_MET gate inside evaluate_setup_conditional_probe and the family / variant budget gate are HARD preconditions and are not bypassed; the fast lane runs the label-shuffle surrogate (run_count>0, 0 passes, 0 errors) or the probe raises.
- No new runtime dependency (numpy / pandas stay unimportable; polars is only the optional dependency that load_parquet_values already requires, and the lane fails closed with a clear DATA_GAP / dependency error -- never fabricated values -- when polars or ALPHA_DATA_ROOT is absent). No materialize / recompute / scaleout driver call; no second value loader (factors/io.py JSONL/CSV readers are NOT reused for Parquet). No new paid data.
- The 8 legacy Track-A doc-convention cards (research/differentiated_substrate_v1/cards/*.json) are migrate-then-retire: their content maps into the canonical MechanismCard + AlphaSpec (no second card class). The canonical mechanism_id is a fresh content-hash mech_<hex>; the kebab slug becomes MechanismCard.source (e.g. track_a:day_of_week_effect) so the STOPPED DK tooling's study_spec.dataset_scope['mechanism_id'] linkage is not broken. cards/*.json are read-only references this round and are NOT deleted until the canonical line reproduces them AND a parity test passes.
- IVL-P01 fails closed when any canonical field with no doc-card source (source, cost_sensitivity, variant_budget, duplicate_exposure) cannot be populated. All 8 cards migrate as study_kind=main_effect (single-conditioner); existing_substrate (day_of_week_effect) is the sole live exemplar, the 5 derivable-calendar cards return DATA_GAP/requeue (new FeatureRequest unmaterialized), and the 2 needs_paid_data cards (fomc_drift, cpi_surprise_reversion) migrate as records only and are NEVER tested (RED-deferred, out of V0 scope -- IVL charters NO FeatureRequest implementation or paid-data sourcing).
- FUTSUB / core-pilot / differentiated-killshot research artifacts and tools are a STOPPED campaign and are read-only / do-not-touch (in forbidden_paths). Reading already-materialized ES_2020 / ES_2024 packs is load-only (no recompute, no materialize, no registry write). The IVL-P06 dogfood tolerates an honest DATA_GAP when ALPHA_DATA_ROOT is unset and never fabricates values.
- Slice metadata an idea document carries (testability_slice / testability_slices / slice_spec / slice_specs / fast_probe_slice / fast_probe_slice_spec / slice / slices) is RECOGNIZED PASSTHROUGH at the intake validator (governance/idea_draft.py): validated-and-ignored by the governance bundle and consumed downstream by the testability gate / fast_probe, NEVER folded into the frozen content-hashed AlphaSpec / MechanismCard / SetupSpec dataclasses (their ids stay byte-identical), with the unknown-field rejection still in force for every other undeclared field.
- git ls-files runs == empty; explicit staging only (no git add . / git add -A); no force push; no edits under forbidden_paths. Allowed outputs only -- REJECT / DATA_GAP / INCONCLUSIVE / WATCH / CANDIDATE. No alpha / profitability / tradability / production claim; no FactorLibrary promotion; no downstream module charter; no second PnL truth.

phases:
- id: IVL-P00
  name: Role-Unification ADR + Canonical Idea-Object Schema Map
  lane: YELLOW
  dependencies: []
  spec_required: true
  executor: Codex GPT-5.5 high
  reviewer: Claude Opus 4.8 xhigh
  verifier: Claude Sonnet 4.6
  purpose: Write the canonical idea-object hierarchy as an ADR + schema map (AlphaSpec front-door trunk; MechanismCard / SetupSpec emitted sub-objects linked at the orchestration layer, not by schema mutation; study_kind on a new intake wrapper only; Track-A cards marked migrate-then-retire) so no later phase rebuilds machinery, mutates a frozen schema, or invents a second card class. Doc/ADR only, NO behavior change.
  scope:
  - Write decisions/ADR-IVL-0001-role-unification.md recording the canonical role of each object (idea.yaml/IdeaDraft, AlphaSpec front-door trunk, MechanismCard EXPLORATORY sub-object, optional SetupSpec, FeatureRequest/LabelSpec, StudySpec, EvidenceBundle/ReviewerVerdict/TrialLedger, Rejected/Requeue/Candidate/FactorLibrary) and the 3 conflict resolutions verified against live code (study_kind on the new wrapper only; AlphaSpec always minted so StudySpec has an alpha_spec_id and the graveyard key resolves; no link from MechanismCard->SetupSpec into StudySpec in V0).
  - Write docs/IDEA_TO_VERDICT_SCHEMA_MAP.md pinning each role contract + the full Track-A card -> canonical field map (hypothesis.economic_rationale->rationale; hypothesis.statement->expected_mechanism; expected_sign->expected_direction; expected_horizon[list]->horizon[str] collapse rule; expected_session->session; required_features.existing->required_features[list]; required_labels.existing->required_labels[list]; lookahead/orthogonality/conditioning -> AlphaSpec.timestamp_assumptions/exclusion_rules/expected_failure_modes/promotion_criteria + data_assumptions) and the 4 fail-closed gaps (source, cost_sensitivity, variant_budget, duplicate_exposure) + the mech_<hex> id / kebab-slug-to-source lineage rule + the data_dependency.class partition (existing_substrate / derivable_from_exchange_calendar / needs_paid_data).
  - Confirm a REUSE-MAP -- verify each reused symbol exists in current code (validate/create_mechanism_card, validate/create_setup_spec, validate_alpha_spec, generate_mechanism_id, create_rejected_idea_record, validate_requeued_verdict_record, create_promotion_decision, reject_exploratory_promotion_artifact, _class_balance_summary, build_factor_diagnostics_run, evaluate_setup_conditional_probe, load_parquet_values, FeatureLabelPackResolver, verdict_reason_code) and record the explicit OUT-of-scope list (no downstream module; no FeatureRequest implementation; no paid data; no schema mutation; no FUTSUB/DK edit).
  non_goals:
  - Any code; any engine change; any schema mutation; any CLI; any real-data metric, IC, return, or diagnostic value.
  checks:
  - test -f campaigns/ALPHA_IDEA_TO_VERDICT_LOOP_V0/GOAL.md
  - test -f campaigns/ALPHA_IDEA_TO_VERDICT_LOOP_V0/campaign.yaml
  - python -c "import yaml; yaml.safe_load(open('campaigns/ALPHA_IDEA_TO_VERDICT_LOOP_V0/campaign.yaml'))"
  - test -f decisions/ADR-IVL-0001-role-unification.md
  - test -f docs/IDEA_TO_VERDICT_SCHEMA_MAP.md
  - grep -q "ALPHA_IDEA_TO_VERDICT_LOOP_V0" ACTIVE_CAMPAIGN.md
  - python tools/verify.py --smoke
  - python tools/hooks/canary_runner.py
  - git ls-files runs
  handoff_required: true
  review_required: true
  auto_pr: true
  auto_merge: true
  parallel_safe: false
  must_run_alone: true
  conflicts_with: []
  resource_class: []
  merge_group: bootstrap
  allowed_paths:
  - decisions/ADR-IVL-0001-role-unification.md
  - docs/IDEA_TO_VERDICT_SCHEMA_MAP.md
  - campaigns/ALPHA_IDEA_TO_VERDICT_LOOP_V0/**
  - handoffs/ALPHA_IDEA_TO_VERDICT_LOOP_V0/IVL-P00.md
  - reviews/ALPHA_IDEA_TO_VERDICT_LOOP_V0/IVL-P00/**
  - runs/**
  - ACTIVE_CAMPAIGN.md
  forbidden_paths: *forbidden_paths
  artifact_policy:
    commit_only: [role-unification ADR + schema map + REUSE-MAP, commit-eligible handoff]
    never_commit: *never_commit
    explicit_staging_only: true
  done_criteria:
  - ADR-IVL-0001 records front-door=AlphaSpec, the 3 conflict resolutions, the per-object role contract, study_kind-on-wrapper-only, and the full Track-A field map + 4 fail-closed gaps + mech-id lineage rule + data_dependency partition; schema map committed; REUSE-MAP confirms each cited symbol exists in current code; git diff --stat touches only decisions/ + docs/ (no behavior change); pointer set; YAML parses; smoke + canaries pass; runs/ untracked.
  handoff: handoffs/ALPHA_IDEA_TO_VERDICT_LOOP_V0/IVL-P00.md
  review: yellow lane; fresh Claude Opus review of the ADR + schema map + REUSE-MAP required.

- id: IVL-P01
  name: Intake Validator + `alpha idea validate` (Canonical Object Emit + study_kind + Track-A Migration)
  lane: YELLOW
  dependencies: [IVL-P00]
  spec_required: true
  executor: Codex GPT-5.5 high
  reviewer: Claude Opus 4.8 xhigh
  verifier: Claude Sonnet 4.6
  purpose: Build the front door -- a new IdeaDraft intake wrapper (carrying the optional study_kind discriminator + lineage) and `alpha idea validate <idea.yaml>` that emits a canonical AlphaSpec + EXPLORATORY MechanismCard (plus a SetupSpec when shape-bearing), fails closed when canonical fields cannot populate, and migrates the 8 Track-A doc-convention cards into the canonical line as the main_effect exemplar.
  scope:
  - Author src/alpha_system/governance/idea_draft.py -- a new IdeaDraft intake wrapper holding the optional study_kind discriminator (main_effect | context_not_equal_trigger) + lineage references, validated greenfield. study_kind lives ONLY here; the frozen MechanismCard / SetupSpec / AlphaSpec dataclasses are NOT mutated.
  - Author src/alpha_system/cli/idea.py (mirror cli/study.py register_subparser exactly) + register it in cli/main.py build_parser(). `alpha idea validate <idea.yaml>` always mints an AlphaSpec trunk (via validate_alpha_spec) and EMITS a value-free EXPLORATORY MechanismCard (create_mechanism_card, minting a fresh mech_<hex> id) plus an optional SetupSpec (create_setup_spec) when study_kind=context_not_equal_trigger; fails closed (exit 2) when any of source / cost_sensitivity / variant_budget / duplicate_exposure cannot be populated.
  - Migrate the 8 Track-A cards' content into canonical fields per the IVL-P00 field map (slug -> MechanismCard.source for lineage; existing_substrate day_of_week_effect as the live main_effect exemplar) and add a canonical-vs-card parity test. Migration outputs land under a NEW canonical dir; cards/*.json are read-only references and are NOT edited or deleted this phase.
  non_goals:
  - Mutating MechanismCard / SetupSpec / AlphaSpec schemas; any real-data metric; the fast-lane bridge (IVL-P03); implementing any FeatureRequest or sourcing paid data; deleting cards/*.json; editing FUTSUB / DK tooling.
  checks:
  - python tools/verify.py --smoke
  - python -m pytest tests -k "idea or idea_draft or mechanism_card or setup_spec or alpha_spec or track_a or migration" -q
  - python tools/hooks/canary_runner.py
  - python -c "import importlib,sys; [sys.exit('numpy/pandas must NOT import') for m in ('numpy','pandas') if importlib.util.find_spec(m)]"
  - git ls-files runs
  handoff_required: true
  review_required: true
  auto_pr: true
  auto_merge: true
  parallel_safe: false
  must_run_alone: false
  conflicts_with: []
  resource_class: []
  merge_group: front_door
  allowed_paths:
  - src/alpha_system/cli/idea.py
  - src/alpha_system/cli/main.py
  - src/alpha_system/governance/idea_draft.py
  - src/alpha_system/governance/track_a_migration.py
  - tests/unit/cli/test_idea_cli.py
  - tests/unit/governance/test_idea_draft.py
  - tests/unit/governance/test_track_a_migration.py
  - research/idea_to_verdict_loop_v0/**
  - handoffs/ALPHA_IDEA_TO_VERDICT_LOOP_V0/IVL-P01.md
  - reviews/ALPHA_IDEA_TO_VERDICT_LOOP_V0/IVL-P01/**
  - runs/**
  forbidden_paths: *forbidden_paths
  artifact_policy:
    commit_only: [IdeaDraft wrapper + cli/idea.py + main.py registration + Track-A migration mapper + parity/cli/wrapper tests, commit-eligible handoff]
    never_commit: *never_commit
    explicit_staging_only: true
  done_criteria:
  - "`alpha idea validate <idea.yaml>` emits AlphaSpec + EXPLORATORY MechanismCard (+ SetupSpec when shape-bearing) and registers in build_parser(); study_kind validated on the IdeaDraft wrapper (frozen schemas byte-unchanged); all 8 Track-A cards migrate (day_of_week main_effect exemplar; mech_<hex> minted; slug->source) with a passing canonical-vs-card parity test; fails closed when source/cost_sensitivity/variant_budget/duplicate_exposure cannot populate; cards/*.json unedited; tests pass; canaries PASS; runs/ untracked."
  handoff: handoffs/ALPHA_IDEA_TO_VERDICT_LOOP_V0/IVL-P01.md
  review: yellow lane; fresh Claude Opus review required (no schema mutation + study_kind placement + fail-closed migration fidelity).

- id: IVL-P02
  name: Executable Testability Gate + `alpha idea testability` (PASS / FAIL / DATA_GAP, Pre-Test)
  lane: YELLOW
  dependencies: [IVL-P01]
  spec_required: true
  executor: Codex GPT-5.5 high
  reviewer: Claude Opus 4.8 xhigh
  verifier: Claude Sonnet 4.6
  purpose: Build the pre-test testability gate -- `alpha idea testability <idea.yaml>` running 5 fail-closed checks that return PASS / FAIL / DATA_GAP BEFORE any real metric is computed (DATA_GAP is a PRE-TEST verdict, the shot is not spent), and add the missing >=2-distinct-class precondition to the conditional probe.
