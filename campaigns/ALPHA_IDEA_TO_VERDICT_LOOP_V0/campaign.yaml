campaign_id: ALPHA_IDEA_TO_VERDICT_LOOP_V0
campaign_name: >-
  Idea-to-verdict loop V0: assemble the trustworthy governance/research backend into one
  researcher-facing product loop where ANY idea (PA / VWAP / IC / event / cross-market) is
  handed in as a single canonical object (idea.yaml -> AlphaSpec front-door trunk that EMITS a
  value-free EXPLORATORY MechanismCard, plus an optional shape-bearing SetupSpec), quick-screened
  on a small EXISTING materialized slice via a generic fast exploratory lane, gated for
  testability BEFORE any real metric, rendered as a human-readable governed verdict REPORT.md,
  and routed to memory (graveyard / requeue / reviewer-gated promotion). This is ASSEMBLY +
  CONSOLIDATION over an intact reuse spine -- no new mechanism, feature, label, data, or
  downstream module. The optional study_kind discriminator (main_effect | context_not_equal_trigger)
  lives ONLY on a new intake wrapper, never mutating the frozen governance dataclasses. Migrate the
  8 legacy Track-A doc-convention cards into the canonical line (migrate-then-retire with tests).
  Research-only: no alpha / profitability / tradability / production claim, no second PnL truth, no
  auto-promotion, no new paid data, no broker, no live.
repo_name: alpha_system
repo_path: ~/projects/alpha_system
project: alpha_system
profile: trading_research
workflow: workflow2
driver: ralph_frontier_strict
default_lane: yellow
status: draft
owner: human
created_from_template: 3.0.0

project_profile:
  profile: trading_research
  mode: research
  layer: idea_to_verdict_loop
  default_branch: main
  primary_language: python
  automation_lane: supervised
  risk_level: high
  human_review_required: true
  trading_enabled: true
  broker_enabled: false
  description: >-
    Research-only assembly of the canonical idea-object hierarchy and the missing front-door /
    fast-lane / verdict / memory wiring. The front door (a new cli/idea.py + a new IdeaDraft intake
    wrapper) ALWAYS mints an AlphaSpec as the governance trunk (the "most ideas killed" kill-trunk
    that TrialLedger / RejectedIdea / PromotionDecision already key off via alpha_spec_id) and EMITS
    a value-free EXPLORATORY MechanismCard (plus an optional SetupSpec for context!=trigger ideas)
    as lineage sidecars. A generic fast_probe bridge (in a NEW research_lane package OUTSIDE
    research/ to keep the no-second-PnL boundary test green) loads a bounded EXISTING materialized
    slice via core.value_store.load_parquet_values + FeatureLabelPackResolver (tools/runtime-only
    loader; research/ never imports it) and feeds the unchanged loader-free probe engines
    (build_factor_diagnostics_run | evaluate_setup_conditional_probe) in-memory. A testability gate
    returns PASS / FAIL / DATA_GAP BEFORE any real metric (DATA_GAP is a PRE-TEST verdict, the shot
    is not spent). HARD INVARIANTS: (a) study_kind lives only on the new intake wrapper, never on the
    frozen MechanismCard / SetupSpec / AlphaSpec closed-schema dataclasses (mutating them re-hashes
    locked content-hash ids); (b) the fast-lane bridge lives OUTSIDE src/alpha_system/research/ and
    research/ imports zero value engine; (c) promotion_eligible stays False on every exploratory
    readout and reject_exploratory_promotion_artifact fails closed; (d) the front door always mints an
    AlphaSpec so REJECT -> graveyard writes via alpha_spec_id; (e) no materialize / recompute / scaleout
    driver call and no second value loader. NOT a strategy backtester, NOT FactorLibrary / AlphaBook /
    Mining V2 / PA grammar / Strategy Sandbox, NOT paper / live / broker, NOT new paid data. FUTSUB and
    differentiated-killshot artifacts are a STOPPED campaign and are read-only / do-not-touch. Allowed
    outputs: REJECT / DATA_GAP / INCONCLUSIVE / WATCH / CANDIDATE only.

workflow:
  active: workflow2
  workflow1:
    description: Human-gated phase loop; available, not the default for this campaign.
  workflow2:
    description: >-
      Ralph strict autonomous loop, dag_wave + serial merge. The 7 IVL phases form a strictly linear
      dependency chain (IVL-P00 -> IVL-P01 -> IVL-P02 -> IVL-P03 -> IVL-P04 -> IVL-P05 -> IVL-P06)
      with overlapping src/ footprints in cli/governance/research_lane, so the DAG linearizes to a
      sequential 7-wave run for merge-safety.
    state_order:
    - RUN_INIT
    - CAMPAIGN_LOAD
    - PHASE_SELECT
    - SPEC_GENERATE
    - SPEC_VALIDATE
    - WORKTREE_CREATE
    - CODEX_EXECUTE
    - CHECKS_RUN
    - HANDOFF_VALIDATE
    - CLAUDE_REVIEW
    - VERDICT_PARSE
    - PR_CREATE
    - CI_WAIT
    - MERGE_GATE
    - MERGE
    - DONE_CHECK
    - NEXT_PHASE
    - CAMPAIGN_DONE_CHECK
    - RUN_SUMMARY

workflow2:
  scheduler:
    mode: dag_wave
    parallel_execution: true
    max_parallel_phases: 1
    merge_queue: serial

runtime:
  python: '3.12'
  smoke_command: python tools/verify.py --smoke
  all_command: python tools/verify.py --all
  canary_command: python tools/hooks/canary_runner.py

automation:
  auto_generate_phase_specs: true
  auto_execute: true
  auto_repair: true
  auto_review: true
  auto_pr: true
  auto_merge: true
  strict_micro_loop: true
  ralph_required: true

limits:
  max_phases: 7
  max_micro_loops_per_phase: 3
  max_run_minutes: 720

review:
  green_requires_claude_review: false
  yellow_requires_claude_review: true
  red_requires_claude_review: true

merge:
  green_auto_merge: true
  yellow_auto_merge: true
  red_auto_merge: false
  require_ci: true
  require_verdict_json: true

lanes:
  green:
    description: Low-risk automatic work (none in this campaign; all phases are material).
    merge_policy:
      review_required: false
  yellow:
    description: Material engineering/research; fresh Claude Opus review required before merge.
    merge_policy:
      review_required: true
  red:
    description: External/destructive/live/broker. NOT used by this campaign.
    merge_policy:
      review_required: true

