  - PROJECT_STATUS.md
  - .gitignore
  - .gitattributes
  - .editorconfig
  - ACTIVE_CAMPAIGN.md
  - campaigns/ALPHA_SYSTEM_V1/GOAL.md
  - campaigns/ALPHA_SYSTEM_V1/ACCEPTANCE.md
  - campaigns/ALPHA_SYSTEM_V1/PHASE_PLAN.md
  - campaigns/ALPHA_SYSTEM_V1/campaign.yaml
  - campaigns/ALPHA_SYSTEM_V1/RISK_REGISTER.md
  - campaigns/ALPHA_SYSTEM_V1/RUNBOOK.md
  - handoffs/ASV1-P00.md
  - specs/**
  - handoffs/**
  - reviews/**
  - evals/**/.gitkeep
  - docs/**
  - decisions/**
  - configs/**/.gitkeep
  - data/**/.gitkeep
  - data/**/README.md
  - metadata/.gitkeep
  - metadata/README.md
  - artifacts/**/.gitkeep
  - artifacts/**/README.md
  forbidden_paths:
  - runs/**
  - src/**
  - tests/**
  - data/raw/**
  - data/canonical/**
  - data/factors/**
  - data/labels/**
  - data/cache/**
  - metadata/*.sqlite
  - metadata/*.db
  - artifacts/**
  - '**/*.parquet'
  - '**/*.db'
  - '**/*.sqlite'
  - '**/*.log'
  artifact_policy:
    commit_only:
    - policy files
    - campaign files
    - docs
    - placeholder .gitkeep files if required
    - placeholder README.md files if required
    never_commit:
    - raw data
    - canonical data
    - factor values
    - label values
    - local DB files
    - heavy artifacts
    - logs
    - caches
    - run-local artifacts under runs/**
    explicit_staging_only: true
    no_git_add_dot: true
    no_git_add_A: true
    notes:
    - Initial repo policy only.
    - No source implementation.
    - No broker/live scope.
    - Hook, CI, and enforcement-script implementation is deferred to ASV1-P01.
