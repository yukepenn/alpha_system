risk_controls:
  no_lookahead:
    required: true
    test_roots:
    - tests/no_lookahead
    blocked_if:
    - no-lookahead tests missing after relevant phases
    - available_ts missing in data/factor/signal schemas
    - label_available_ts missing in label schemas
    - same-bar execution optimism introduced
    detection:
    - no_lookahead_test_suite
    - Claude review
    - semantic_done_check
  no_raw_data:
    required: true
    blocked_patterns:
    - data/raw/**
    - data/canonical/**
    - data/factors/**
    - data/labels/**
    - '**/*.parquet outside tests/fixtures documented tiny synthetic exceptions'
    exceptions:
    - tests/fixtures/** when tiny synthetic fixture and documented
    - '**/.gitkeep'
    - '**/README.md'
    exception_precedence: exceptions apply before phase-level forbidden globs
    detection:
    - git status audit
    - git ls-files audit
    - artifact policy checks
  no_heavy_artifacts:
    required: true
    size_threshold_policy: block_large_files_unless_explicitly_local_only
    blocked_artifact_types:
    - full trade logs
    - raw grid outputs
    - management grid raw outputs
    - generated review bundles
    - model binaries
    - benchmark logs
    - large parquet files
    - large databases
    detection:
    - find artifacts -type f -size +1M -print
    - artifact manifest audit
    - handoff artifact confirmation
  no_broker_live:
    required: true
    blocked_scope:
    - broker integration
    - live trading
    - paper trading adapter
    - order routing
    - real-time account sync
    - live market data dependency
    allowed_scope:
    - docs stating out-of-scope
    - future campaign notes without implementation
    detection:
    - source path audit
    - dependency audit
    - Claude review
  no_alpha_claims:
    required: true
    blocked_claims:
    - alpha without evidence
    - tradability
    - profitability
    - market-beating
    - production-ready strategy
    - live-ready
    - robust without evidence
    detection:
    - prohibited claim tests
    - report claim checks
    - doc grep
    - Claude review
  no_candidate_promotion_without_review:
    required: true
    rules:
      approved_status_requires_review_metadata: true
      validated_status_requires_validation_artifact: true
      promotion_decision_record_required: true
      auto_promotion_allowed: false
    detection:
    - lifecycle tests
    - registry audit
    - promotion decision tests
  no_test_weakening:
    required: true
    rules:
      test_removals_require_explicit_phase_scope: true
      test_relaxations_require_explicit_phase_scope: true
      review_required_for_test_changes: true
      fake_completion_forbidden: true
    detection:
    - diff review
    - Claude review
    - semantic done-check
  reference_truth:
    required: true
    rules:
      reference_engine_required_before_fast_path: true
      reference_engine_is_canonical_truth: true
      second_pnl_truth_allowed: false
      backtest_is_not_live_trading: true
    detection:
    - reference truth tests
    - parity tests
    - Claude review
  fast_path_requires_parity:
    required: true
    rules:
      fast_path_acceleration_only: true
      grid_use_requires_parity_pass: true
      unsupported_features_fail_closed_or_reference_fallback: true
    detection:
    - tests/parity
    - grid fast-path gate tests
    - handoff parity matrix
  grid_explosion_limits:
    required: true
    rules:
      grid_expansion_must_enforce_combination_count_limits: true
      rejected_configs_must_be_visible: true
      unbounded_cartesian_products_forbidden: true
    detection:
    - grid expansion tests
    - grid limit tests
    - artifact audit
  local_wsl2_path:
    required: true
    allowed_repo_root: ~/projects/alpha_system
    forbidden_paths:
    - /mnt/c
    - OneDrive
    - Dropbox
    - Google Drive
    - Windows-synced folders
    detection:
    - RUN_INIT preflight
    - worktree path audit
    - handoff confirmation
  sqlite_db_not_committed:
    required: true
    blocked_patterns:
    - metadata/*.sqlite
    - metadata/*.sqlite3
    - metadata/*.db
    - metadata/*.db-journal
    - metadata/*.wal
    - '**/*.sqlite'
    - '**/*.db'
    exceptions:
    - '**/.gitkeep'
    - '**/README.md'
    detection:
    - find metadata audit
    - git ls-files audit
    - artifact policy checks
  parquet_not_committed_outside_tiny_fixtures:
    required: true
    blocked_patterns:
    - '**/*.parquet'
    - '**/*.arrow'
    - '**/*.feather'
    allowed_exceptions:
    - tests/fixtures/** when explicitly tiny synthetic documented fixture
    exception_precedence: exceptions apply before phase-level forbidden globs
    detection:
    - find . -name "*.parquet" -not -path "./tests/fixtures/*" -print
    - git ls-files audit
stop_conditions:
- name: STOP file active
  condition: runs/<run_id>/STOP indicates active stop
  action: stop_before_new_phase_or_merge
- name: raw data staged
  condition: files under data/raw, data/canonical, data/factors, or data/labels staged outside allowed fixtures
  action: block_merge_and_repair
- name: heavy artifact staged
  condition: large artifacts, full grid outputs, full trade logs, generated bundles, or model binaries staged
  action: block_merge_and_repair
- name: broker/live trading code introduced
  condition: broker integration, live trading, paper trading adapter, order routing, or account sync implementation appears
  action: block_merge_and_escalate
- name: tests weakened without explicit phase scope
  condition: tests removed, skipped, or relaxed without explicit authorization and review
  action: block_merge_and_rework
- name: Claude review BLOCKED
  condition: review verdict is BLOCKED
  action: blocked_handoff_and_stop
- name: repair attempts exceeded
  condition: repair loop exceeds configured max attempts
  action: blocked_handoff_and_stop
- name: campaign YAML invalid
  condition: campaign.yaml fails YAML parse after all parts concatenated
  action: block_campaign_execution_until_fixed
- name: phase dependency missing
  condition: selected phase dependencies are incomplete or blocked
  action: stop_phase_selection
- name: reference truth ambiguity introduced
  condition: more than one PnL truth or fast path treated as truth
  action: block_merge_and_rework
- name: fast path used before parity
  condition: grid or experiment uses fast path without required parity tests passing
  action: block_merge_and_rework
- name: alpha/tradability claim detected
  condition: unqualified alpha, tradability, profitability, market-beating, production-ready, or live-ready claim appears
  action: block_merge_and_rework
- name: runtime SQLite DB staged
  condition: metadata/*.sqlite, metadata/*.db, or SQLite journal/WAL file staged
  action: block_merge_and_repair
- name: generated Parquet staged outside allowed tiny fixtures
  condition: '*.parquet, *.arrow, or *.feather staged outside tests/fixtures documented exception'
  action: block_merge_and_repair
- name: active repo/worktree under forbidden Windows path
  condition: active worktree under /mnt/c, OneDrive, Dropbox, Google Drive, or Windows-synced folder
  action: stop_run_init_or_worktree_create
- name: hidden failed runs detected
  condition: failed steps not represented in run manifest, handoff, checks, or registry where required
  action: block_merge_and_rework
- name: candidate promoted without review
  condition: factor/strategy/candidate status approved or validated without required review metadata
  action: block_merge_and_rework
- name: L2 replay scope introduced
  condition: full L2 replay, queue model, passive fill simulation, or real L2 data ingestion introduced before future campaign
  action: block_merge_and_rework
