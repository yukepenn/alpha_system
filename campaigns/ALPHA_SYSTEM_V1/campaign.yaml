campaign_id: ALPHA_SYSTEM_V1
campaign_name: Local-First Alpha Research Platform Foundation
repo_name: alpha_system
repo_path: ~/projects/alpha_system
project_profile:
  primary: trading_research
  secondary: research
  project_type: clean_slate_alpha_research_platform
  initial_workflow: one_minute_session_first_intraday_research
  local_first: true
  future_multi_asset_ready: true
  future_l2_ready: true
  alpha_research_platform_not_merely_backtester: true
  broker_live_trading_in_scope: false
  paper_trading_in_scope: false
  production_trading_claims_allowed: false
  alpha_tradability_claims_allowed_without_evidence: false
workflow:
  harness: Frontier Harness Generic
  harness_version: '3.0'
  workflow_id: Workflow 2
  driver: Ralph
  executor: Codex
  reviewer: Claude
  mode: Ralph-driven strict autonomous loop
  loose_loop: false
  fresh_context_per_phase: true
  git_memory: true
  campaign_contract_based: true
  automatic_pr_merge_by_lane: true
  stop_file_supported: true
  semantic_done_check_required: true
  handoff_required_per_phase: true
  review_required_for_yellow: true
  fake_completion_forbidden: true
runtime:
  host: Windows
  primary_runtime: WSL2 Ubuntu
  required_repo_path: ~/projects/alpha_system
  required_filesystem: WSL2 Linux filesystem
  forbidden_active_worktree_paths:
  - /mnt/c
  - /mnt/d
  - /mnt/e
  - OneDrive
  - Dropbox
  - Google Drive
  - Windows-synced folders
  - network drives
  - temporary directories
  local_first: true
  cloud_db_required: false
  paid_db_required: false
  server_first_architecture: false
  broker_credentials_required: false
  live_market_data_required: false
models:
  strategy:
    name: ChatGPT Pro GPT-5.5 Thinking
    roles:
    - strategy
    - roadmap
    - post-run reasoning
    - campaign design
    - final strategic review
  spec_review:
    name: Claude Opus 4.8 xhigh
    roles:
    - phase specs
    - architecture specs
    - semantic reviews
    - done-checks
    - hard debugging
    - campaign decomposition
  verifier:
    name: Claude Sonnet 4.6
    roles:
    - source maps
    - verifier
    - audits
    - mechanical inspections
    - static review support
  executor:
    name: Codex GPT-5.5 high
    roles:
    - primary executor
    - implementation
    - repair from review
    - tests
    - refactors
    - artifact generation
  subagent:
    name: Codex GPT-5.4-mini medium
    roles:
    - lightweight subagents
    - mechanical exploration
    - local source mapping
lane_policy:
  GREEN:
    description: Low-risk docs, scaffolding, and mechanical work.
    automatic_execute: true
    automatic_repair: true
    automatic_pr: true
    automatic_merge: true
    claude_review_required: false
    checks_required: true
    artifact_policy_required: true
    handoff_required: true
    merge_requires:
    - checks_pass
    - handoff_valid
    - artifact_policy_pass
    - no_forbidden_paths
    - no_stop_file
    - semantic_done_check_pass
  YELLOW:
    description: Material engineering or research infrastructure.
    automatic_execute: true
    automatic_repair: true
    automatic_pr: true
    automatic_merge: true
    claude_review_required: true
    required_reviewer: Claude Opus 4.8 xhigh
    checks_required: true
    artifact_policy_required: true
    handoff_required: true
    most_phases: true
    merge_requires:
    - checks_pass
    - handoff_valid
    - artifact_policy_pass
    - no_forbidden_paths
    - no_stop_file
    - claude_review_complete
    - verdict_PASS_or_PASS_WITH_WARNINGS
    - semantic_done_check_pass
  RED:
    description: Production, destructive, live, external, or costly operations.
    automatic_execute_when_scoped: true
    automatic_repair: false
    automatic_pr_if_authorized: true
    automatic_merge_default: false
    claude_review_required: true
    scoped_authorization_required: true
    authorization_env_vars:
    - PROJECT_OP_AUTHORIZED
    - PROJECT_OP_SCOPE
    - PROJECT_OP_EXPIRES
    expected_in_this_campaign: false
    campaign_should_avoid_red: true
    reason_campaign_should_avoid_red:
    - no broker/live trading in scope
    - no destructive production operations in scope
    - no external costly infrastructure in scope
state_machine:
  strict: true
  states:
  - RUN_INIT
  - CAMPAIGN_LOAD
  - PHASE_SELECT
  - SPEC_GENERATE
  - SPEC_VALIDATE
  - WORKTREE_CREATE
  - CODEX_EXECUTE
  - CHECKS_RUN
  - HANDOFF_VALIDATE
  - CLAUDE_REVIEW
  - VERDICT_PARSE
  - PR_CREATE
  - CI_WAIT
  - MERGE_GATE
  - MERGE
  - DONE_CHECK
  - NEXT_PHASE
  - CAMPAIGN_DONE_CHECK
  - RUN_SUMMARY
  failure_routes:
    REWORK:
      route: bounded_repair_loop
      repair_attempts_tracked: true
      max_repair_attempts_default: 3
      repair_attempts_path: runs/<run_id>/phases/<phase_id>/repair_attempts/
      fake_completion_forbidden: true
    BLOCKED:
      route: blocked_handoff_and_stop_or_escalation
      blocked_handoff_required: true
      dependent_phases_blocked: true
      fake_completion_forbidden: true
    FAIL:
      route: checks_failure_repair_loop_or_blocked_handoff
      repair_attempts_tracked: true
      fake_completion_forbidden: true
path_policy:
  exceptions_apply_before_forbidden_globs: true
  placeholder_exceptions:
  - '**/.gitkeep'
  - '**/README.md'
  tiny_fixture_exceptions:
  - tests/fixtures/** when tiny synthetic deterministic documented fixture below repository size threshold
  global_forbidden_paths:
  - src/alpha_system/execution/broker*
  - src/alpha_system/execution/broker/**
  - src/alpha_system/execution/live*
  - src/alpha_system/execution/live/**
  - src/alpha_system/execution/paper*
  - src/alpha_system/execution/paper/**
  - src/alpha_system/execution/order_router*
  - src/alpha_system/broker/**
  - src/alpha_system/live/**
  - data/raw/**
  - data/canonical/**
  - data/factors/**
  - data/labels/**
  - data/cache/**
  - metadata/*.sqlite
  - metadata/*.sqlite3
  - metadata/*.db
  - metadata/*.db-journal
  - metadata/*.wal
artifact_policy:
  never_commit:
  - data/raw/**
  - data/canonical/**
  - data/factors/**
  - data/labels/**
  - data/cache/**
  - metadata/*.sqlite
  - metadata/*.sqlite3
  - metadata/*.db
  - metadata/*.db-journal
  - metadata/*.wal
  - '**/*.sqlite'
  - '**/*.sqlite3'
  - '**/*.db'
  - '**/*.db-journal'
  - '**/*.wal'
  - '**/*.parquet outside tests/fixtures documented tiny synthetic exceptions'
  - '**/*.arrow outside tests/fixtures documented tiny synthetic exceptions'
  - '**/*.feather outside tests/fixtures documented tiny synthetic exceptions'
  - '**/*.pkl'
  - '**/*.pickle'
  - '**/*.joblib'
  - '**/*.onnx'
  - '**/*.npy'
  - '**/*.npz'
  - '**/*.log'
  - '**/logs/**'
  - '**/tmp/**'
  - '**/temp/**'
  - '**/cache/**'
  - '**/.pytest_cache/**'
  - '**/.mypy_cache/**'
  - '**/.ruff_cache/**'
  - '**/**pycache**/**'
  - runs/**/large_outputs/**
  - '**/full_grid_outputs/**'
  - '**/full_trade_logs/**'
  - '**/generated_local_only/**'
  local_only_by_default:
  - artifacts/**
  - runs/**
  commit_allowed:
  - source code
  - configs
  - schemas
  - small fixtures
  - docs
  - phase specs
  - handoffs
  - reviews
  - curated summaries
  - validation summaries
  - source maps
  - run manifests if small
  - top config examples if small
  allowed_exceptions:
  - placeholder .gitkeep files
  - placeholder README.md files
  - tests/fixtures/** tiny synthetic deterministic documented fixtures
  - small curated summaries explicitly allowed by phase artifact policy
  tiny_fixture_exceptions:
    allowed: true
    paths:
    - tests/fixtures/**
    requirements:
    - synthetic or tiny deterministic fixture
    - explicitly documented as fixture
    - below repository size threshold
    - not real raw production data
    - not used as alpha evidence
  phase_requirements:
    explicit_artifact_policy_required: true
    explicit_staging_required: true
    artifact_audit_before_merge: true
    no_raw_data_commits: true
    no_heavy_artifact_commits: true
    no_local_db_commits: true
    no_hidden_failed_runs: true
git_policy:
  explicit_staging_only: true
  forbidden_commands:
  - git add .
  - git add -A
  force_push_allowed: false
  force_push_allowed_only_if_phase_explicitly_authorizes: true
  phase_handoff_required: true
  clean_merge_gate_required: true
  artifact_audit_before_merge: true
  raw_data_commits_allowed: false
  heavy_artifact_commits_allowed: false
  local_db_commits_allowed: false
  cache_log_commits_allowed: false
  generated_local_only_artifact_commits_allowed: false
  require_git_status_short: true
  require_explicit_file_list_in_handoff: true
review_policy:
  yellow_requires_fresh_claude_opus_review: true
  green_review_optional_unless_phase_requires: true
  green_mechanical_review_allowed: true
  red_requires_scoped_authorization_and_claude_review: true
  verdict_json_required: true
  review_artifact_required_for_yellow: true
  allowed_verdicts:
  - PASS
  - PASS_WITH_WARNINGS
  - REWORK
  - BLOCKED
  merge_allowed_verdicts:
  - PASS
  - PASS_WITH_WARNINGS
  merge_blocking_verdicts:
  - REWORK
  - BLOCKED
  - FAIL
  review_must_check:
  - phase scope compliance
  - domain boundary compliance
  - no-lookahead where relevant
  - artifact policy compliance
  - no raw data committed
  - no heavy artifacts committed
  - no local DB committed
  - no broker/live trading scope
  - no alpha/tradability claims
  - no hidden failed runs
  - no test weakening or gaming
  - handoff completeness
  - semantic done criteria
merge_policy:
  GREEN:
    auto_pr: true
    auto_merge: true
    requires:
    - checks_pass
    - handoff_valid
    - artifact_policy_pass
    - no_forbidden_paths
    - no_stop_file
    - semantic_done_check_pass
  YELLOW:
    auto_pr: true
    auto_merge: true
    requires:
    - checks_pass
    - handoff_valid
    - claude_review_complete
    - verdict_PASS_or_PASS_WITH_WARNINGS
    - artifact_policy_pass
    - no_forbidden_paths
    - no_stop_file
    - semantic_done_check_pass
    - ci_pass_if_configured
  RED:
    auto_pr_if_authorized: true
    auto_merge: false
    requires:
    - scoped_authorization_present
    - checks_pass
    - handoff_valid
    - claude_review_complete
    - artifact_policy_pass
    - no_stop_file
    - ci_pass_if_configured
  global_blockers:
  - STOP file present
  - forbidden path staged
  - raw data staged
  - heavy artifact staged
  - local DB staged
  - hidden failed run detected
  - test weakening detected
  - broker/live/paper/order-routing scope introduced
  - unsupported alpha/tradability claim introduced
  - semantic done-check failed
phase_defaults:
  spec_required: true
  executor: Codex GPT-5.5 high
  reviewer: Claude Opus 4.8 xhigh
  verifier: Claude Sonnet 4.6
  handoff_required: true
  checks_required: true
  artifact_policy_required: true
  semantic_done_check_required: true
  explicit_staging_only: true
  review_required_for_yellow: true
  auto_pr: true
  auto_merge_for_green: true
  auto_merge_for_yellow_after_review: true
  max_repair_attempts: 3
  forbidden_global_changes:
  - broker integration
  - paper trading
  - live trading
  - order routing
  - production execution adapter
  - raw data commit
  - heavy artifact commit
  - local DB commit
  - alpha/tradability claim without evidence
  - candidate promotion without review
  - uncontrolled strategy explosion
  - execution-truth ambiguity
  - test weakening or gaming
  - hidden failed run
run_outputs:
  run_level:
  - runs/<run_id>/RUN_GOAL.md
  - runs/<run_id>/PHASE_PLAN.md
  - runs/<run_id>/prd.json
  - runs/<run_id>/progress.txt
  - runs/<run_id>/state.json
  - runs/<run_id>/events.jsonl
  - runs/<run_id>/costs.jsonl
  - runs/<run_id>/STOP
  - runs/<run_id>/RUN_SUMMARY.md
  phase_level:
  - runs/<run_id>/phases/<phase_id>/spec.md
  - runs/<run_id>/phases/<phase_id>/executor_prompt.md
  - runs/<run_id>/phases/<phase_id>/executor_notes.md
  - runs/<run_id>/phases/<phase_id>/handoff.md
  - runs/<run_id>/phases/<phase_id>/review.md
  - runs/<run_id>/phases/<phase_id>/verdict.json
  - runs/<run_id>/phases/<phase_id>/checks.json
  - runs/<run_id>/phases/<phase_id>/repair_attempts/
phases:
- id: ASV1-P00
  name: Repo and Harness Bootstrap Policy
  lane: YELLOW
  dependencies: []
  spec_required: true
  executor: Codex GPT-5.5 high
  reviewer: Claude Opus 4.8 xhigh
  verifier: Claude Sonnet 4.6
  checks:
  - git status --short
  - git status -sb
  - pwd
  - test -f README.md
  - test -f PROJECT_STATUS.md
  - test -f .gitignore
  - test -f ACTIVE_CAMPAIGN.md
  - test -f campaigns/ALPHA_SYSTEM_V1/GOAL.md
  - test -f campaigns/ALPHA_SYSTEM_V1/ACCEPTANCE.md
  - test -f campaigns/ALPHA_SYSTEM_V1/PHASE_PLAN.md
  - test -f campaigns/ALPHA_SYSTEM_V1/campaign.yaml
  - test -f campaigns/ALPHA_SYSTEM_V1/RISK_REGISTER.md
  - test -f campaigns/ALPHA_SYSTEM_V1/RUNBOOK.md
  - test -f handoffs/ASV1-P00.md
  - test -d campaigns/ALPHA_SYSTEM_V1
  - test -d specs
  - test -d handoffs
  - test -d reviews
  - test -d evals
  - test -d docs
  - test -d decisions
  - test -d configs
  - test -d data/raw
  - test -d data/canonical
  - test -d data/factors
  - test -d data/labels
  - test -d data/cache
  - test -d metadata
  - test -d artifacts
  - git check-ignore -v data/raw/example.parquet || true
  - git check-ignore -v data/canonical/example.parquet || true
  - git check-ignore -v data/factors/example.parquet || true
  - git check-ignore -v data/labels/example.parquet || true
  - git check-ignore -v data/cache/example.parquet || true
  - git check-ignore -v metadata/alpha_system.sqlite || true
  - git check-ignore -v artifacts/example_large_output.csv || true
  - git check-ignore -v runs/example_run/state.json || true
  - grep -q "ALPHA_SYSTEM_V1" ACTIVE_CAMPAIGN.md
  - grep -R "git add ." README.md PROJECT_STATUS.md docs || true
  - grep -R "git add -A" README.md PROJECT_STATUS.md docs || true
  - find data -type f ! -name README.md ! -name ".gitkeep" -print
  - find metadata -type f ! -name README.md ! -name ".gitkeep" -print
  - find artifacts -type f -size +1M -print 2>/dev/null || true
  - find . -path ./tests/fixtures -prune -o -type f -name "*.parquet" -print
  - find . -type f \( -name "*.sqlite" -o -name "*.sqlite3" -o -name "*.db" -o -name "*.db-journal" -o -name "*.wal" \) -print
  - git ls-files runs
