campaign_id: ALPHA_FEATURE_LABEL_FOUNDATION_V1
campaign_name: 'Feature/Label Foundation: Versioned, No-Lookahead-Safe Research Substrate'
repo_name: alpha_system
repo_path: ~/projects/alpha_system
project_profile:
  primary: trading_research
  secondary: research
  project_type: feature_label_foundation
  profiles:
  - trading_research
  - research
  - feature_label_foundation
  builds_on:
  - ALPHA_SYSTEM_V1
  - ASV1_RELEASE_HYGIENE
  - ALPHA_RESEARCH_GOVERNANCE_MVP
  - ALPHA_DATA_FOUNDATION_V1
  - PRE_FEATURE_REPO_CONSOLIDATION_V1
  - WF2_PARALLEL_DAG_SCHEDULER_MVP
  local_first: true
  research_substrate_layer_not_alpha_search: true
  databento_primary_deep_history_source: true
  ibkr_broker_source_recent_validation_only: true
  consumes_accepted_dataset_versions_only: true
  future_multi_asset_ready: true
  future_l2_ready: true
  broker_live_trading_in_scope: false
  paper_trading_in_scope: false
  order_placement_in_scope: false
  account_trading_in_scope: false
  alpha_search_in_scope: false
  strategy_backtest_portfolio_in_scope: false
  production_trading_claims_allowed: false
  alpha_tradability_claims_allowed_without_evidence: false
workflow:
  harness: Frontier Harness Generic
  harness_version: '3.0'
  workflow_id: Workflow 2
  driver: Ralph
  executor: Codex
  reviewer: Claude
  mode: Ralph-driven strict autonomous loop
  loose_loop: false
  fresh_context_per_phase: true
  git_memory: true
  campaign_contract_based: true
  automatic_pr_merge_by_lane: true
  stop_file_supported: true
  semantic_done_check_required: true
  handoff_required_per_phase: true
  review_required_for_yellow: true
  fake_completion_forbidden: true
workflow2:
  scheduler:
    mode: dag_wave
    parallel_execution: true
    max_parallel_phases: 3
    merge_queue: serial
    update_active_campaign: coordinator_only
  requirements:
  - run_frontier_plan_before_execution
  - run_parallel_mock_before_first_live_parallel_run
  - serial_merge_queue_required
  - phase_branches_do_not_write_active_campaign
  - red_phases_not_parallel_by_default
  - parallel_safe_phases_require_disjoint_allowed_paths
  - omitting_parallel_safe_or_allowed_paths_means_run_alone
runtime:
  host: Windows
  primary_environment: WSL2 Ubuntu
  primary_runtime: WSL2 Ubuntu
  repo_must_live_under: ~/projects/alpha_system
  required_filesystem: WSL2 Linux filesystem
  forbidden_active_paths:
  - /mnt/c
  - /mnt/d
  - /mnt/e
  - OneDrive
  - Dropbox
  - Google Drive
  - Windows-synced folders
  - network drives
  - temporary directories
  forbidden_active_worktree_paths:
  - /mnt/c
  - /mnt/d
  - /mnt/e
  - OneDrive
  - Dropbox
  - Google Drive
  - Windows-synced folders
  - network drives
  - temporary directories
  local_first: true
  cloud_db_required: false
  paid_db_required: false
  broker_credentials_required: false
  live_market_data_required: false
  external_provider_calls_require_red_authorization: true
models:
  strategy:
    name: ChatGPT Pro GPT-5.5 Thinking
    model: ChatGPT Pro / GPT-5.5 Thinking
    responsibilities:
    - strategy
    - roadmap
    - campaign reasoning
    - post-run reasoning
  spec_review_donecheck:
    name: Claude Opus 4.8 xhigh
    model: Claude Opus
    responsibilities:
    - phase specs
    - architecture specs
    - semantic review
    - done-check
    - campaign decomposition
  verifier:
    name: Claude Sonnet 4.6
    model: Claude Sonnet
    responsibilities:
    - source maps
    - verifier support
    - audits
    - mechanical inspection
  executor:
    name: Codex GPT-5.5 high
    model: Codex GPT-5.5 high
    responsibilities:
    - implementation
    - tests
    - repair
    - handoff writing
  orchestrator:
    name: Ralph
    model: Ralph
    responsibilities:
    - Workflow 2 state machine
    - DAG wave scheduler
    - serial merge queue
    - run control
    - phase transitions
    - STOP/resume
    - validation ledger
    - review routing
    - verdict parsing
    - PR/CI/merge gates
    - bounded repair enforcement
lane_policy:
  GREEN:
    description: Low-risk docs, campaign-contract, and mechanical work for the Feature/Label substrate.
    automatic_execute: true
    automatic_repair: true
    automatic_pr: true
    automatic_merge: true
    claude_review_required: false
    checks_required: true
    artifact_policy_required: true
    handoff_required: true
    merge_requires:
    - checks_pass
    - handoff_valid
    - artifact_policy_pass
    - no_forbidden_paths
    - no_stop_file
    - semantic_done_check_pass
  YELLOW:
    description: Material Feature/Label engineering and research-substrate work. Every YELLOW phase is local-only and consumes ACCEPTED DatasetVersions; no phase calls an external provider API, materializes committed values, or introduces order/account/paper/live scope.
    automatic_execute: true
    automatic_repair: true
    automatic_pr: true
    automatic_merge: true
    claude_review_required: true
    required_reviewer: Claude Opus 4.8 xhigh
    checks_required: true
    artifact_policy_required: true
    handoff_required: true
    most_phases: true
    merge_requires:
    - checks_pass
    - handoff_valid
    - claude_review_complete
    - verdict_PASS_or_PASS_WITH_WARNINGS
    - artifact_policy_pass
    - no_forbidden_paths
    - no_stop_file
    - semantic_done_check_pass
  RED:
    description: 'External, destructive, live, production, or broker-adjacent operations. This campaign has NO RED-lane phases: the data is already pulled, so the Feature/Label layer only consumes local accepted DatasetVersions. The RED lane definition is retained for harness completeness only.'
    automatic_execute_when_scoped: true
    automatic_repair: false
    automatic_merge: false
    claude_review_required: true
    required_reviewer: Claude Opus 4.8 xhigh
    required_scope_env:
    - PROJECT_OP_AUTHORIZED
    - PROJECT_OP_SCOPE
    - PROJECT_OP_EXPIRES
    expected_in_this_campaign: false
    expected_red_phases: []
    note_no_red_phases: This campaign has no RED-lane phases and makes no external provider calls. All data consumption is local-only against accepted DatasetVersions.
    red_requires:
    - explicit_external_authorization
    - human_authorization
    - no_ci_execution
    - local_only_outputs
    - no_data_artifacts_committed
    - no_order_api_surface
    - no_stop_file
state_machine:
  strict: true
  states:
  - RUN_INIT
  - CAMPAIGN_LOAD
  - PHASE_SELECT
  - SPEC_GENERATE
  - SPEC_VALIDATE
  - WORKTREE_CREATE
  - CODEX_EXECUTE
  - CHECKS_RUN
  - HANDOFF_VALIDATE
  - CLAUDE_REVIEW
  - VERDICT_PARSE
  - PR_CREATE
  - CI_WAIT
  - MERGE_GATE
  - MERGE
  - DONE_CHECK
  - NEXT_PHASE
  - CAMPAIGN_DONE_CHECK
  - RUN_SUMMARY
  scheduler_mode: dag_wave
  parallel_execution: true
  merge_queue: serial
  failure_routes:
    REWORK:
      route: bounded_repair_loop
      repair_attempts_tracked: true
      max_repair_attempts_default: 2
      repair_attempts_path: runs/<run_id>/phases/<phase_id>/repair_attempts/
      requires_repair_attempt_record: true
      fake_completion_forbidden: true
    BLOCKED:
      route: blocked_handoff_and_stop_or_escalation
      blocked_handoff_required: true
      dependent_phases_blocked: true
      fake_completion_allowed: false
    FAIL:
      route: checks_failure_repair_loop_or_blocked_handoff
      repair_attempts_tracked: true
      fake_completion_forbidden: true
feature_label_lifecycle:
  description: Lifecycle that the Feature/Label objects must enforce. Listed here as the contract Workflow 2 phases implement; not executed by Ralph itself.
  feature_states:
  - REQUESTED
  - SPEC_DRAFTED
  - SPEC_VALIDATED
  - IMPLEMENTATION_ALLOWED
  - IMPLEMENTED
  - MATERIALIZATION_PLANNED
  - MATERIALIZED_DRAFT
  - QUALITY_CHECKED
  - REGISTERED
  - READY_FOR_STUDY
  - REJECTED
  - QUARANTINED
  - DEPRECATED
  label_states:
  - LABEL_REQUESTED
  - LABEL_SPEC_DRAFTED
  - LABEL_SPEC_VALIDATED
  - MATERIALIZATION_ALLOWED
  - MATERIALIZED_DRAFT
  - LEAKAGE_AUDITED
  - QUALITY_CHECKED
  - REGISTERED
  - READY_FOR_STUDY
  - REJECTED
  - QUARANTINED
  - DEPRECATED
  prohibited_mvp_states:
  - ALPHA_VALIDATED
  - STRATEGY_READY
  - LIVE_READY
  - PROFITABLE
  - TRADABLE
  - PRODUCTION_READY
  prohibited_state_note: Listed only as future non-MVP concepts. They must not be reachable by any transition implemented in this campaign.
path_policy:
  exceptions_apply_before_forbidden_globs: true
  placeholder_exceptions:
  - '**/.gitkeep'
  - '**/README.md'
  tiny_fixture_exceptions:
  - tests/fixtures/** when tiny synthetic deterministic documented fixture below repository size threshold
  global_forbidden_paths:
  - src/alpha_system/execution/broker*
  - src/alpha_system/execution/broker/**
  - src/alpha_system/execution/live*
  - src/alpha_system/execution/live/**
  - src/alpha_system/execution/paper*
  - src/alpha_system/execution/paper/**
