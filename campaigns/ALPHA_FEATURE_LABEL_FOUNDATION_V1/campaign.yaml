risk_controls:
  no_raw_provider_access:
    required: true
    rules:
      raw_provider_files_not_read_by_feature_label_code: true
      canonical_records_only: true
    detection:
    - source path audit
    - import audit
    - Claude review
  accepted_dataset_version_required:
    required: true
    rules:
      resolve_dataset_version_only: true
      admissible_states_versioned_or_ready_for_research: true
    detection:
    - consumption adapter tests
    - Claude review
  available_ts_required:
    required: true
    rules:
      every_feature_value_carries_available_ts: true
    detection:
    - feature contract tests
    - no_lookahead test suite
    - Claude review
  label_available_ts_required:
    required: true
    rules:
      every_label_value_carries_label_available_ts: true
    detection:
    - label contract tests
    - leakage audit
    - Claude review
  no_label_as_feature:
    required: true
    rules:
      label_values_never_exposed_as_features: true
      forbidden_feature_overlap_enforced: true
    detection:
    - label leakage guard
    - no_lookahead test suite
    - Claude review
  no_future_window_features:
    required: true
    rules:
      future_rolling_windows_forbidden_in_live_features: true
    detection:
    - primitive tests
    - feature contract tests
    - Claude review
  no_centered_live_windows:
    required: true
    rules:
      centered_windows_offline_only_blocked_from_live_features: true
    detection:
    - primitive tests
    - Claude review
  duplicate_exposure_check_required:
    required: true
    rules:
      feature_request_duplicate_exposure_guard_required: true
      equivalent_exposure_recorded: true
    detection:
    - request gate tests
    - duplicate exposure report
    - Claude review
  missing_bbo_flag_required:
    required: true
    rules:
      missing_bbo_flag_token_required: missing_bbo
      abnormal_quote_flag_token: bbo_quarantined
    detection:
    - BBO semantics tests
    - Claude review
  no_silent_bbo_forward_fill:
    required: true
    rules:
      no_silent_forward_fill_of_missing_bbo: true
    detection:
    - BBO semantics tests
    - Claude review
  no_trade_rows_must_be_flagged:
    required: true
    rules:
      synthetic_no_trade_rows_flagged_has_trade_false_synthetic_true_no_trade: true
      synthetic_rows_never_treated_as_trade_bars: true
    detection:
    - dense-grid semantics tests
    - Claude review
  locked_test_metadata_required:
    required: true
    rules:
      locked_test_use_requires_governance_contamination_metadata: true
    detection:
    - partition gate tests
    - require_governance_metadata_for_locked_partition_use
    - Claude review
  no_alpha_claims:
    required: true
    blocked_claims:
    - alpha without evidence
    - tradability
    - profitability
    - market-beating
    - production-ready
    - live-ready
    - broker-ready
    - strategy-ready
    detection:
    - prohibited claim tests
    - doc grep
    - Claude review
  no_strategy_scope:
    required: true
    blocked_scope:
    - alpha search
    - strategy optimization
    - backtest
    - portfolio allocation
    - promotion of a candidate
    - L2 replay
    - ML training beyond authorized scope
    detection:
    - source path audit
    - dependency audit
    - Claude review
  no_raw_heavy_artifacts:
    required: true
    rules:
      no_raw_canonical_feature_label_values_or_db_committed: true
    detection:
    - git status audit
    - git ls-files audit
    - artifact policy checks
    - find artifacts -type f -size +1M -print
  no_external_provider_calls:
    required: true
    rules:
      no_databento_or_ibkr_api_calls_in_this_campaign: true
    detection:
    - data access mode audit
    - import audit
    - CI configuration audit
  dag_parallel_requires_allowed_paths:
    required: true
    rules:
      parallel_safe_phase_requires_disjoint_allowed_paths: true
      no_global_coordinator_file_in_parallel_phase_allowed_paths: true
    detection:
    - plan-dag preview
    - dag_scheduler validation
    - campaign.yaml validation script
  serial_merge_queue_required:
    required: true
    rules:
      merge_one_pr_at_a_time: true
      phase_branches_do_not_write_active_campaign_in_parallel_mode: true
    detection:
    - merge_queue validation
    - Ralph driver
    - Claude review
  governance_objects_not_duplicated:
    required: true
    rules:
      feature_request_label_spec_study_spec_consumed_not_reimplemented: true
    detection:
    - source path audit
    - import audit
    - Claude review
  acceptance_gate_coverage_required:
    required: true
    rules:
      every_phase_in_exactly_one_gate: true
      no_phase_missing_from_gates: true
    detection:
    - campaign.yaml validation script
    - PHASE_PLAN cross-check
  no_test_weakening:
    required: true
    rules:
      test_removals_require_explicit_phase_scope: true
      review_required_for_test_changes: true
      fake_completion_forbidden: true
    detection:
    - diff review
    - Claude review
    - semantic done-check
  local_wsl2_path:
    required: true
    allowed_repo_root: ~/projects/alpha_system
    forbidden_paths:
    - /mnt/c
    - OneDrive
    - Dropbox
    - Google Drive
    - Windows-synced folders
    detection:
    - RUN_INIT preflight
    - worktree path audit
stop_conditions:
- name: STOP file active
  condition: runs/<run_id>/STOP indicates active stop
  action: stop_before_new_phase_or_merge
- name: raw provider data read by feature/label code
  condition: feature or label code reads raw Databento/IBKR files (.dbn/.zst/parquet/arrow/feather) directly
  action: block_merge_and_repair
- name: accepted DatasetVersion bypassed
  condition: feature or label values produced without resolving an admissible DatasetVersion
  action: block_merge_and_repair
- name: external Databento or IBKR API call attempted
  condition: any external provider API call is attempted in this campaign
  action: stop_and_escalate
- name: feature without available_ts
  condition: a feature value omits available_ts
  action: block_merge_and_repair
- name: label without label_available_ts
  condition: a label value omits label_available_ts
  action: block_merge_and_repair
- name: label values exposed as live features
  condition: label values are reachable as live features or strategy inputs
  action: block_merge_and_escalate
- name: future or centered rolling window used as live feature
  condition: a live feature uses a future or centered rolling window
  action: block_merge_and_repair
- name: FeatureRequest bypassed
  condition: a feature is implemented without an approved governance FeatureRequest
  action: block_merge_and_repair
- name: FeatureSpec bypassed
  condition: feature values are materialized without a FeatureSpec
  action: block_merge_and_repair
- name: LabelSpec bypassed
  condition: labels are materialized without a governance LabelSpec
  action: block_merge_and_repair
- name: duplicate exposure allowed without record
  condition: a duplicate or equivalent exposure is added without a duplicate-exposure record
  action: block_merge_and_repair
- name: missing BBO silently forward-filled
  condition: missing or abnormal BBO is silently forward-filled instead of flagged
  action: block_merge_and_repair
- name: no-trade synthetic row treated as actual trade bar
  condition: a synthetic dense-grid no-trade row is treated as an actual trade bar or executable quote
  action: block_merge_and_repair
- name: locked test partition used without contamination metadata
  condition: locked_test_candidate or latest_shadow_candidate is consumed without governance contamination metadata
  action: block_merge_and_repair
- name: alpha/profitability/tradability claim detected
  condition: unqualified alpha, tradability, profitability, market-beating, production-ready, live-ready, or broker-ready claim appears
  action: block_merge_and_rework
- name: strategy/backtest/portfolio scope introduced
  condition: alpha search, strategy optimization, backtest, portfolio allocation, or promotion scope appears
  action: block_merge_and_escalate
- name: raw or heavy data artifact staged
  condition: raw/canonical/feature/label values, parquet/arrow/feather, provider responses, or local DB files staged
  action: block_merge_and_repair
- name: parallel phase lacks allowed_paths
  condition: a phase marked parallel_safe declares no allowed_paths or declares a global/coordinator path
  action: block_campaign_execution_until_fixed
- name: parallel wave has path/resource conflict
  condition: two phases scheduled in the same wave have overlapping allowed_paths or a shared resource_class
  action: stop_phase_selection
- name: phase branch writes ACTIVE_CAMPAIGN.md in parallel mode
  condition: a phase branch writes ACTIVE_CAMPAIGN.md while update_active_campaign is coordinator_only
  action: block_merge_and_repair
- name: merge outside serial merge queue
  condition: a merge is attempted outside the serial merge queue (more than one PR merging at once)
  action: stop_and_escalate
- name: campaign YAML invalid
  condition: campaign.yaml fails YAML parse
  action: block_campaign_execution_until_fixed
- name: phase dependency missing
  condition: selected phase dependencies are incomplete or blocked
  action: stop_phase_selection
- name: acceptance gates missing phases
  condition: acceptance_gates do not cover every phase exactly once
  action: block_campaign_execution_until_fixed
- name: PHASE_PLAN / campaign.yaml mismatch
  condition: phase ids, names, lanes, dependencies, or DAG metadata disagree between files
  action: block_campaign_execution_until_fixed
- name: Claude review BLOCKED
  condition: review verdict is BLOCKED
  action: blocked_handoff_and_stop
- name: repair attempts exceeded
  condition: repair loop exceeds configured max attempts
  action: blocked_handoff_and_stop
- name: active repo/worktree under forbidden Windows path
  condition: active worktree under /mnt/c, OneDrive, Dropbox, Google Drive, or Windows-synced folder
  action: stop_run_init_or_worktree_create
