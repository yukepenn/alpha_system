    explicit_staging_required: true
    artifact_audit_before_merge: true
    no_raw_data_commits: true
    no_canonical_data_commits: true
    no_feature_value_commits: true
    no_label_value_commits: true
    no_provider_response_commits: true
    no_account_info_commits: true
    no_heavy_artifact_commits: true
    no_local_db_commits: true
data_artifact_policy:
  raw_real_data_local_only: true
  canonical_real_data_local_only: true
  feature_values_local_only: true
  label_values_local_only: true
  commit_real_market_data_forbidden: true
  commit_provider_responses_forbidden: true
  commit_feature_or_label_values_forbidden: true
  no_external_provider_calls_in_this_campaign: true
  suggested_data_root: ~/alpha_data/alpha_system
  data_root_env: ALPHA_DATA_ROOT
git_policy:
  explicit_staging_only: true
  forbidden_commands:
  - git add .
  - git add -A
  force_push_allowed: false
  commit_raw_data_allowed: false
  commit_heavy_artifacts_allowed: false
  commit_local_db_allowed: false
  commit_provider_responses_allowed: false
  commit_feature_or_label_values_allowed: false
  require_handoff_per_phase: true
  require_git_status_short: true
  require_explicit_file_list_in_handoff: true
  clean_merge_gate_required: true
  artifact_audit_before_merge: true
  branch_prefix_workflow2: auto/
  commit_message_format: '<campaign_id>/<phase_id>: <summary>'
review_policy:
  yellow_requires_fresh_claude_review: true
  green_review_optional_unless_phase_requires: true
  red_requires_scoped_authorization_and_claude_review: true
  verdict_json_required: true
  review_artifact_required_for_yellow: true
  allowed_verdicts:
  - PASS
  - PASS_WITH_WARNINGS
  - REWORK
  - BLOCKED
  allowed_verdicts_for_merge:
  - PASS
  - PASS_WITH_WARNINGS
  blocked_verdicts:
  - FAIL
  - BLOCKED
  - REWORK_REQUIRED
  reviewer_independence_required: true
  implementer_cannot_self_approve: true
  review_must_check:
  - phase scope compliance
  - feature/label object completeness for the phase
  - no raw provider data access from feature/label code
  - only accepted DatasetVersions consumed via resolve_dataset_version
  - FeatureRequest gate and duplicate-exposure guard wired to governance, not re-implemented
  - FeatureSpec/LabelSpec required before values; available_ts and label_available_ts present
  - no label-as-feature; no future/centered live-window features
  - BBO missingness flagged with no silent forward-fill; synthetic no-trade rows never treated as trades
  - locked-test partition use carries governance contamination metadata
  - no FeatureStore/LabelStore dumping ground; duplicate/equivalent exposure recorded
  - governance objects consumed (FeatureRequest/LabelSpec/StudySpec), not duplicated
  - 'DAG metadata correctness: parallel_safe phases have disjoint allowed_paths and no global files'
  - serial merge queue respected; phase branch does not write ACTIVE_CAMPAIGN.md in parallel mode
  - artifact policy compliance; no raw/canonical/feature/label values or DB committed
  - no broker/live/paper/order-routing or account-trading scope
  - no alpha/profitability/tradability claims; no strategy/backtest/portfolio scope
  - no test weakening or gaming
  - handoff completeness and semantic done criteria
merge_policy:
  GREEN:
    auto_pr: true
    auto_merge: true
    requires:
    - checks_pass
    - handoff_valid
    - artifact_policy_pass
    - no_forbidden_paths
    - no_stop_file
    - semantic_done_check_pass
  YELLOW:
    auto_pr: true
    auto_merge: true
    requires:
    - checks_pass
    - handoff_valid
    - claude_review_complete
    - verdict_PASS_or_PASS_WITH_WARNINGS
    - artifact_policy_pass
    - no_forbidden_paths
    - no_stop_file
    - semantic_done_check_pass
    - ci_pass_if_configured
  RED:
    auto_pr_if_authorized: true
    auto_merge: false
    requires:
    - scoped_authorization_present
    - checks_pass
    - handoff_valid
    - claude_review_complete
    - verdict_PASS_or_PASS_WITH_WARNINGS
    - artifact_policy_pass
    - no_data_artifacts_committed
    - no_forbidden_paths
    - no_stop_file
    - ci_pass_if_configured
  green_auto_pr: true
  green_auto_merge: true
  yellow_auto_pr: true
  yellow_auto_merge: true
  red_auto_pr: true
  red_auto_merge: false
  require_ci_pass: true
  require_artifact_policy_pass: true
  require_no_stop_file: true
  require_verdict_json: true
  require_no_data_artifacts_committed: true
  merge_queue: serial
  parallel_build_serial_merge: true
  global_blockers:
  - STOP file present
  - forbidden path staged
  - raw or canonical data staged
  - feature or label values staged
  - provider response staged
  - heavy artifact staged
  - local DB staged
  - external provider call attempted
  - raw provider data read by feature/label code
  - accepted DatasetVersion bypassed
  - feature without available_ts
  - label without label_available_ts
  - label values exposed as live features
  - future/centered rolling window used as live feature
  - FeatureRequest/FeatureSpec/LabelSpec bypassed
  - duplicate exposure allowed without record
  - missing BBO silently forward-filled
  - synthetic no-trade row treated as actual trade bar
  - locked-test partition used without contamination metadata
  - broker/live/paper/order-routing scope introduced
  - strategy/backtest/portfolio scope introduced
  - unsupported alpha/tradability claim introduced
  - parallel phase lacks disjoint allowed_paths
  - parallel wave has path/resource conflict
  - phase branch writes ACTIVE_CAMPAIGN.md in parallel mode
  - merge occurs outside serial merge queue
  - test weakening detected
  - semantic done-check failed
