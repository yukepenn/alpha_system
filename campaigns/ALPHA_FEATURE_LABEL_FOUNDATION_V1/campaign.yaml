  - '**/*.sqlite3'
  - '**/*.db'
  - '**/*.db-journal'
  - '**/*.wal'
  - '**/*.parquet'
  - '**/*.arrow'
  - '**/*.feather'
  - '**/*.dbn'
  - '**/*.zst'
  - '**/*.pkl'
  - '**/*.pickle'
  - '**/*.joblib'
  - '**/*.onnx'
  - '**/*.npy'
